  text: 曾序劉君裁吾何為而作此書耶則為糾正西醫之腦膜炎而作也今年春予以糾正腦膜炎之故惹起西醫反攻對壘兩三月同人響應者則有楊君貢軒張君駐塵爾時劉君歸里未曾與於斯役也當其時春寒料峭重裘未脫之時腦膜炎之發生不過為吾國舊有之時令病耳西醫無端而張大其詞以驚擾長沙市數十萬人民不得安居乃察其診察錐人之腦錐人之脊取其汁而試驗之使病輕者反重病重者致死而其治法則僅恃其普通解毒之血清至打預防針只有幾分效驗西醫龍君伯堅已明言之其預防之法如不入戲院電影院及避免疲勞等等甚無謂也若夫口鼻罩之阻塞空氣妨礙衛生人盡知之而其隔離之說幾如無形之瓜蔓抄充其害必至如前清奉天防疫之慘劇使人民一家骨肉頃刻離散甚有抬往焚化而在中途痛哭呼冤者今雖未至此然投入湘雅醫院診治者使之居四面受風之數層高樓剝去厚暖衣被當此春寒料峭尚須重裘之時即不病腦膜炎欲其不死也得乎予以此故不惜大聲疾呼遍告國人豈好辨哉實出於心之不忍耳湖南國民日報主任壺公亦不忍人民之張皇失措而有混合中西醫學研究之披露乃西醫不深加研究而竟組織全體攻擊國醫呶呶不休於是長沙市各報社諸君子相繼而起皆不忍人民之張皇失措秉董狐之筆直搗其黑幕非特對於西醫之預防治法有所辨駁即西醫所指為腦膜炎不治之症經中醫治之而愈者日有所聞西醫所指為腦膜炎疑似可治之症不經中醫治之竟死者亦日有所聞如馬家瓚鴒原志痛之作則痛哭流涕以告訴國人者國人既共見而共聞之矣今序劉君書重述之亦心之所不忍耳桐岡老人國中之碩彥宿儒也作中西醫平議維正道於無窮豈有所左袒哉毋亦本其不忍之心見人民之張皇失措無辜而遭此錐腦錐脊之慘劫歟既而事寢劉君還長沙恨不得與於斯役也乃伏案著書未周年脫稿丐予序予再三莊誦劉君以西醫之腦膜炎為國醫之痙病其原因病症治療方案握犀利之筆鋒闡未發之真諦考正漢唐宋元折衷海內時賢一層推深一層一節透露一節本一已三十餘年之經驗悉數而歸諸實驗醫者獲此則有良師之可從病者獲此則有良藥之可治天下後世洵有所遵守矣豈徒糾正西醫之腦膜炎哉故腦膜炎之雙球菌劉君既引西醫諸家之學說無確定之標準不得據以為診斷而其糾正西醫細菌之論以為人生之分泌液或腐敗質一經培養自可生菌況加以種種之脂肪更無不生菌之理精切確鑿其為海潮之音乎抑作獅子之吼乎足以破天荒而驚鬼神矣西醫細菌之學自足破壞一切而無形崩潰苟非喪心病狂受其麻醉者無不豁然醒悟豈徙糾正西醫腦膜炎之雙球菌哉劉君性孤高寡交遊品節學術不求人知人亦罕知惟於予一見傾心有最深之契合予初有糾正西醫余岩醫學之作而劉君編有余氏醫學駁議今予有糾正西醫腦膜炎之作而劉君有痙病與腦膜炎全書氣求聲應攻石斷金古所稱雞鳴風雨之良朋若劉君者近之矣予嘗謂中西醫之競爭不畏西醫之學術則以西醫之學術易為明眼人窺破也惟畏國醫受西醫之運動移梁換柱以圖消滅祖國之醫學如以傷寒為傳染傷暑為物理等等之類不亟為糾正其害幾與漢奸等此予之所以慄慄危懼而因序劉君之書連類及之腦膜炎之爭論特其一部分耳安得劉君盡為之糾止大聲疾呼以喚醒國醫及國內民族也哉民國二十四年夏曆仲冬雪山老納曾覺叟序於長沙市種福園勵德樹聲堂自序國醫之痙病西醫之腦脊髓膜炎也國醫以其病之現狀言之故曰痙西醫以其病之局部言之故曰腦脊髓膜炎今簡稱之為腦膜炎是也使西醫而有治療方法則此書何必作潮流所迫風向所趨作之適以增世界之淘汰物有識者所不為也今西醫而無治療方法則此書不忍以不作不作則吾國醫籍上之特效靈方將永遠而消滅矣消滅之可其如厥疾不瘳死亡率者之多何君子寧冒世界之不韙而不肯任其心之所不安今明知西醫無治療腦膜炎之方法而國醫有治療腦膜炎之方法不一舉手發揚而挽救之非醫之善者矣不善醫而安之為醫滔滔者天下皆是此國醫之所以無進化也歟雖然國醫之無進化歸咎於研究之不善猶無足怪獨怪西醫之科學化一日千里不可攀追鎮江余岩氏承無錫丁福保之胤大聲疾呼攻擊國醫無剩義處謂西醫本之乎解剖徵之乎實驗範圍於自然科學之律令審慎乎客觀唯物之現象鉤隱燭幽批隙導窾此世界各國之所公認者由是以觀當可生死人而肉白骨矣乃不意腦膜炎為彼國傳染病九種之一從實地徵其實績則一病之莫瘳不令人駭且疑乎欽佩哉西醫龍毓瑩之言曰果是真腦膜炎除打血清針外決無他法可以治療見民二四湖南國民日報副刊又欽佩哉西醫陳致遠之言曰本症治療除早期注射血清外其餘方法雖多效驗殊少見民二四四二湖南國民日報副刊更欽佩哉西醫董樞之言曰血清之效力如果及早應用並未發某種疾患者十之八九定能全愈見民二四三二一湖南國民日報副刊則知已發某種疾患者十之八九不能愈矣嗚呼彼國研究傳染病學可謂至矣盡矣蔑以加矣而其治療自始至終只有血清注射之一法夫血清為普通解毒之藥其效力不能直接撲殺雙球菌有是病究無是藥則與腦膜炎大症何濟苟非三子肯以忠實告人烏能洞悉其成績若是若是予於是不能不懷疑於德人率爾懷氏發明雙球菌為腦膜炎原因之非英人格奧頓氏檢得菌有四種非獨雙球菌也美國貿孚血清廠檢得四種菌外尚有十餘種之多亦非獨雙球菌也上海工部衛生局歷次報告檢得菌無一次相同者而雙球菌則杳渺無憑也更查西醫微生學雙球菌亦為淋病之原因則知雙球菌不可以標準腦膜炎即使為腦膜炎之標準則雙球菌自鼻腔咽頭循扁桃腺淋巴腺過血管進入於腦彼西醫者當於鼻腔咽頭間迎頭痛擊檢之以顯微鏡施之以撲殺諸法國醫所謂上工治未病也若徒用紗布口鼻罩為預防傳染病之工作則傳染病四季皆有之不可一日無此君也今獨使用於腦膜炎者未免有顧此失彼之嘆吾國四萬萬同胞早已絕跡於中土矣學者豈可無常識哉況菌自鼻腔咽頭而入最易識別菌如杆者吾知其為傷寒固不是腦膜炎菌如一個孤立或兩個連結者吾知其為感冒亦不是腦膜炎而腦膜炎之菌其必雙球對峙如豬腰子樣躍躍跳動於鼻腔咽頭間不必待其循扁桃腺淋巴腺過血管進入於腦齧腦及脊吸驗脊髓之混濁培養雙球菌而後知之也若必吸驗脊髓之混濁培養雙球菌而後知之則雙球菌之自鼻腔咽頭而入者杳渺無憑可下確定之評判矣況吸驗脊髓之混濁必須培養乃得有雙球菌之發現此為人工製造之微生物非自然界發生傳染病之微生物何必以預防口鼻罩為況吸驗脊髓之混濁則為腦膜炎之劇烈者乃得有此混濁之脊髓苟不至於劇烈而其脊髓必不混濁在彼西醫即不得謂之腦膜炎烏能早期而施治不能施治於早期烏得而見自鼻腔咽頭進入於腦其必為自然界發生傳染病之微生物也乎予於是又不能不懷疑於細菌培養基為傳染病之大黑幕也余岩謂微生物有形有色可目睹可實驗而非吾國之所謂鬼神者設使自鼻腔咽頭而入檢之以顯微鏡即能分晰其病之種類無待取病者之分泌物或腐敗質實驗於培養基與固形培養基則英人巴特氏傳染病由於微生物之學說光華燦爛真如日月之經天而不可磨滅也乃竟不能分晰於鼻腔咽頭間必欲取病者之分泌物或腐敗質實驗於培養基與固形培養基夫槁木死灰得水和空氣與溫度亦能發生微生物而人身血肉之軀無病尚生蟣蝨況有病而取其分泌物與腐敗質於白膠牛乳淡菜等等培養基與固形培養基其不發生微生物也得乎顧培養基發生微生物彼西醫猶嫌其菌之混居雜處不能分晰其病之種類再以含菌之物經過固形培養基不致混居雜處而後能分別其病之種類輾轉製造乃得有此菌發生才能認識而腦膜炎初起何以即謂自雙球菌傳染而致其能下確定之批判矣乎不能也謂予不信請讀汪企張之急性傳染病學更瞭然矣他不具論論其今日西醫謂傷寒感冒最易混入腦膜炎者約略辨之蓋汪企張之論傷寒為桿菌也則以傷寒凝集之血清混合培養之菌或直以病者之血清試驗培養之菌顯微鏡再三檢查之不明但觀其凝集與否凝集者為陽性否則為陰性又以凝集之力甚微弱者為異性傷寒或副傷寒吾不知凝集至若干成分為力強凝集至若干成分為力弱又不解陰性傷寒即是凝集之力弱者乎若據汪氏所說則陽性傷寒陰性傷寒與異性傷寒及副傷寒皆無確定之桿菌吾不知何以分晰其傷寒種類況傷寒而果有桿菌則凝集之血清有此菌何必而混合培養之菌病者之血清有此菌何必而試驗培養之菌足見培養細菌為傳染病之大黑幕此其一證其論流行性感冒為一個孤立或兩個連結菌也則與腦膜炎之雙球菌迥然不同今以感冒而可續發性腦膜炎其以一個孤立而可變作雙球菌乎抑以兩個連結而可變作雙球菌乎苟非從病者身體上之化學成分而變作之則當鼻腔咽頭傳染之時或一時並進或先後續至例以客觀唯物之現象何從而諦審之可見培養細菌為傳染病之大黑幕此又一證以故腦脊髓膜炎之為病不從症候上求認識而欲從細菌上求認識膠柱鼓瑟刻舟求劍無怪乎百治百死千治千死萬治萬死莫之一回生也彼西醫者曷不悚然懼怵然返乎然則國醫痙病之原因安在在乎時令已人在氣交中息息與之相通平常則為生理失常則為病理譬如同一自動機完好而能行駛者此機破壞而不能行駛者亦此機也今西醫必歸諸微生物之刺激是病理與生理判然兩途不能同條共貫若深造焉則知夏暑不能裘而裘者病冬寒不能葛而葛者病此科學自然之律令曾無微生物刺激其間者西醫誠由是深造終必有進乎國醫之一日況西人亦既知人為自然界之物質矣而科學萬能惟人不能製造不能製造其人則病理當於生理中求之病之寒熱虛實其關鍵系乎生理猶人之智愚賢不肖其關鍵系乎性靈律以科學之自然斷無更出此自然者今捨生理而求病理舍病理而求細菌不揣其本而齊其末是使方寸之木高於岑樓也可乎哉是故痙病為冬末春初之一大時令病也予承祖父六代之薪傳行醫三十餘年診痙病十有一屆往往見於冬之溫而行春令春之寒而行冬令初之暴發則必於冬末春初之交雷震痙作驟雪痙更作昨歲乾旱隆冬不雪今歲淫雨夏至不熱民二四之除歲先期雷震西醫之腦脊髓膜炎適開長沙市之新紀元也現在衛生行政省府不惜撥區款而防疫西醫組織聯合辦事處專司其事開湘雅醫院四層樓以納病者一面宣傳預防學校令其停課戲院禁其勿入社會人士相驚伯有惴惴然如洪水猛獸之驟至事寢長沙市五十餘萬之眾統計得病者百十有八人傳染病曾若是乎然亦不敢武斷決無傳染性質但較之國醫療治常年痙病毫無異同恨無紀錄可質證耳又湖南國民日報熱心服務社會欲以腦膜炎常識灌輸國人腦中混合中西醫學而研究之乃西醫謂今春病含性質三種竟詆國醫以魚目混珠不能辨傷寒感冒況能辨腦膜炎為痙病者乎然長沙市國醫機關林立露冷寒蟬噤不發聲獨衡陽曾公覺叟握管辨論達數十紙予省修先父墓一再之鄉遲遲乃返作痙病與腦膜炎平議投湖南國民日報適值截止予無以感主筆壺公也不能假一日之登載於是整修其文裁成步驟作為此書一曰正名二曰溯源三曰原因四曰辨症五曰類別六曰病理七曰診斷八曰治療九曰詮方十曰驗案總以西醫近數十年發明之腦脊髓膜炎為國醫五千年前舊有之痙病稽諸皇古往哲參諸海內時賢而以三十餘年之經驗診痙病十有一屆之艱苦備嚐寫之於字行間書成顏曰痙病與腦膜炎全書藉以為長沙市腦膜炎之新紀錄云嗟嗟老夫耄矣無能為也但願學國醫者欲存國醫不可不知西醫不知西醫何知西醫之粗疏尤願我國人而學西醫者亦當研究國醫勿徒攻擊國醫不知國醫何知國醫之精深幸勿為余岩氏非驢非馬不中不西之狂說所止試思我中華而國而家而身無一而不是不中不西非驢非馬也哉予之作此書也非獨不忍見吾同胞於水深火熱之餘復遭腦膜炎之慘禍不一伸手發揚國醫之特效靈方而挽救之也亦以國醫之痙病與西醫之腦脊髓膜炎比較並出孰精孰粗孰優孰劣使吾國人讀之自有上下高低之評判若以為抵抗西醫攻擊西醫豈知我哉弗較也矣民國二十四年五月湘鄉薖叟劉裁吾自序於長沙市西湖路西湖醫社
