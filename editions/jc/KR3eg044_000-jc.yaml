body:
  text: 例言一此書宗旨全在闡揚國醫之痙病而以西醫之腦脊髓膜炎比較出之使閱者一目瞭然判別中西醫學之優劣庶幾對於國醫痙病自有把握而後診斷治療不為西醫所眩惑故此書名曰痙病與腦膜炎一此書分為十篇一正名二溯源三原因四辨症五類別六病理七診斷八治療九詮方十驗案一篇演進一篇一層推深一層務使國醫痙病之原理完全發明於此不遺缺恨故此書名曰全書一西醫腦脊髓膜炎近年輸入吾國海內名賢各有論說見於醫報雜誌嘉定沈朗清收編為腦膜炎新書寧海嚴蒼山分疫痙為寒熱兩門療法編有腦膜炎家庭自療集是書將各家所有精華一併採入加以發明折衷一是俾此書辨晰精確治療妥當庶免疏漏之弊一國醫痙病漢張仲景發明主要症狀載諸金匱例以西醫之腦脊髓膜炎不能外是然唐宋以來不混合於癇病即誤認為驚風而痙病之廬山面目遂淹故是書第九篇詮方下其治癇驚或他病者冠以原治主症其專治痙病者冠以特治主症以資分別一國醫痙病不得以傷寒法治之亦不可以溫病法治之然傷寒溫病之壞症及其他種種均有類似痙病詳辨於第五篇類別惟此病灶在督而國醫六經督不在內故治太陽可以治督治厥陰亦可以治督故於第九篇詮方分作甲乙兩門甲則為宣發太陽之劑凡屬治太陽之方類焉乙則為開泄厥陰之劑凡屬治厥陰之方類焉一國醫痙病此書雖分最急性亞急性續發性三種究皆為暴病較諸普通病症狀稍呈險惡要非不治之症而西醫謂非豫期注射別無治法此西醫治療之黑幕未經海內揭破者故此書辨駁西醫治療之處痛斥其非未免言之過激有識者幸勿咎焉一國醫痙病古今絕少驗案近見醫報雜誌間有編入者似與春季流行之痙病治未吻合予業醫卅餘年前此十屆診治痙病頗有經驗悉錄入編症自鏡惜無存者今春僅診痙病十有一人獲愈者十焉故此書第十篇所載驗案惟此十案而已他未之及也一國醫古籍予家頗有藏收乃旋省之第四年歸里率被鼠齧蟻蝕付之一炬故此書引載古籍大半出自記憶絕少參考原本或有自他籍抄來者魯魚亥豕在所不免閱者諒之第一篇正名國醫之痙病西醫之腦脊髓膜炎也國醫以其病之形狀言之故曰痙西醫以其病之局部言之故曰腦脊髓膜炎今簡稱之為腦膜炎是也然國醫之痙病在國醫古籍上有稱之為痓者不可不為之辨論以正痙病之名稱焉內經五常政大論火曰赫曦赫曦之紀其病痓厥論手陽明太陽厥逆發喉痹嗌腫痓氣厥論肺移熱於腎傳為柔痓是痓之為病內經只有名稱而無症狀故其痓迄莫知為何病耳若痙之為病內經非特有其名稱而亦詳其症狀其在六元正紀大論有曰太陽所至為痙其在至真要大論有曰諸痙項強皆屬於濕其在熱病論有曰熱而痙者死腰折瘛瘲齘齒也綜此以觀則內經之論痓與痙顯有分辨不可混合如此傷寒金匱二書同為張仲景一人之所手出然傷寒言痓不言痙金匱言痙不言痓則仲景之論痓與痙似無甚分別故傷寒論曰結胸者項亦強如柔狀是項強一症內經屬之痙而此則屬之痓也又曰病身熱足寒頸項強急惡寒時面赤目赤獨頭面搖卒口噤背反張者痓病也此非但項強屬之痓而頭搖口噤背反亦屬之痓金匱引申傷寒原文六條而倍增之統計一十二條惟此條略為更改竟皆稱之為痙是傷寒之痓都變作金匱之痙矣然則仲景之論痓與痙在傷寒金匱一而二二而一不其無甚分別矣乎千金外臺遵傷寒而不遵金匱只稱之為痓朱奉議亦然謂剛痓屬陽柔痓屬陰亦稱之為痓惟成無己注傷寒論則引金匱之痙而改傷寒之痓後人信仰無己遂以為是自是隻有金匱之痙而無傷寒之痓矣若夫內經之痓更無人道及之者垂千餘年未敢或非方有執專論痙病謂痓系傳寫之誤喻嘉言起而和之亦謂痓系傳寫之誤縱喻氏反對叔和林億罪無己有逢君之惡未嘗以無己改痓為痙非之近世時賢輩出好學深思回溯古籍意欲分別痓之與痙各有所得悉錄而辨之如下汕頭蔡百星謂痓為病之名痙為病之症傷寒有痓諸風有痓仲景書中剛痓正病如太陽病發熱無汗反惡寒者是柔痓正病如太陽病發熱汗出而不惡寒者是故痓中亦有痙不痙痓輕而痙重痓而兼痙尤重究以何者為痙病則以經脈與筋強直角弓反張是也夫經脈與筋強直似合西醫之腦脊髓膜炎故西醫之腦脊髓膜炎謂之痙病則可謂之痓病則不可耳東平劉寅謂痙病以時發痓病不以時發此論尤確切西醫之腦脊髓膜炎為春季流行之病然春季流行之腦脊髓膜炎則以頸項強背反張為主症國醫謂之痙病宜也若流行於夏秋冬是不以時發者其症狀即酷似痙病未必以頸項強背反張為固定之主症謂之痓病亦屬無妨但不可以語春季流行之腦脊髓膜炎耳無錫陳無咎謂痓似盲腸炎而痙近腦膜炎則以痓與痙分為兩病不可相題並論蓋謂痓者窒也不但盲腸炎盲腸窒塞為痙即其他肝回管大腸管栓塞亦為痓與痙病從督上犯顯有不同此誠發人所未發陳氏學通中西對於吾國古籍不無會悟之處但謂傷寒脫一痙字金匱脫一痓字未必確切仲景之旨讀古人書當統全部論之觀仲景自序稱其書為傷寒雜病論蓋備論四季時令諸病而雜病即寓乎其中傷寒言痓金匱言痙兩書症狀毫無異同脫從何來況以痙濕痓三綱鼎峙合編於傷寒之末以見濕痓與傷寒各以時發而痙獨發於春季時令適合西醫之腦脊髓膜炎為春季流行之病即此一症足以證明仲景備論四季時令諸病也若夫盲腸炎為四時俱有之病風寒濕痓及其他種原因皆能致之近世所謂似痢非痢以及酒痢煙痢等等皆是不得與痙病並論也至陳氏以窒塞與栓塞解釋痓字似與痙病有別尤非通論盲腸炎盲腸窒塞固為痓血管栓塞亦為痓曷思痙病亦何嘗非腸腑窒塞與夫血管栓塞哉隋唐以下痙混於癇千金以小兒飽食過度即能成癇豈非腸腑窒塞之明證宋元以下痙誤驚風陳飛霞謂堵塞脾之大絡所致豈非血管栓塞之明證以此而論痓與痙有何咫尺千里之辨哉總之痓與痙之字義互相貫通無甚分別痓充至切爾雅惡也集韻風病正字通痓症有五引難經脊強而厥與金匱卒口噤背反張為證與痙無別也痙奇頸切說文強急也引內經諸痙項強皆屬於濕與方書頸項強急為證與痓無別也漢晉隋唐史志雖列痓與痙之症狀略有出入而察其病理毫無差異時代遞遷名詞更易魯魚亥豕尤多錯訛方有執喻嘉言謂痓系傳寫之誤此語予極佩服即如今日華譯之腦脊髓膜炎初譯之為腦脊髓熱症再譯之為腦衣炎熱症又譯之為腦脊髓熱症至是乃定為腦脊髓膜炎簡稱之為腦膜炎者不足見國醫之痓病即國醫之痙病後之學者其以國醫正名之痙病為西醫之腦脊髓膜炎也歟第二篇溯源國醫之痙病發源最早而西醫之腦脊髓膜炎曰腦曰脊一膜貫通一髓流行要皆概括於國醫痙病之內非西醫所能發明也考吾國古籍發明痙之病灶者莫如黃帝岐伯扁鵲仲景諸人素問至真要大論諸痙項強皆屬於濕夫項上通於腦下通於腎則腦脊髓膜炎之病灶在腦在脊項安得而不為之強乎靈樞熱病論熱而痙者死腰折瘛瘲齘齒也夫腦脊髓膜炎齘齒為常有之症而瘛瘲間亦有之惟腰在脊之中部則腦脊髓膜炎往往自大椎至薦骨發生疼痛腰安得而不為之折乎足見西醫之腦脊髓膜炎為國醫之痙病此其明證然西醫以腦為人身最高機關分大腦小腦延髓而脊髓在脊柱骨之管內上端連接延髓下端直至尾閭國醫則以整個督脈統之故西醫之腦脊髓膜炎為國醫督脈發生之痙病素問骨空論督脈為病脊強而厥靈樞經脈篇督脈實則脊強反折虛即頭重高搖難經督脈為病脊強而厥傷寒論督脈為病背脊強隱隱痛稽之吾國古籍則西醫之腦脊髓膜炎為國醫督脈發生之痙病歷歷足徵已若由痙之病灶而發明痙之症狀者中外古今惟仲景一人而已仲景之金匱有曰病者身熱足寒頸項強急惡寒時頭熱面赤目赤獨頭動搖背反張卒口噤者此痙病也此三十四字仲景一字一訣把今日之腦脊髓膜炎和盤托出可謂金針度人矣中外醫界當如何敬祝瓣香也但卒口噤為痙病之整個症候然在突起痙病則無有不卒然口噤者夫卒口噤而頭獨動搖頭熱面赤目赤接踵而至口不噤則頭不搖頭不搖則頭未必熱面目即未必赤矣若初起有前驅症候頭痛發熱嘔吐噁心而後發生痙病則口不噤者多若初發他病而續發痙病則口噤者絕少焉至於頸項強急背反張則為腦脊髓膜炎之主要症狀若頸項不強急背不反張即不得謂之腦脊髓膜炎此西醫所知也而卒口噤頭獨動搖時頭熱面赤目赤為今日腦脊髓膜炎之特異症狀則為西醫所不知何者西醫病理學從解剖得來此種特異症狀從何處解剖哉試細察仲景卒口噤之卒字而口不常噤可知其頭獨動搖之獨字而一身四肢不動搖可知其時頭熱面赤目赤之時字而有時頭不熱面目不赤可知此為國醫督脈發生之症狀即為西醫腦髓神經脊髓神經發生之症狀西醫只知神經之形質在腦與脊而潮紅灼熱腫脹疼痛謂之發炎而不知神經之形能發生卒口噤頭獨動搖時頭熱面赤目赤為解剖所不能得之病理況國醫督脈統制蹺維諸經即是腦與脊髓發生之神經蹺維諸經發生羊鳴僵仆等等症狀為國醫痙病所常見之症狀亦為西醫解剖所不能得之病理此皆西醫病理學之根本錯誤處故其治腦脊髓膜炎也不憑症候只憑雙球菌而孰知其雙球菌為不可憑者哉雖然此種特異症狀固為西醫解剖所不能知而國醫自仲景以後知之者亦少真象如巢元方之病源知有痙病而混於厥癇孫思邈之千金方亦知痙病而混於風癇食癇驚癇之內不立痙論此外王燾之外臺秘要許叔微之本事方陳無擇之三因方以及聖濟總錄和劑局方不以痙混於癲癇厥即誤認為驚風究之癲癇厥有不可以相混者類別於第四篇皆與仲景痙病之症狀相隔甚遠若驚風則鑄成九州之大錯錢仲陽醫學浩瀚為一代兒科聖手猶不免焉甚矣醫學之難言也劉河間朱丹溪赤水玄珠間亦論及痙病亦不以痙為獨立之門戶仍與厥癲驚癇無甚分別而痙病之真面目何由而得見國人乎若王海藏論痙知遵仲景而以項強背反屬之太陽低頭視下手足牽引肘膝相搆屬之陽明一目或左或右一手一足搐搦屬之少陽手足厥逆筋脈拘急統屬於太陰此是三陽及太陽能寒之類似痙症要未得仲景論痙之旨與西醫之腦脊髓膜炎不相符合喻嘉言謂痙者強也亦知遵仲景而以太陽之項強背反不能仰者指為太陽之痙以賅三陽以少陰之身𤸼足曲不能俯者指為太陰之痙以賅三陰此是三陽三陰傷寒之類似痙症亦未得仲景論痙之旨與西醫之腦脊髓膜炎不相符合此皆由於診斷之不確歷驗之不深也方有執遭家庭之變故痛膝下兒女之死於是者哭泣之餘辨論滔滔極斥抽掣搐搦為驚風之非迄今讀其遺書則方氏對於仲景論痙之旨亦未見引而不發躍躍紙上何況今之醫者不三折肱九折臂烏能循其當然而知其所以然哉然則腦脊髓膜炎之為吾國痙病者孰為之開始乎蓋自滬上諸醫開會研究定名為疫痙始也秦氏伯未折之以片言曰項強背反為痙蔓延傳染為疫痙病不傳染傳染者乃疫痙耳嚴氏蒼山又從而晰之曰今之痙病與普通痙病不同沿門合境大小相似可謂之疫氣痙病是皆言病不得為傳染之病必須沿門合境無間老幼互相傳染乃為疫痙不然雖百里千里之遙同時響應然不沿門遍戶無間老幼究系時令上之氣候所致只可名之為痙不可名之為疫耳近來中央國醫館統一病名表內歷舉國醫之厥癇驚風註釋於腦膜炎下而痙之名義又失矣國醫館意欲名之為痙則恐破傷風瘛狗咬以及產後鬱冒小兒急驚相濫而不知混於腦神經性者豈獨國醫痙病也哉其在病名表內科統一書中有化膿性腦膜炎結核性腦膜炎者其相濫為何如也況西醫他籍之腦膜炎尤為不少有自外器官來者如耳性腦膜炎鼻性腦膜炎等等有自內臟器出者如肺膿性腦膜炎肝膿性腦膜炎等等其相濫又何如也今日整理國醫不於診斷歷驗上確察其症候能否合於中外古今之病理而後標準其病名欲求其統一得乎此痙病之源流大概如此第三篇原因痙者春季之時令病也其原因由於冬之溫春之寒不有冬之溫則無火熱之內伏不有春之寒則無寒冷之外閉曷能卒然口噤頭搖而項強背反乎西醫謂腦脊髓膜炎為春季流行之病其原因由於雙球菌春令愈寒則雙球菌之繁殖愈劇不思自然科學之律令天氣寒冷成冰凍死動植物凍死微生物而雙球菌何能獨立存在哉此不足為腦脊髓膜炎之原因可為鐵案國醫往哲張仲景論傷寒而殿之以痙濕暍者蓋備論四季時令諸病故以痙為春季之病而與濕暍及傷寒發之於夏秋冬同為一例金匱引申傷寒而以痙濕暍三種合篇亦此意也後世注家有謂濕暍為痙之原因然則痙無獨立主權何能與之並立哉蓋不知濕暍之發痙則為痙之變症或為痙之類症而痙之主病則專司春季時令試觀今日西醫之腦脊髓膜炎可以恍然大悟矣歲序遞更寒暑往來氣之有盈有虧時之或先或後春溫夏暑秋燥冬寒四季時令未必循序漸進而不無先後差異之變者金匱從冬至夜半後起甲子而推算之謂有時未至而氣先至者有時已至而氣不至者有時已至而氣不去者有時至而氣太過者如冬令過暖而行春令是時已至而氣不至也如春令過寒而行冬令是時已至而氣不去也否泰剝復天地常理餘業醫三十餘年診痙病十有一屆類皆隆冬不雪氣候過暖春令嚴寒氣候不溫當痙病爆發之際春未至而雷震則痙作冬將殘而驟雪則痙亦作春寒彌厲痙病彌劇迨春分氣候漸暖痙少殺至夏氣候大熱痙遂止於此可概想其痙病之原因焉雖然痙病之由於冬溫春寒人猶易知而溫乃六氣之火化自古至今少有人道較難知之予於民二三年供職湖南國醫專校教授病理學新編風寒暑濕燥火為六氣致病之原理岳陽吳漢仙編入中西病理合參中對於燥火獨有發明茲節錄火字如下以供學者之參考焉火者熱化之作用消化物質紅而有焰黑而有垢絕端與暑不同證以今日之科學瞭然矣天文家稱空氣氧氮氫幾種元素混合成為氣體物質空氣充滿宇宙無處不到氧氣能助燃燒亦無處不到與內經風寒在下燥氣在上濕氣在中火遊行於其間火主遊行之說相合又地球未成立以前只此幾十種元素之氣體旋轉渦中由氣體凝成體質如太陽一團火溶液者然再由火溶液凝成固體而為地殼與內經燥勝則地干暑勝則地熱風勝貝地動濕勝則地泥火勝則地固火勝地固之說相合又太陽之體質屬火溶液為一極大火球能發烈強光輝地球繞日而行布滿空間溫度陰晦風雨溫度低降與內經燥以干之暑以蒸之風以動之濕以潤之寒以堅之火以溫之火以溫之之說相合然太陽之熱在天空中為火之極大且烈者而在六氣中何以為暑蓋夏月太陽可畏冬月太陽可愛則以距離之遠近分愛惡耳故夏月太陽近而發生火病西病華譯為日射病者正以其暑病為太陽光線所射耳若秋冬春太陽遠而發生火病何能歸咎於太陽哉此空氣中所以既有暑又有火也況太陽行北陸則寒行南陸則熱太陽有一定之行度寒暑自有一定之差率秋冬春何能有太陽之為病哉然亦未嘗與太陽無涉也則是天空之火地球之火得緣太陽光線以發其熱力秋應涼而反溫冬應寒而反溫春應溫而過溫雖太陽光線距離已遠不得正射赤道然不緣太陽光線以發其熱力則為陰晦風雨之日火病何由而致哉故火之為病則是天空之火地球之火得緣太陽光線以發其熱力耳故人只知風寒之所由來而不知溫熱之所由來只知溫熱為火之病而不知火為溫熱之所以然此痙病之火伏於內而寒閉於外所以為終古長夜也歟蓋人在氣交中呼吸吐納陰陽開闔關鍵全繫於四時之氣候冬至陽交初生春半升夏大升升極而降夏至陰生陽遂降矣降於秋者半降於冬者亦半今以冬之溫而反升春之寒而反降是升降失其職矣故冬溫而行春令春未至而雷震則痙作春寒而行冬令冬將殘而驟雪則痙亦作人身厥陰主闔應乎冬令冬溫內並則厥陰欲闔而不能太陽主開應乎春令春寒外閉則太陽欲開而不能其不奔注督脈發為痙病也得乎諸喻之以物理學取炭爐火盆燃燒於秘密房室中則溫度上升然不得房室之秘密則溫度照常放散何能上升故炭爐火盆之燃燒猶厥陰之熱內並也而房室之秘密猶太陽之寒外閉也又喻之以化學取冰冷強酸諸藥混合於冷水玻璃盆中則熱氣外發然不得玻璃之收貯則熱氣不被逼壓何能外發故強酸諸藥之混合猶厥陰之熱內並也而玻璃之收貯猶太陽之寒外壓也況以冬月之溫比之炭爐火盆過之冬溫為大自然界物理之刺激而混合人身之化學成分比之強酸諸藥又過之以故人身在內之熱主澎漲而在外之寒主收縮所以發為痙病也雷震痙作者厥陰內伏之熱被其衝動而上升也雨雪痙作者太陽外閉之寒被其壓迫外閉也迨過春至夏氣候上之寒冷退而太陽無外閉之寒氣候上之溫暖進而厥陰無內伏之熱斯時也欲求其痙不可得也然西醫既知人為自然界之動物而不以自然界之氣候為疾病之主人翁反欲假自然界之微生物為疾病之主人翁既以自然界之微生物為疾病之主人翁而又欲假動物為之媒介如瘧疾之由於蚊霍亂之由於蠅鼠疫之由於鼠而腦膜炎何獨無物以介紹雙球菌哉此西醫之生理不能貫通病理有令人萬難通曉者至腦膜炎之雙球菌抵抗熱之能力輕抵抗寒之能力強則是雙球菌之能力隨氣候之寒熱分抵抗之強弱姑勿論與自然之科學寒冷凍死植物微生諸物不相符合而雙球菌之能力尚欲隨氣候之寒熱以為抵抗之強弱可以人而不隨氣候以為轉移乎是則西醫遊於吾國之六氣之病理學中而不自覺也彼西醫者易不姑舍汝所學而從我哉第四篇辨症國醫之痙病憑諸症候當其病之初起一見而知痙病之發生西醫之腦脊髓膜炎不憑症候只憑細菌必至結果抽驗脊髓培養細菌而後知之試將國醫痙病之症候辨別而論列之乃知西醫細菌之學無足憑也然欲辨國醫痙病於今日能統轄西醫之腦脊髓膜炎者初起時代各有不同未可概論約略言之分為三種一曰最急性痙病二曰亞急性痙病三曰續發性痙病而痙病之症狀無遁形焉胡為最急性痙病也初起寒戰口噤昏僕於地旋即斃者其痙病之成立與否尚未可知若初起時期卒然發痙不即斃者頭之溫度最高足之溫度最低此病者自知之他人不得而知之必於痙罷之後可詢病人而知之也試問今日之患最急性腦脊髓膜炎者有此頭熱足寒之先兆否況頭之溫度不高則人身之水液血質不能充滿於腦貫注於背必不能灼熱潮紅腫脹疼痛而發炎此無須乎解剖而可推測者至口噤一症更可從生理而證明其病理口不噤則呼吸氣管不能收縮而其水液血質亦不能充滿於腦貫注於背烏能巔頂高腫而肚腹陷沒如舟發生腦脊髓膜炎之重篤者惟其水液血質一時沖激則最急性之痙病不即斃者頭獨動搖面赤目赤頸項強背反張其痙病之主要症狀乃得完全而發現此為國醫最急性痙病之成立胡為亞急性痙病也初起手足麻痹嘔噦交作惡寒則足寒尤盛發熱則頭熱尤盛此為痙病之症候故初起一二日或一星期頸側之動脈管額角之動脈管耳前之動脈管澎漲跳躍頭痛最烈頭上溫度最高或巔頂高腫斯為西醫所謂灼熱潮紅腫脹疼痛而發炎漸致頸項強背反張現出痙病之主要症狀此為國醫亞急性痙病之成立胡為續發性痙病也初起惡寒發熱頭痛骨節痛或口渴自汗或口苦咽乾目眩此皆伏氣溫病之見症非痙病也若頭痛在腦後風池風府之分則伏氣從太陽而出若頭痛在腦前眉心之分則伏氣從陽明而出若頭痛在腦側頷厭或耳前和窌之分則伏氣從少陽而出醫者治不得法或過服升散或早服寒涼或誤服溫補皆足以致痙一見頸項強背反張則為痙病之主要症狀即為國醫續發性痙病之成立要而言之頸項不強背不反張其病灶上不在腦下不在背即非西醫之所謂腦脊髓膜炎也故除頸項強背反張為國醫痙病之主要症狀外其餘諸症時有時無忽現忽沒或周身麻痹或兩腳彎曲或神經過敏或神識昏迷或顏面掣動或手足瘛瘲或巔頂高腫或肚腹陷沒或目上視或口噤不語此種症候只為國醫痙病常有之見症而不可為國醫痙病之主症也然其中頸項強背反張與夫目上視口噤不語四症又有初起進行不同不得不分辨於下一頸項強為痙病初起之症候而身體強則進行矣頸項強者強在局部身體強者強在周身也二背反張為痙病初起之症候而角弓反張則進行矣背反張者頭向後仰背為之反張角弓反張者頭與臀撐住其身則背部全體作弓形之狀也三目上視為痙病初起之症候而目眩轉則進行矣目上視者目系之因腦後仰而目珠上竄目眩轉者目珠眩運旋轉而睛不定也四口噤不語為痙病之初起症候而神昏不語則進行矣口噤不語者牙關緊閉則不能語神昏不語者神識昏迷則不知語也綜上症候觀之雖初學國醫者莫不知為痙病之發生鑿鑿可據毫無疑義何必如西醫之腦脊髓膜炎必至焦頭爛腦抽驗脊髓培養細菌而後知之哉至西醫謂腦膜炎之灼熱而非體溫尤不可不辯夫人之體溫只一耳平常則為生理失常則為病理灼熱即是體溫之奔集於局部也故體溫之奔集於腦者即為腦膜炎之灼熱當其卒然奔集之時兩頸人迎脈管之搏動兩額頷厭脈管之搏動耳前和窌脈管之搏動搏動之極即腫脹疼痛之極腫脹疼痛之極即灼熱潮紅之極或頭部之熱如蒸籠或口鼻之氣如火烙況體溫上奔不能衛護周身則周身惡寒且體溫上奔而在下之溫度低減則惡寒之候尤覺兩足如冰如鐵倘能以檢溫器測驗之頭上之溫度必高達於極點足下之溫度必低達於極點惟其足下之溫度低而頭上之溫度高斯其水液血質充滿於腦貫注於脊於是凝而不動結而不散而腫脹而疼痛而潮紅而灼熱此腦脊髓膜炎所由成也張山雷謂近年來發生一種時疫雖與中風之腦充血見症不盡符合而其氣火上衝理無二致時逸人謂時行痙病其在進行時間腦及脊髓呈顯著劇烈之充血蔡百星謂無論如何痙症總是腦部或充血或鬱血或出血或積水遂致牽動神經發生痙攣現象此皆水液血質充滿於腦貫注於脊之說也豈有細菌作祟於其間哉譬如夏月之癤子彼西醫認為發炎矣不謂之細菌而竟謂之暑熱刺激又如冬月之凍瘡彼西醫亦認為發炎矣不謂之細菌而竟謂之寒冷刺激推此可以知彼觀外可以知內何獨於腦脊髓膜炎而必有雙球菌作祟於其間哉不徒見科學醫之杳渺無憑誕妄不經矣乎第五篇類別國醫之痙病最足以混亂西醫之腦脊髓膜炎者其惟痙之類症乎若不扼定痙之病灶在腦與脊痙之症候在頸項強背反張而欲恰合西醫之腦脊髓膜炎絲絲入扣不差銖黍得乎欲凡病之類乎痙者試舉而辨之如下素問至真要大論諸痙項強皆屬於濕諸暴強直皆屬於風諸熱督瘛皆屬於火巢氏病源太陽中風重感寒濕則成痙千金方溫病熱入腎中則為痙醫門法律六淫之邪至於成痙乃病之最多最深最易惑人者薛生白濕溫篇濕溫症二三日即口噤四肢牽引拘急甚則角弓反張溫病條辨有寒痙有風痙有溫熱痙有暑痙有濕痙有燥痙此言六氣之類痙當辨者項強固為痙病之正式症狀而謂諸痙皆屬之濕意者國醫往哲以項上通於腦下通於脊其發痙也因有水液之停蓄故謂之濕也不然濕亦何能統括諸痙哉強直亦為痙病常見之症然不得謂之主症而瘛與痙為二病不得混合於痙故皆為類病也巢元方謂中風重感寒濕則痙此係或有之症夫風之一端即足以致痙矣何必重感寒濕哉喻嘉言吳鞠通推廣六氣而泛言其痙殊難索痙之真象此皆不足以語西醫之腦脊髓膜炎也千金謂溫病熱入腎中則痙蓋凡溫熱暑濕之病篤或誤治致成壞病者每多發痙然未必拘定入腎總與西醫之腦脊髓膜炎有別薛氏謂濕溫病甚則角弓反張有似西醫之腦脊髓膜炎矣然腦脊髓膜炎之主要症狀則在頸項強背反張而薛氏必至濕熱病劇乃有角弓反張之象此亦痙之類症故薛氏於濕溫病篇中自注此條謂其痙每與厥相連厥回而痙解則生厥不回而痙劇則死試觀西醫所謂腦脊髓膜炎者幾見其痙與厥租連乎然薛氏謂火竄則痙火鬱則厥蓋顏面抽掣手足瘛瘲即是火竄則痙之症手足厥冷體厥脈厥即是火鬱則厥之症薛氏又謂夏月之痙與霍亂同出一源夫霍亂感受夏月之暑濕耳而其痙之與厥固系暑濕為病與春月之痙未必拘定厥者其原因顯然不同況春月之痙直接暴起而夏月之痙每因他病傳變如霍亂轉筋入腹加以手攣足踡即是痙症痢疾過服升散或堵塞太早亦致痙症小兒夏月吐瀉往往發生慢脾風此皆痙之類症不同乎春月之痙也靈樞經筋篇足太陽之筋病脊反折項筋急肩不舉腋支缺盆中紐痛不可左右搖足少陰之筋病主癇瘛及痙在外者不能俯在內者不能仰故陽病者腰反折不能俯陰病者不能仰經脈之病寒則反折筋急熱則筋弛縱不收陰痿不用陽急則反折陰急則俯不伸金匱太陽病發熱無汗反惡寒者名曰剛痙太陽病發熱汗出不惡寒者名曰柔痙太陽病其症備身體強兀兀然脈反沉遲此為痙太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙張氏醫通痙止屬太陽而不及他經者何也蓋痙必反張其病在督背之經絡惟太陽與督脈耳言太陽則督必在其中矣薛立齋足三陰痙手足厥冷筋脈俱急汗不止項強脈沉太陰則四肢不收少陰則閉目合面厥陰則頭搖口噤王海藏發汗大多因致痙身熱足寒項強惡寒頭熱面腫目赤頭搖口噤背反張者太陽痙也若低頭視下手足牽引時膝相搆者陽明痙也若一目或左右斜視並一手一足搐搦者少陽痙也手足厥逆筋脈拘急者太陰痙也喻嘉言項強背反不能仰者太陽之痙以賅三陽身踡足曲不能俯者太陰之痙以賅三陰此言六經之類痙當辨者然國醫之痙病為督脈發生之病固與西醫之腦脊髓膜炎相合但六經無督脈惟以太陽厥陰之痙屬諸督脈也故太陽之經在背兩行言太陽則督在其中誠有如張氏醫通所云者即可知厥陰之腧在背項厥陰與督脈會於巔頂言厥陰則督亦在其中也又六經惟厥陰包管神經而督脈實能統領神經故西醫之腦脊髓膜炎不能外國醫之督脈以言溝通即不能外太陽厥陰以言溝通也非此則陽明少陽太陰少陰之痙皆與督脈不相涉皆為痙之類症也靈樞陽病者不能俯陰病者不謂仰督脈統制諸陽能仰而不能俯故今日之腦脊髓膜炎無一能俯者其屬諸督脈也無疑矣薛立齋分三陰王海藏分三陽與太陰喻嘉言以太陽賅三陽太陰賅三陰皆痙之類症非正式痙病也況喻氏以項強背反不能仰者為陽痙夫既項強背反即有仰之現象胡為項強背反而猶謂之不能仰者此喻氏絕少經驗之談也金匱之剛痙柔痙唐容川注為痙病門中主中之賓不得稱為正式痙病確有見地令人欽佩足見西醫之腦脊髓膜炎非剛痙柔痙之比但剛柔二字仲景明明以有汗無汗惡寒不惡寒分之毫無疑義而朱奉議謂剛痓屬陽柔痓屬陰固非後世以剛痙即急驚柔痙即慢驚亦不可解近日又以神經興奮為剛痙神經衰弱為柔痙尤屬想像之詞況內經柔痓王冰注以骨弱不舉筋緩無力為解而仲景傷寒謂項強如柔痓狀是柔痓亦有項強之症與王注大相反對則剛柔二字如不以仲景有汗無汗惡寒不惡寒分之只可付之郭公夏五之例若欲強解之亦不達矣素問六元正紀大論太陽所至為痙少陽所至為瘛素問生氣通天論血菀於上使人薄厥素問調經論血之與氣並走於上氣復返則生不返則死千金方小兒癇熱盛亦為痙癇有三種有驚癇有風癇有食癇張元素癇與痙亦驚風之類陳藏器驚癇即急驚王云鶴痙癇驚風統為腦膜炎此言驚癇瘛厥之類痙當辨者吳鞠通曰後人不分痙瘛厥為三病統言之曰驚風熱痰曰角弓反張曰搐搦抽掣方有執作痙書其或問中混瘛為痙葉桂臨症指南治痙癇厥最多而混稱痙厥無瘛之名目亦混瘛為痙究之痙者強直之謂後人所謂角弓反張前人所謂痙也瘛者蠕動引縮之謂後人所謂搐搦抽掣前人所謂瘛也然搐搦抽掣之謂瘛而時作時止止而復發或數日一發或數月一發發不待治而自止者癇也吳氏此論對於痙瘛癇頗有分析然千金謂小兒癇熱盛亦為痙予以臨床事實證之小兒每發搐搦抽掣醫家病家呼為驚風然有一發而止有一日數發或數日一發者千金謂之小兒癇實相符合若熱毒重篤或治不得法乃得有頸項強背反張之現象千金謂之熱盛為痙亦相符合然其癇有起於驚嚇者有起於感冒者有起於食積者較之吳氏之論癇數月一發發不待治者有間矣至吳氏論厥謂四肢冷如冰者為厥則是謂四肢熱如火者為厥則非也仲景傷寒熱深厥深則是熱在裡而寒在表乃謂之熱厥若溫熱暑濕之為厥病則厥每與痙相連薛氏濕溫篇中已言及之而葉氏臨症指南連類並稱者亦多皆四肢厥冷之厥而無四肢火熱之厥若以厥與痙瘛癇三者並立為病名則是內經之厥巔疾即西醫之腦充血昏瞀眩僕或失知覺或失運動正內經所謂大厥薄厥也山東張伯龍蘭溪張山雷天津張錫純論之最詳且盡又非以四肢厥冷為厥也近日有因腦脊髓膜中而有水液血質認為腦充血者豈知西醫之腦充血為國醫之痙病久已訛為中風若果為腦充血則今日之中風者幾見有頸項強背反張如西醫之腦脊髓膜火者乎此固無庸辨也金匱新產血虛汗出喜中風故令病痙此言產後之類痙當辨者予屢診產後頭暈汗出面赤目眩齘齒言蹇手足蠕動或拘急即斷為產後病痙而頸項強者間有之若背反張者則未之見焉此不可認為西醫之腦脊髓膜炎也金匱太陽病發汗大多因致痙風病下之則痙復發汗必拘急痙病有灸病難治此言誤治之類痙當辨者然予自診驗誤治致痙之病則目上視口齘齒手足瘛瘲肌肉掣動皆為常見之症惟口噤不語者間亦有之而頸項強背反張者絕少焉誤汗誤下固足以致痙而誤溫誤補誤灸誤針以及誤行注射尤足以致痙其發痙也皆與相醫之腦脊髓膜炎有別予引一案以證之可概想其餘已昨夏某木匠之子年四歲患赤眼已久泄瀉黃漿七八日其母述其瀉下黃漿沾人衣袴浸入腿上皮肉如錐刺痛目陷面色青慘請診之已服仙方胃苓湯矣予與宣營透熱解毒之劑甫煎服旋更仙方以附子理中湯與之明晨西醫注射痙作目上視手足瘛瘲曾未見有項強背反之症其父灌如意油七八瓶活雞以覆腹登時氣喘痰湧而死如此混亂之足以致痙者非止一端如妄灸妄針妄挑羊毛疔皆此類也第六篇病理病理者吾身生理上之起變化而失常也然吾身之生理胡為起變化而失常哉蓋人在大自然界中息息與空氣相通日月遞更寒暑往來衣則冬裘夏葛飲則冬湯夏水南冰洋北冰洋之無寒暑不能繁殖民族足見世界民族之生理莫不隨大自然界之氣候為轉移故氣候循其常度則冬月之寒夏月之暑猶當避之不避則病況氣候變異而吾身之生理得不隨之起變化而失常哉於以是知西醫細菌之學其為駢指贅疣矣乎若以細菌為病理則與生理豈能貫通哉近世余岩輩欲廢國醫之六氣而講西醫之細菌何其於生理學夢夢也傷寒之為短桿菌腸炎之為窒扶斯菌肺炎之為短鏈菌赤痢之為橢圓菌痎瘧之為胞子蟲近世驗之皆知非病原之固定物則腦脊髓膜炎之雙球菌亦非固定物也於此可推矣然腦脊髓膜炎之初起有謂混合纖維性肺炎及氣管枝炎等症併發與國醫往哲葉桂溫邪犯肺逆傳心包之旨相合不知腦脊髓膜炎為春季流行之病含有時間性質不可移易者若如葉氏所說則去歲亢旱氣候溫暖至冬不雨今歲淫雨氣候寒冷至夏不熱而長沙市之腦脊髓膜炎何以不發於去冬之溫暖而竟發於今春之寒冷乃知葉氏之說只為外感溫病言之與西醫之腦脊髓膜炎不能溝通也故病理根諸生理而生理根諸大自然界之氣候則知腦脊髓膜之發炎皆含時間性質不可移易者歟試以最急性之痙病言之頃刻之間胡為而神昏僵仆胡為而口噤不語胡為而頭動搖面目赤胡而頸項強背反張若不為之闡發申明孰知吾身之病理根諸生理而生理根諸大自然界之氣候哉論略述之如下國醫內經肺主呼吸而合皮毛一呼則周身毛竅皆闔一吸則周身毛竅皆開是吸收養氣在鼻竅而吐出炭質在毛竅猶飲食在口而排泄在二便也夫炭質者新陳代謝周身之老廢成分也若不以皮膚之汗垢汙濁為毛竅之炭質則鼻竅之炭質從何驗之哉西醫謂肺主呼吸竅在鼻孔皮膚亦主呼吸竅在毛孔猶人之口主飲食而二便亦主飲食也況鼻竅吸養吐炭而毛竅亦吸養吐炭非特其學說支離羝牾而人身之生理不其無系統矣哉故四時之氣候與吾身之呼吸相逆則自毛竅而入入則抵抗其病隨時即發如風之有咳逆上氣寒之有鼻塞噴嚏暑之有喘喝濕之有胸痞燥火之有咽喉乾燥毛竅一有障礙而其影響遂及於肺此其明證若四時之氣候與吾身之呼吸相順則自鼻竅而入入則服從其病必過時乃發內經所謂冬傷於寒春必病溫春傷於風夏必飧泄夏傷於暑秋必痎瘧秋傷於濕冬生咳嗽者蓋盈天地間皆空氣空氣之有浮沉斂散是即寒暑燥濕為四時之氣候人在天地間不外此空氣之浮沉斂散即不外此四時之寒暑燥濕以為生活故處乎散浮之時更沉斂之氣候而為病處乎沉斂之時更浮散之氣候而為病此即所謂伏氣也吳鞠通謂伏氣為病以寒暑二氣為最多蓋以寒則為沉斂之極而暑則為浮散之極也陸九芝張山雷陳無咎輩見不及此謂只有外感而無伏氣遂疑內難仲景伏氣之非今以西醫之腦脊髓膜炎證之可以恍然大悟矣然國醫痙病之由於溫熱海內名賢莫不知之然不發於冬月之溫暖而竟發於春月之寒冷者蓋大自然界之氣候變異而吾身之生理亦隨之變異冬月之氣候當寒冷而反溫暖則吾身之生理當沉斂而反浮散春月之氣候當溫暖而反寒冷則吾身之生理當浮散而反沉斂故無冬月之溫暖則厥陰無火熱之沖激無春月之寒冷則太陽無寒水之收縮以故冬行春令而將終則天空流電之氣忽然摩蕩而發聲故雷震則痙作此即火從厥陰沖激之明證春行冬令而初至則天空寒冷之氣忽然凝結而成質故雨雪則痙作此即寒從太陽收縮之明證是以腦脊髓膜炎之為病少小多於壯老者以少小稚陽生理之氣機浮散也女性少於男性者以女性沉靜生理之氣機沉斂也蓋病理根諸生理而生理又隨乎個人之體質以故腦脊髓膜炎之為病六經中之太陽愈收縮則厥陰愈沖激此所以卒然神昏而口噤也此所以頭獨動搖而面目皆赤也此所以頸項強而背反張也厥陰在內之沖激愈厲而太陽在外之收縮愈緊於是而兩腳攣急屈不能伸於是而肚腹陷沒如舟於是而巔頂高腫水液血質充滿於腦貫注於脊西醫所謂灼熱潮紅腫脹疼痛一齊並至此為國醫痙病最後之結局西醫至此時期乃能承認為腦脊髓膜炎其測驗病原之粗疏為何如也然則國醫痙病不屬之太陽不屬之厥陰而必屬之督脈者蓋以腦之與脊為督脈之局部項強背反為督脈之病症故西醫病理學謂腦膜炎之在腦與脊無非為國醫痙病添註腳矣特以西醫之腦膜炎必須從腰椎吸取脊髓如牛奶者乃為腦脊髓膜炎否則為傷寒為流行性感冒試問傷寒與感冒幾見初起有神識昏迷口噤不語者乎幾見有頭項強背反張者乎若必須如是而後斷之為腦脊髓膜炎則西醫病理學中詳列其腦脊髓膜炎之病狀何為也哉第七篇診斷國醫痙病之症候既如前述而痙病之脈象又詳辨焉脈經曰痙家其脈伏堅直上下行金匱曰痙脈按之緊如弦直上下行又曰痙家脈築築然而弦直上下行夫所謂伏者非潛伏不見之脈乃病毒鬱滯於血分之中不得發越於外則寸口脈管之搏動處亦收縮潛伏舉之不見按之乃得則是痙脈必見之於沉部乃為伏也堅即緊如弦也築築然搏而有力之象不外乎堅耳然緊已如轉索而應手似堅矣乃又如張弓弦是堅而有脊之象狀如蠶之僵直無往來悠揚之情無高低起伏之狀故曰直上下行也雖然直上下行者督脈應見於寸口之現象舉之浮而直上下行則為督陽外越之象按之沉而直上下行則為督陽內閉之象脈經曰尺寸俱浮直上下行此為督脈當腰脊強痛不得俯仰大人癲病小兒風癇又曰脈來中央浮直上下動者督脈也動苦腰背膝寒大人癲小兒癇皆以浮而形容督陽外越之現象故為癲為癇而不為痙若為痙則脈沉而不浮矣夫督脈統督諸陽為諸陽之首督陽外越或癲或癇則其脈直上直下何至一時拘急收斂而為痙哉夫痙病之發生一方面由於厥陰之沖激一方面由於太陽之收縮故督陽內閉不能發越於外此脈之所以直上下行而見之於沉部也然則診察痙病之脈則於沉部之內即可得痙脈之真象乎猶未也則必於痙發之時方可見痙脈之直上直下未發則無是象既發亦無是象猶如瘧脈自弦未發不弦既發亦不弦但瘧發之時間較長痙發之時間較短診痙之弦每難於診瘧之弦然則診之於何時乎蓋當頭獨動搖兩目上視之時見其兩頸之人迎搏動兩額之頷厭搏動兩耳之和窌搏動則按其寸口沉部乃有直上直下之真象若徒頸項強背反張而頭不動搖目不上視則無是象也若頸項強進而為身體強背反張進而為角弓反張則一身四體無不痙矣其直上直下之脈象非獨見之於沉部而亦見之於浮部痙至此危矣哉或者曰子言痙脈之直上下行也頭動搖目上視只見之於沉部不見之於浮部若至身體強角弓反張不僅見之於沉部而亦見之於浮部則吾既得聞命矣然徒頸項強背反張而頭不動搖目不上視則診斷上之脈象又何如予曰子未審仲景痙脈之難診乎予以經歷十餘屆之痙病而後知仲景之論痙脈曰按之緊如弦直上下行曰築築然而弦直上下行是皆見之於頭動搖目上視之時也若頭不動搖目不上視則或沉而細或沉而遲或於沉細沉遲之中兼澀兼散兼弱兼短治之得法或由沉而浮或由細而大或由遲而數預料其痙之欲解可斷然者若頸項強變而為身體強背反張變而為角弓反張則病者已無頭搖目竄之症候矣而其直上下行之脈象則舉手可按而得也子欲診痙病得予說而審察之其然其不然乎仲景更推論痙之脈象一則曰太陽發熱脈沉而細名曰痙再則曰太陽病其症備身體強兀兀然脈反沉遲此為痙是於痙脈之弦緊及築築然而弦直上下行之外申說沉細沉遲足見弦緊及築築然而弦直上下行之脈象必見之於頭動搖目上視之時也仲景而後其有研究痙脈者惟喻嘉言一人而已然喻氏不能尋出痙之主要症狀即不能得痙之主要脈象故不能離開三陰三陽之傷寒而論痙病即不能離開三陰三陽之傷寒而論痙脈然自知歷驗不深故論痙脈之末結之以一語曰未知其能弋獲否喻氏之不肯欺人如此且夫仲景之論痙病實能溝通西醫之腦脊髓膜炎認症既確立論自深只怪讀者之不得其旨趣也西醫之論腦脊髓膜炎曰肚腹陷沒如舟國醫之論痙病曰暴腹脹大為欲愈一論痙之前症一論痙之後症夫不有肚腹之陷沒而暴腹脹大為病劇何反為欲愈耶則知病前氣機之上逆而腹陷如舟病後氣機之下降而腹暴脹大此仲景所以不謂之痙劇而謂之痙欲愈也然既有欲愈之症即有欲愈之脈故金匱曰發其汗已其脈如蛇蛇者有屈曲柔軟之象有悠揚暢達之情即是脈象之不弦緊不弦急不直上下行也苟有弦緊弦急直上下行之象即為痙之未愈故金匱又曰脈如故反伏弦者痙是雖有暴腹脹大之症而其脈之沉部反有弦緊弦急之象故其痙未欲解也若欲解之外必有漐漐之微汗內必有沓沓之泄矢而腹脹自消矣腹脹消而項即柔背即直其脈象之弦緊弦急直上下行乃得而自解矣此金匱未發之奧旨予則引而申之者也近賢時逸人編痙病於急性傳染病學而於診斷門中但論痙症不論痙脈謂後腦痛項強為痙病之特徵而不知頭向後反不能前俯即仲景之所謂背反張者亦為痙病之特徵若無此一症則後腦痛頸項強為中風傷寒之太陽經症不得謂之痙病也謂兩腿屈而不伸或大腿與小腿不能自由行動即仲景之所謂腳孿急者夫痙病至於腳孿急惟痙之重篤者有之而輕者未必有此症狀也謂抓其手心恆無癢感此係痙之輕者若重者神識昏迷刺其四肢周身猶無感覺況搔其手心乎予引申時氏之論而推言其歷驗如此西醫診斷腦脊髓膜炎非但不憑之脈象而亦不憑之症候矣謂憑之症候最易誤會非檢出病原菌診斷萬難確切夫病原菌者即雙球菌也則以針刺入病者之腰椎吸取髓液清者無足論矣若濁者放置培養基與固形培養基化生雙球菌經過染色乃得為腦脊髓膜炎之證據然人身諸凡水液之清者為分泌液濁者為腐敗質今必以腦脊髓液之膿汁如牛奶者乃得為腦脊髓膜炎苟其痙不致於劇烈其液必清而不濁即或頸項強背反張確見其病之在腦與脊亦不得謂之腦脊髓膜炎則腦脊髓膜炎是無輕重淺深之別耳然則何以同此腦脊髓膜炎之為病則毛孔之汗垢有酸臭者有不酸臭者口鼻之唾涕有黏濁者有不黏濁者二便之排泄溲則有清白黃赤之分矢則有黑黃紅醬之辨腦脊髓膜之髓液何獨無清濁之辨耶況西醫嘗謂取其分泌液尚可製造一種純粹之細菌何況取其腐敗質耶更查西醫微生物學雙球菌亦為淋病之原因是非特取其脊髓之腐敗質可製造雙球菌而溺管之腐敗質亦可製造雙球菌果以細菌為憑則淋病謂之腦脊髓膜炎也可腦脊髓膜炎謂之淋病也亦可西醫斷不如是之顛倒糊塗也則當以症候為憑矣以症候為憑則腦脊髓液之清者其病輕而淺腦脊髓液之濁者其病重而深也由是以譚則吾國學者之診斷痙病常以症候為首務脈象次之而雙球菌之杳渺無憑其不得診斷上之價值也無須言矣第八篇治療國醫之治療痙病既不得以治傷寒法治之亦不得以治溫病法治之蓋痙為督脈之病治療督脈即所以治療西醫之腦脊髓膜炎也然西醫之病理從解剖屍體而來總括腦膜炎之病狀不外乎腦腔之隙縫瀦溜膿汁腦網之血管充滿汙血而已然膿汁為水液之所釀汙血為血質之所化故腦膜炎之灼熱潮紅腫脹疼痛皆基於水液血質之為病故西醫有所謂化膿性腦膜炎者即此水液血質之所化有所謂結核性腦膜炎者即此水液血質之所結水液血質之充滿於腦貫注於脊即為腦脊髓膜炎之發炎故欲講治療於今日從前一層言之則當使水液血質之不起變化而腦膜炎之不能成立從後一層言之則當使水液血質之還返乎變化而腦膜炎之即行消散斯為治療腦膜炎之要素即為治療痙病之要素焉然總括國醫古今之治療痙病者約有二端一曰宣發太陽一曰開泄厥陰從前一層而言宣發太陽者使周身之毛孔不為寒冷外閉則痙作即罷炎何由而成乎開泄厥陰者使周身之脈管不為火熱內沖則痙作亦罷炎何由而成乎從後一層而言太陽寒水外閉即是水液凝結水液凝結則灼熱潮紅腫脹疼痛腦膜炎所由成也宣發太陽之寒水則水液消散腦膜炎亦隨之而消散矣厥陰火熱內沖即是血質凝結血質凝結則灼熱潮紅腫脹疼痛腦膜炎所由成也開泄厥陰之火熱則血質溶解腦膜炎亦隨之而溶解矣夫痙為督脈之病溯其由來外則寒冷外閉治太陽之表即以治督內則火熱內沖治厥陰之裡亦以治督督病由於大陽厥陰故從太陽厥陰以為治炎之未成可以不成炎之既成可以即消予從學識經驗上標準之總以太陽厥陰為治療痙病之定義焉豈治療傷寒溫病之所可比擬乎或謂西醫解剖屍體放大顯微鏡見其小小黑點雜峙於髓液血球中即以為菌今宣發太陽開泄厥陰亦能消滅此菌也耶予曰髓液血球有此黑點是在既死之後為屍體腐化之色素指以為菌或者似之若在未死之前果有此菌則吸取腰椎髓液之混濁足以證明雙球菌為腦膜炎之原因何必經過培養基與固形培養基而後有雙球菌之發現耶更查西醫治療諸法如血清注射如水蛭吸囓如抽椎髓以減輕腦壓如灌鹽水以洗濯脊腔以及其他等等從無一法以撲殺此雙球菌者則知雙球菌之為腦膜炎原因不其虛設矣乎邇來東醫治療腦膜炎不講細菌用走馬湯以峻下之用水銀劑以頓挫之雖從國醫古籍治療痙病中得來究不知宣發太陽使水液消散開泄厥陰使血質溶解之為愈也即使髓液血球中有此黑點亦消歸子虛烏有耳況國醫以腦膜炎為痙病憑諸症候治法不一豈同西醫診斷腦膜炎不分淺深輕重而無一法也哉故國醫痙病之有最急性者則西醫之所謂電擊性腦膜炎如電擊人登時即斃是也初起寒戰口噤猝然昏僕鼻竅之呼吸一時停頓而循環之血管遂致閉塞不通故以錐刺其兩手爪甲或曲池委中諸穴無血則死此國醫之所謂內閉外脫者若有血即為不死之症初刺之紫而黑再刺之紅而活當以飛龍奪命丹合紫雪或行軍散臥龍丹或陳氏蟾酥丸羅氏牛黃丸薖叟腦脊消炎丸磨化急急灌下則宣發太陽之寒冷外閉須臾汗透周身而神醒矣神醒則毛竅開而鼻竅之呼吸如故而循環系之器官自然流通輕則以傷寒論之黃芩湯加減重則以千金方之龍膽湯加減或兼服薖叟腦脊消炎丸羅氏牛黃丸陳氏蟾酥丸開泄厥陰之火熱斯水液血質不致充滿於腦貫注於脊即不致灼熱潮紅腫脹疼痛而發炎耳故痙罷之後則厥陰回血管之熱毒泄之於小便則小便碧黃赤黑泄之於大便則大便黑紅黃醬若還之於皮膚毛細管則往往發疹見之於頭面頸項者多見之於上肢胸腋者次之見之於下肢膝腿者絕少足徵腦膜炎之為病則為厥陰迥血管之熱毒上衝散之於皮膚毛細管外出而為疹西醫所謂匐行疹或薔薇疹或即消性紅疹者是也然不獨最急性之痙病則然而亞急性與續發性亦莫不然張山雷以白虎湯加紫雪治愈痙病之後每見發疹於兩頤兩頰謂系少陽陽明風火使然殆有一間未達歟又國醫痙病之有亞急性者初起發熱頭痛嘔吐噁心今春長沙市西醫認為腦膜炎之前驅症候即此亞急性痙病也既不寒戰口噤又不猝然昏僕病發二三日或一星期漸見頸項強背反張目上視口齘齒腳攣急乃亞急性痙病之症傷寒論之黃芩湯加減千金方之龍膽湯加減皆可混合紫雪或兼薖臾腦脊消炎丸羅氏牛黃丸陳氏蟾酥丸或玉樞丹太乙紫金錠宣發太陽之力輕開泄厥陰之力重如法服之無不立效若項不強背不反目不上視口不齘齒腳不攣急即不得謂之正式痙病正西醫所謂流行性感冒者蓋感觸春月之風寒隨體溫化熱而為頭痛發熱嘔吐噁心之時令病主以辛涼佐以苦降亦無不效焉又國醫痙病之有續發性者初起本非痙病而竟作痙病者往往於春令寒冷之際病發三五日或一二星期突然變生頸項強背反張是為續發性之痙病如初起頭痛只在腦後風池風府之部兼見嗇嗇惡寒翕翕發熱腰痛骨節痛脈左右俱浮緊或數此為伏氣傳出太陽之病而續發痙者如初起頭痛在腦前額顱之部兼見壯熱口渴自汗脈右手浮洪或洪而數此為伏氣傳出陽明之病而續發痙者如初起頭痛在腦側額角之部兼見口苦咽乾目眩脈左手浮弦或弦而數此為伏氣傳出少陽之病而續發痙者此皆誤治之變則厥陰回血管蘊蓄之熱毒無從發泄反而充滿於腦貫注於脊以致頸項強背反張甚至目上視口齘齒腳攣急國醫正式痙病之症狀完全發現內經春病在頭時令使之然也仲景謂知犯何逆以法救之是當向其誤處而求之然既發生痙病仍當開泄厥陰之中兼以宣發太陽之表如傷寒論之黃芩湯千金方之龍膽湯皆可混合紫雪或玉樞丹太乙紫金錠或兼服薖叟腦脊消炎丸羅氏牛黃丸陳氏蟾酥丸亦無不可但當分其痙之輕重緩急而用之耳雖然時令諸病固不能捨四時之氣候而人身生理亦有隨乎個人之體質故國醫先哲之治療痙病宣發太陽之劑有溫散者有溫補者開泄厥陰之劑有溫養者有鎮墜者是以舍病原而專講體質則當調劑於平時不當調劑於病時舍體質而專講病原則恐克削過度元氣隨之而俱傾故第九篇詮方中備錄一切任醫者之選用焉近賢嚴蒼山編腦膜炎家庭自療集謂國醫痙病種類甚多無非外感內傷一言以蔽之曰陰虛血少而已例如中風之有此者年老衰殘陰之敗也產婦之有此者去血過多衝任竭也瘡家之有此者血隨膿出榮氣涸也溫熱之有此者熱傷經絡也小兒之有此者或以風寒傷陽遂謂急驚或以泄瀉亡陰遂謂慢驚治此病者雖欲祛邪必兼顧虛此種論調皆言痙病之類症要非正式痙病而不可以語西醫之腦脊髓膜炎者夫西醫之腦脊髓膜炎為國醫之痙病其最急性者水液血質充滿於腦貫注於脊治之尚恐不能一時消散何暇兼顧其虛耶若夫亞急性與續發性之痙病亦是水液血質為害絕少陰虛血少之症即嚴氏自論疫痙分寒熱兩門治法曾未顧及陰虛血少胡為而謂外感內傷可一言而蔽之耶查此說出自謝利恆醫學辭典意者嚴氏隨手錄入不及辨別歟又近賢王云鶴編腦膜炎與驚風蓋以西醫之腦膜炎為國醫之驚風而以孫思邈之龍膽湯治急驚莊在田之加味理中湯治慢驚猶為不錯但謂今日急驚明日變成慢驚急驚慢驚不以時間論而以體質論則大錯矣蓋國醫之痙病宋元以來認為驚風不過以病之初起者為急驚發於中途或末期者為慢驚急慢兩字明明在時間而不在體質若以體質論則今日急驚用龍膽湯以涼瀉之明日慢驚用理中湯以溫補之時間只兩日耳寒熱冰炭補瀉秦越即在四損不可正治之病診斷上亦罕見斯症況在今日之腦脊髓膜炎而用杞地之滋補萸戟之酸斂桂附之溫熱得不火上添油使之焦頭爛腦耶然宋元以來國醫先哲之診治痙病者初未嘗分急慢二驚而異治甚至立一方而可通治急慢二驚者如曾氏之琥珀抱龍丸張壁之七味羌活膏世醫得效之奪命散六科準繩之大黑龍丸無不急慢並治可見先哲之以急慢命名不在體質而在時間也予嘗見小兒吐瀉發痙市醫每以莊氏理中湯為秘方初服之似效再服之則有熱毒未清之禍若服之過早反見變成慢痙唇焦舌爛骨蒸肌消而死者比比予用之則必審其唇口乾燥而不欲飲舌苔黑黃而不幹枯爪甲淡紅不透青紫指尖消瘦不增肥大嘔吐皆澄清之水便溲無酸臭之氣外面雖有假熱內里卻是真寒非獨敢用此方而予所制薖叟和陽舒痙湯薖叟溫腎補腦湯亦必如此認症乃放膽用之始不僨事若今日清涼明日溫補除非今日之誤用清涼而明日用溫補以救之則可否則斷無是症也今日西醫類皆謂腦脊髓膜炎之不能治療也非不能治療也西學幼稚之故也亦非幼稚也科學之研究止於是而已故西醫之論腦脊髓膜炎曰除注射預防血清外通常不能醫能醫則為流行性感冒決非腦膜炎也然究其所以不能治療之故則曰炎症侵入腦髓之實質以致腦髓之呼吸中樞及血帶運動中樞受壓迫麻痹而死又曰腦髓局部之炎症不能致人於死致人於死者續發性之官能障礙而已再進而究其炎之所由起則自鼻腔咽頭循淋巴腺遇血管傳入於腦而腦中起化膿性變化其滲出之髓液或漿液性液體瀦集於腦以致壓迫麻痹及續發性官能障礙而死然則西醫治療腦脊髓膜炎之方法第一步則當撲殺細菌第二步則當消化膿汁此為西醫治療腦脊髓膜炎之大經大法而不可移易者乃西醫竟不出此則西醫之治療學與病理學又不相貫通也東醫田和氏謂西學治療之黑暗渡邊溪氏謂西醫有學術而無治療信哉蓋血清為普通解毒之藥預防注射不能撲殺細菌吸取椎髓洗滌脊腔亦不能撲殺細菌是細菌不死而腦中之膿汁終不能消化至用消炎膏以貼腦放水蛭以囓腦隔靴搔癢何濟於事若夫麻醉神經鎮靜神經而細菌不滅濃汁不淨亦何能發生效力以故西醫之治愈腦脊髓膜炎者絕少即或倖免於死而恢復之期遙遙無定其永久頭暈或頭痛者有之重聽重視者有之甚至發生神經病而為癲狂癇者此西籍之所載西醫之所道豈非治療上之不能撲殺細菌消化膿汁而無恢復腦髓實質之侵害也哉國醫不講細菌之學竟有治愈之方法蓋吾人身體上之化生膿汁水液釀之血質化之耳今宣發太陽之表消散水液開泄厥陰之裡溶解血質何致膿汁瀦溜腦腔侵害腦髓實質以致呼吸中樞運動中樞受壓迫麻痹而死官能障礙而死哉更進而言之彼西醫之所謂炎症者非灼熱不能腐化腦中之水液血質不能腐化腦中之水液血質即不潮紅不潮紅則不能腫脹而疼痛究灼熱之何由而致則是體溫之失其調節而奔集於腦之局部西醫所謂體溫達四十度以上其血必沖激於腦發生神經錯亂意識昏迷者是也今宣發太陽之表即是放散溫度開泄厥陰之裡亦是放散溫度溫度放散則體溫復常而何灼熱之有無灼熱則水液血質之不能腐化而何潮紅腫脹疼痛之有此國醫之所以能治療腦脊髓膜炎也彼西醫者曷不加之意哉第九篇詮方甲宣發太陽之劑一飛龍奪命丹局方原治主症痧㽲脹痛霍亂轉筋厥冷脈伏神昏危急及受溫暑瘴癘穢濁諸邪眩暈痞脹瞀亂昏狂或卒倒身強遺溺不語身熱瘛瘲宛如中風或時疫神迷狂讝小兒驚癇角弓反張牙關緊閉藥品硃砂飛二兩明雄飛燈芯炭各一兩人中白漂煅八錢明礬青黛飛各五錢梅冰麻黃去節各四錢真珠牙皂當門子蓬砂各三錢西牛黃二錢杜蟾酥火硝各一錢五分飛真金三百頁製法上十六味各研極細末合研勻磁瓶緊收毋令泄氣用法以少許吹鼻取嚏病重者再用涼開水調服一分小兒減半詮義此國醫最急性痙病之特效靈方痙病初起無顯著之前驅症候突然暴發神昏口噤猝僕於地者固能治之即頭動搖目上視漸見頸項強背反張者亦能治之然晉隋唐宋以來痙病誤認為驚癇驚風絕不別立門戶而診治痙病之方即混入驚癇驚風之內如此方主治小兒驚癇而明申之以角弓反張牙關緊閉等症不確見痙病誤認為驚癇者乎然誤認為驚風亦從此可知矣是以診治痙病之方常於晉隋唐宋驚癇驚風門中求之茲將此方之藥品逐味發明益知此方治痙之特效焉予嘗研究此方特效之處則在透汗汗透則周身之毛竅開而內臟之官能不致失職然神昏卒倒肢冷脈伏口噤遺溺皆內臟官能之失職也今既周身透汗則毛竅開而肺臟之呼吸無礙斯血液之循環如故則內臟之官能復職脈出肢溫噤開溺止神識不致昏迷而痙病之頭搖目竄項強背反諸症有不隨汗而俱解者乎再研究此方之藥品其能透汗者首在蟾酥予嘗見制蟾酥入藥一室滿座噴嚏汗出況服之乎故外科之以蟾酥治惡疽疔腫者立即消散今以之治腦脊髓膜炎尤為確切蟾俗呼癩頭蛤蟆蓋以全體皮層之腺液注之於腦腦凸突而狀如蚪蚾至夏而注之於眉稜皮下眉稜皮下凸突而狀如臥蠶過夏則消滅無存而採者必於端午前後割取其汁以為酥蟾早知之至此時藏匿而不鳴夫以氣候變化之物質而治氣候變化之疾病豈化學所能測驗哉故以之治西醫之腦脊髓膜炎而能使全體皮膚之汗腺溱溱汗出者則腦脊膜中其不發生漿液性化膿性變化而為炎也蟾酥有特長矣皂角吹鼻則嚏麻黃入口則汗今佐之於蟾酥藥中其能透汗也無疑矣梅冰為龍腦樹所取之汁浮水面而能旋轉入火燒而無殘渣吸入腸中破腸壁而入血管促進血液之循環大腦神經因之而興奮麝香為麝臍囊腺所儲之物春陽發動自行剔出吸人腸中亦破腸壁入血管促進血液之運動大腦神經亦因之而興奮故二物之能調治腦脊髓膜炎也亦有特長矣今佐之於蟾酥藥中而與皂角麻黃為伍其能透汗也又無疑矣牛黃牛之寶真珠珠之寶以山獸水族精靈結晶之品而國醫先哲用之以治驚癇者蓋以牛黃生於肝葉膽側之旁性質香涼苦平入肝膽而清熱化痰真珠生於蚌母之腹性質鹹寒無毒入心肝而鎮心寧神合之硃砂雄黃金銀箔皆為驚癇之要藥即為痙病之要藥國醫痙病屬之督脈為西醫之神經系病硃砂雄黃金銀箔唐人用之煉丹餌以飛昇此種藥物之能入督脈也可知矣能入督脈即入神經合之牛黃真珠有不恢復其常狀者乎故吾國自晉隋唐宋以來驚癇驚風皆不外此種藥物以為治也若夫火硝則為熱帶地方之滷幾經製造而成吸入腸中混入血管增多血液之鹼遲緩悸進之心臟減退原有之體溫催促大便增多大便增多尿量東醫學說稱為消炎之要藥明礬硃砂防腐消毒明礬性質苦辛酸收斂血管使血液不致外溢可以消退炎症蓬砂性質辛酸寒能收氣液而利尿道亦可以消退炎症故二物皆收斂之品能入厥陰而使厥陰之回血管不致僭越上行合之青黛性質之鹹寒清血熱而瀉肝火能治小兒驚癇則腦脊髓膜之發炎有不被其消退者未之信也總括此方之特效非獨宣發太陽之表使寒冷不致外閉而亦能開泄厥陰之裡使火熱不致內沖故透汗之餘旋能排泄於小便人中白即溺白垽能從肝臟達之於膀胱燈芯草秉輕虛之質內具燃料能引心包之火下出於膀胱予用治痙病之最急性者透汗之餘旋即小便神昏諸症立即瓦解放古人制方之妙絲絲入扣所以為國醫最急性痙病之特效靈方也雖然古人制之今人不能用之遍覽醫籍知者寥寥惟王士雄謂此方宣竅通營化毒祛邪有斬關奪隘之功具起死回生之力可謂知己矣予嘗於腦膜炎外又用之以治溫暑伏氣諸病一時暴發腹痛肢冷脈伏神昏輕則一二錢重則三五錢涼開水送服立效每被市醫譏其猛峻究之歷驗深認症確能將此方逐味研究之有何猛峻之有哉無奈西醫之治療腦脊髓膜炎只有早期注射血清之一法夫血清注射不過系普通解毒之法對於腦膜炎大症何濟謂腦膜炎自雙球菌循鼻腔咽頭入淋巴腺過血管進入於腦卻無殺菌之法國醫不言細菌而此方之硃砂雄黃明礬硼砂竟可以殺菌國醫不言起漿化膿而此方之蟾酥燈芯麻黃皂角竟可以消漿排膿謂腦膜炎之所以危險而不能治療者侵害腦髓之實質麻痹腦髓之神經何於血清注射之外曾無一法保護腦髓之實質使之不受侵害如此方之牛黃真珠者乎又無一法興奮腦髓之神經使之不受麻痹如此方之梅冰麝香者乎是西醫之發明腦脊髓膜炎尚在幼稚時代而國醫早已發明於數千年前惜後人無以發揚之耳二行軍散原治主症霍亂痧脹山嵐瘴癘及暑熱穢惡諸邪直干包絡頭目昏暈不省人事危險諸症並治口瘡喉痛點目去風熱諸翳嗅鼻避時疫之氣藥品西牛黃當門子真珠梅冰硼砂各一錢明雄黃飛淨八分火硝三分飛金二十頁製造上八味各研極細如粉再合研勻瓷瓶密收以蠟封固用法每用三五錢涼開水調下詮義此方以下共方三首均可用治國醫最急性痙病口噤者吹鼻得嚏則生如口不噤可用建菖薄荷煎湯或磨化猴棗湯送下能獲捷效此方之火硝與下兩方之羊躑躅宣竅透汗不讓蟾酥而解毒消炎則遜之若飛龍奪命丹之透內宣外非此三方所能及也三臥龍丹原治主症諸痧中惡霍亂五絕諸般卒倒急暴之症藥品西牛黃飛金箔各四分梅花冰片荊芥羊躑躅各二錢麝香當門子各五分硃砂六分豬牙皂角一錢六分燈芯炭二錢五分製法上九味共研細末瓷瓶密收毋令泄氣用法少許嗅鼻取嚏垂危重症亦可以涼開水調灌分許並治癰疽發背蛇蠍蜈蚣咬傷用酒塗患處詮義王士雄謂羊躑躅俗名鬧羊花辛溫有大毒不入湯劑入酒飲能殺人近目即昏翳近市中有臥龍丹以此為君藥又無牛黃而加蟾酥減輕燈芯炭而冰麝不過略用些須耳故藥力大遜甚不可恃好善者必自配製也四開關散原治主症番痧臭毒腹痛如絞氣閉神昏欲絕之症藥品燈芯炭一兩羊躑躅三錢北細辛杜蟾酥牙皂各二錢牛黃梅冰當門子各一錢製法上八味共研細末瓷瓶緊裝毋令泄氣用法少許嗅鼻得嚏則生詮義行軍臥龍開關三方宣竅透汗難分軒輊若以之治國醫最急性之痙病則三方之作用皆包賅于飛龍奪命丹一方之內醫者即用飛龍奪命丹可也五蘇合香丸局方原治主症傳屍骨蒸殗殜肺痿疰忤狐鬼邪祟驚癇中風痰厥心腹猝痛昏迷僵仆寒症氣閉霍亂吐利時氣瘴瘧赤白暴痢婦人經閉小兒驚搐吐乳痃癖疔腫藥品蘇合香油五錢白色者佳入安息香內丁香安息香另為末用無灰酒五合熬膏飛去砂土青木香白檀香沉香另研極細蓽茇香附子炒去土訶黎勒煨取肉烏犀角磅另研極細硃砂另研水飛以一半為丸各一兩薰陸香另研龍腦另研各五分麝香另研勿經火七錢五分製法研為細末入另藥和勻用安息香膏並制白蜜和丸如芡實大約重八分硃砂為衣蠟殼封護用法每服一丸中風驚癇昏迷鬼杵不省人事薄荷湯送下詮義此方藥品共十四味類集辛香溫散之大隊若非訶黎勒之收澀犀角之鹹寒硃砂之重鎮是無監製之師也然以之療疫癘客杵心腹猝痛嘔吐交作效誠有之而以之治國醫最急性痙病宣竅透汗不如行軍臥龍開關三方更不如飛龍奪命丹也謝利恆曰此方諸香以開閉塞與牛黃丸皆為中風門中奪隘開關之將然牛黃丸開熱阻關竅此則開寒阻關竅方中犀角為寒因寒用之嚮導與至寶丹用龍腦桂心無異若夫口開手散眼合鼻鼾自汗遺溺等症急用參附峻補庶或可救若用牛黃蘇合香之藥入口即斃矣六薖叟腦脊消炎丸特治主症痙病頸項強背反張頭動搖目上視口齘齒腳攣急肚腹陷沒神識昏迷痙病初起危險諸症藥品白花蛇蘄產者一條去頭尾以酒浸去皮骨只取淨肉用火炙之全蠍羚羊角蘇薄荷雄黃鏡面硃砂蟾酥各三錢暹羅犀角川牛膝各五錢西牛黃冰片各一錢五分麝香一錢鮮蝸牛四十個緣桑樹者佳去殼鮮白頸蚯蚓三十條韭菜土下者佳蜈蚣川產者五條火炙製法上十六味將十三味研末用鮮蝸牛鮮白頸蚯蚓搗爛如泥並以陳酒化蟾酥和勻糊丸如小豆大每粒約重五分蠟殼封護用法每服三丸至五丸小兒減半鉤藤煎湯送下口噤者研末調湯灌下詮義此亦國醫痙病之特效靈方凡屬頸項強背反張之痙病無論最急性亞急性續發性皆能治之其特效之靈藥首在白花蛇蜈蚣全蠍次之蝸牛蚯蚓再次之則在羚羊角犀角予逐味考正於後以見此方治痙之特效焉白花蛇考諸國醫藥物學皆稱為截風要藥然風何以截之苟不申明其實際則其功效終為虛設蓋風者空氣之所流蕩太陽光線照射地球遠近強弱輕重不得其平則熱量增加之處澎漲上升而他處熱量低降之冷氣即來補之此風之所以成也人在氣交中感觸流蕩之空氣則為外風姑置勿論而內風則以人身之經絡臟腑營衛氣血苟有偏勝之處則體溫不得其平激而為風故凡治內風諸藥體溫高壓則清涼之可體溫低降則溫補之亦可張山雷中風斠詮只知體溫之高壓而不知體溫之低降故只取清潛一法而溫養諸藥一概屏斥門外是不知古人風字訓動之義內經風勝則動易經風以動之佛經風輪主持大地皆是動也故人身之筋肉西醫解剖分為兩種一為隨意筋一為不隨意筋故隨意筋之當動而不動者如手足癱瘓不仁不用謂之風不隨筋之不當動而動者如口眼歪斜手足搐搦亦謂之風故凡國醫籍中稱為風痹風痱風懿風癇驚風凡有涉風字者皆不離此二種意義也白花蛇主治大風諸疾者蓋以蛇為冷血動物心臟缺乏能使人身之血行遲緩此即截風之義也又蛇之肌肉柔軟任意張縮能使人身之肌肉弛張自如此又截風之義也諸蛇死皆閉目而白花蛇蘄產精氣獨注於目死皆突出不閉故痙病之頸項強背反張目上視亦以蘄產為治痙之要藥李瀕湖謂物之善行而迅速者唯風與蛇而蛇又為截風之要藥則以善行迅速之物而治善行迅速之病不相符合也耶蜈蚣有兩種一種黑頭野產冬蟄春出予嘗於郊外見之有大毒觸之灼熱疼痛一種金頭由於培養而成春季出新可供藥用陳仁山謂以雞毛濕透埋於坎中蓋之以薦日久乃生鄭肖嚴謂以生草堆積腐爛日久便生湘省藥市售皆川產相傳以米和土掩之即成蜈蚣之能治痙病辛以散結溫以通行非蜈蚣之特效也蜈蚣每一環節生腳一對末端如鉤腳凡十五至二十五與西醫解剖屍體自腦至脊之神經對對相關無異又蜈蚣之呼吸口生於頸部環節之兩旁一氣貫通故主治痙病之頸項強背反張即是調節神經回覆反射也然唐宋以來誤認痙病為驚風如聖惠方之治小兒撮口風以丹砂輕粉而配蜈蚣非頸項強背反張而其風何能成撮口之狀直指方之治小兒天吊風以麝香而配蜈蚣非頸項強背反張而其風何能成天吊之狀他如命名內釣者蓋外面之有頸項強背反張而內實有釣起之原因國醫先哲形容今日之腦脊髓膜炎可謂畢肖足見今日之對於腦脊髓腦炎其特效有如此者全蠍用全者稱全蠍用梢者稱蠍尾張山雷謂古人恆治大人風痹小兒風癇皆用蠍尾則此蟲之力多在於尾而尾之性情下行為順藥肆漬之以鹽鹽亦潤下且又節節靈通宣通之力必為迅利正與氣血上菀之病情針鋒相對然治痙病當用全蠍但較蜈蚣之力稍遜而其形態與之略同全體凡十三環節其後腹部有六環節亦與解剖屍體自腦至脊之神經對對相開無異張氏既謂節節靈通則弛緩神經之力在全身而不在尾故本事方治慢脾風取其全者與白朮麻黃等分為末聖惠方治天釣風亦取其全者與硃砂為末國醫先哲非獨用尾也今以之治腦脊髓膜炎上必連腦下必連尾則全身之力勝尾多矣況佐於苦降藥隊中則其效能何患其不下行耶凡藥物特異之處必其精力獨到之處精力獨到之處必其功能特效之處蝸牛蚯蚓二物性皆鹹寒清熱利水不過能使熱毒排泄於小便耳然蝸牛形之盤旋如渦頭之偏房如渦此蝸牛之特異處蚯蚓逶迤如蟮曲宛轉如蛇行此蚯蚓之特異處今使用之於腦脊髓膜炎者亦不過調劑腦與脊之神經而使之項不強背不反耳然猶不足為二物之特異也而其所特異者冬則蜇伏春則出行漬之以鹽則化為水不漬亦化為水二物能自成質能自化水不待化學而自具化學之機能苟生漬飲之則腦腔中之混濁髓液脊腔中之混濁髓液消化為水從小便排泄而出何以驗之驗之於服二物後而小便獨多白垽也無須吸抽腦髓而腦壓輕減無須灌溉鹽水而脊腔洗滌予嘗生漬二物加入湯劑飲之則巔頂高腫者即平神識昏迷者即醒項強背反一併而恢復常狀其特異為何如也羚羊角犀角國醫藥物學皆謂其主治小兒驚癇婦人子癇大人中風搐搦及筋脈攣急歷節掣痛痙病之頸項強背反張蓋亦筋脈之攣急耳凡角生於頭顱之上則為精靈之所儲皆有上升之力羚犀二角尤為腦脊髓膜炎之特效藥而其性質辛苦鹹寒能入血分減少腦中血球低降腦中溫度二角之作用同也其稍有不同者羚羊入肝而涼血散瘀犀角入心而收斂血管二角之分析如此牛膝狀如牛之膝蓋春日抽苗莖方色青紫有澎大之筋神農經謂可除腦中痛及腰脊痛蓋以性質苦酸有引血下行之功對於腦脊髓膜炎亦特效藥也余藥解見飛龍奪命丹方下統論此方效能亦以蟾酥麻黃透汗之餘而以蝸牛蚯蚓引從溺道出耳此方之對於腦脊髓膜炎面面俱到故無論最急性亞急性續發性之痙病皆可服之也七羅氏牛黃丸藥品白花蛇肉天麻雄黃硃砂蟾酥各三錢全蠍川烏牛黃各一錢五分白附蘇薄荷各二錢冰片麝香各五分麻黃一錢製法以陳酒化蟾酥為丸如小豆大約重一分至三分用法每服三丸食前開水送下詮義時逸人謂沈氏注云天麻為鎮痙劑雄黃硃砂為殺菌劑牛黃麻黃以解熱利分泌白附川烏驅逐穢濁冰片麝香疏通關節之停滯全蠍白花蛇弛緩神經之拘急再加蟾酥以消腫脹治腦膜炎之病勢增進期決有相當之成績八陳氏蟾酥丸外科正宗藥品蟾酥酒化二錢枯礬寒水石銅綠乳香沒藥膽礬麝香各一錢雄黃二錢蝸牛二十個硃砂三錢蜈蚣三條炙製法以上各為細末稱准於端午日午時在靜室中先將蝸牛研爛再加蟾酥和研調黏方入各藥共極極勻丸如綠豆大用法每服三丸患者嚼爛同蔥白五寸包好熱酒一杯送下被蓋汗出為效詮義此亦痙病之特效靈方銅為金質之一可以伸展延長通電傳熱性極迅速綠即銅經空氣潮濕變化而起一種青綠色之鏽衣也合乳香沒藥能消瘀化膿合枯膽二礬能斂液防腐上可湧吐青碧之痰涎下可開泄大便之惡濁此方陳實功用治腦疽發背惡瘡初起嘔吐昏憒與腦脊髓膜炎初起之症候相同而腦腔發炎巔頂高腫與腦疽何異脊腔發炎椎骨凸突與發背惡瘡何異此方服之未成者即消已成者即潰治腦疽發背之惡瘡如是治腦脊髓膜之發炎亦如是其勝於西醫之刺脊髓膜以減輕腦壓灌鹽水以洗滌脊腔者多矣陳氏謂有回生之功為惡症中之至寶丹詢不誣哉羅氏牛黃丸從此方套出白花蛇全蠍天麻白附川烏對於項強背反確有效驗而巔頂高腫背脊凸突然無銅綠乳沒二礬則不能化膿防腐此方較勝九琥珀抱龍丸曾氏方原治主症急慢驚風發熱咳嗽作搐痰喘驚悸藥品琥珀二錢五分包在精肉內煨透取出研末牛膽南星一兩六分臘月同牛膽套用者佳殭蠶二錢炒雄黃硃砂人參茯苓各三錢天竺黃錢鉤藤鉤一兩五錢牛黃五分麝香一錢製法碾極細末用甘草八兩銼碎以水四大碗熬膏二盞入藥末為丸每料二百丸每丸重五分金箔為衣黃臘包好用法每服一丸生薑薄荷湯送下詮義此方以下至返魂丹計共一十一首皆是從厥陰之裡而宣發太陽之表以治急慢二驚如此方之名以抱龍者取厥陰肝木屬諸青龍之義是也因各方藥品之多寡出入不同而其宗旨主義無不同也今用治痙病人參茯苓之補肉桂附子之溫末期或有可用之處而初期與中途用者絕少羌活防風白芷藁本為辛溫升散之品對於痙病亦當慎用予備選此種方藥於此欲使學者知從厥陰之裡而宣發太陽之表以療治痙病權變化裁自有左右逢源之妙不必泥其方而執其藥也國醫痙病認為驚風肇自宋人錢仲陽故自宋以下只有驚風諸方曾無一方及於痙者至今日以西醫腦脊髓膜炎顯著之症狀而適符國醫之痙病故治痙之方當於驚風門中求之與唐以下治痙之方當於驚癇門中求之無異也然痙之初起暴發者為急驚風痙之起於中途或末期者為慢驚風社會名稱至今未改故宋以下治驚之方有分急慢二驚而專治者有不分急慢二驚而通治者各以實驗之病情為印證不必限定專治與通治也後人有說急驚涼瀉而不愈變作慢驚慢驚溫補而不愈變作急驚陳飛霞闢之於幼幼集成中誠是矣而近時謝利恆反取其說載之於醫學辭典何其見之左也夫急可變慢慢可變急此不過名稱上有先後次序之錯亂無關緊要至涼已而溫溫已而涼診斷上既無觀察之眼光又無確定之治療人非金石其能堪此錯亂乎此國醫所以至今無標準也方有執喻嘉言遵從仲景力詆宋人驚風之非然方氏無所發明而喻氏謂小兒腠理不密易於感冒則宣發太陽溫散寒冷故是正治謂小兒陰氣未足稟性純陽易致生熱熱甚則生風生痰亦所恆有則開泄厥陰清降火熱亦是正治乃喻氏何以極詆古人腦麝之開關金石之重鎮勾引外邪深入內臟牴牾矛盾姑不深辨特辨喻氏以曾無歷驗之學術而空談國醫但將往哲特效靈方一概抹殺不見用於今日遂致今日之腦脊髓膜炎西醫不知治療而國醫亦莫之知非喻氏之罪乎然今之空談國醫而無歷驗者著書何其多也噫陳飛霞遵從喻氏謂痙病非止一端男婦皆有非獨小兒為然夫今日之腦脊髓膜炎無分男女皆有此症誠有如飛霞所言者但謂太陽誤汗變痙風病下之變痙瘡家誤汗變痙產婦汗多遇風變痙跌撲破傷冒風受痙等等此皆痙之類症非西醫之腦脊髓膜炎惟飛霞謂男婦病此皆從太陽厥陰以救治然西醫之腦脊髓膜炎為國醫督脈之痙病不從太陽厥陰以救治而從誰經以救治者此飛霞之卓識超群處可謂先得我心矣然謂從未假一蘇合抱龍諸丸為之開關鎮墜者是隻知小兒感冒致痙之類病而不能悟到西醫之腦脊髓膜炎從國醫往哲之驚癇驚風門中以求其治療發明國醫痙病之發生於督脈外被太陽之寒冷閉塞內被厥陰之火熱沖激不有腦麝之開關金石之鎮墜何能起死而回生乎飛霞之智錮於嘉言使國醫往哲制方之苦心不見諒於今日借哉一鎮驚丸原治主症小兒急慢二驚風痰上壅手足抽搐口眼喎斜煩躁生嗔精神昏悶常服寧心鎮驚疏風順氣藥品人參三錢甘草茯神白殭蠶枳殼各五錢白附子白茯苓天南星硼砂牙硝水飛各二錢五分全蠍十枚麝香一字硃砂五錢製法除牙硝硼砂麝香硃砂四味用乳缽研細餘九味焙為末入乳缽內和勻前四味用糯米粉清水煮為丸如梧桐子大就帶潤以硃砂為衣用法每服三丸至五丸或七丸急驚薄荷湯磨化服慢驚生薑附子煎湯研化溫服一一聚寶丹證治準繩原治主症慢驚藥品人參茯苓琥珀天麻殭蠶炙防風牛膽南星白附子烏蛇肉酒浸焙各一錢硃砂五分麝香少許製法共研末煉蜜丸如梧桐子大用法每服二分菖蒲湯送下詮義烏梢蛇性善無毒味甘入血祛風之力遜於白花蛇故痙病之含有急性者終用白花蛇較勝一二奪命散世醫得效方原治主症小兒急慢驚風藥品天南星泡一兩白附子天麻各三錢辰砂另研二錢五分黑附子泡去皮臍防風半夏各五錢全蠍去毒七枚蜈蚣一條制麝香少許殭蠶炒五錢製法研為細末用法小兒三歲以上每服五分薄荷生薑自然汁加好酒沸湯各少許調下一三太乙保生丹六科準繩藥品全蠍青者十四個白附子殭蠶牛膽南星蟬蛻琥珀防風硃砂各一錢麝香五分製法研為細末水煮米糊丸如梧桐子大金箔為衣用法每服一二丸薄荷湯化下一四天麻防風丸局方原治主症小兒驚風喘促身熱多睡驚悸手足搐搦精神昏憒痰涎不利及風邪溫熱藥品天麻防風人參各一兩甘草辰砂雄黃各二錢五分蠍尾去毒炒殭蠶炒各五錢牛黃麝香各一錢製法研為細末煉蜜和丸如櫻桃大辰砂為衣用法每服一二丸薄荷湯化下一五八仙散沈氏尊生原治主症慢驚虛風藥品天麻白附白花蛇肉防風半夏曲天南星全蠍冬瓜仁各二分五釐川烏一分用法加生薑二片大棗一枚薄荷二葉清水煎服一六七味羌活膏張璧方原治主症急慢驚風壯熱藥品羌活獨活天麻全蠍去毒人參殭蠶炒各五分烏蛇肉一兩酒浸一宿焙乾製法研為末煉蜜和丸如皂子大每兩作五十丸用法每服一丸荊芥湯送下一七鉤藤飲證治準繩原治主症小兒脾胃氣虛吐利虛風慢驚天釣卒然驚悸眼目翻騰身熱足冷藥品鉤藤鉤炒七錢五分防風人參蟬蛻麻黃天麻甘草川芎各二錢二分白殭蠶炒黃七個蠍尾炒去毒五個麝香一錢另研蜣螂三個去頭足炙黃製法研為細末用法每服一錢清水一杯加生薑三片煎至六分不拘時溫服詮義此方蜣螂一物頗有深意諸藥宣發力厚麻黃麝香用服頃刻汗出小兒脾胃氣虛吐利之後發生慢驚豈堪勝此若非吐利氣虛一時急驚此方又能勝任也一八羌活膏證治準繩原治主症小兒傷寒脾胃虛或吐瀉後為慢驚藥品羌活防風川芎人參白附子泡赤茯苓各五錢天麻一兩白殭蠶酒浸炒黃全蠍炒去毒白花蛇酒浸焙各一兩川附子泡麻黃去節各三錢沉香母丁香肉豆蔻藿香葉木香各二錢輕粉真珠牛黃各一錢五分龍腦半字麝香雄黃硃砂各一錢上七味另研製法研為細末煉蜜和丸如豆大用法每服一二丸食前薄荷湯或麥冬湯化下詮義此方立意頗佳而用藥太雜小兒傷寒吐瀉脾胃虛弱甚不相宜若用治痙病則羌活防風附子豆蔻丁沉諸藥終嫌溫燥劫爍陰津醫者斟酌取締可也一九蠍附散原治主症頭痛風邪犯腦痰涎壅盛嘔逆噁心暗風旋暈牙關緊急口眼喎斜面目瞤動頸項拘急肩臂引疼耳聾目昏四肢麻木及沐浴感風頭目暈痛兩太陽痛藥品全蠍泡一錢五分附子泡三錢雄黃硃砂均水飛各一錢川烏頭泡麻黃去節天南星薑製防風白殭蠶炒各三錢白芷藁本各五錢製法研為細末用法每服五分食後蔥茶煎湯調下孕婦忌服詮義此方於大隊溫燥升散之內少佐重鎮之品惟痙之類病寒濕閉塞者宜之若用治春季時行痙病則非所宜也二返魂丹王海藏方原治主症小兒癲癇潮熱瘛瘲口眼相引項背強直牙關緊急及諸病久虛生風多睡者藥品犀角五兩屑天麻酒洗焙乾檳榔殭蠶去絲嘴微炒硫黃研末入水銀置瓷石盞內慢炒成砂各五錢白附子泡川烏炒通赤留煙少許以盞蓋上新土圍之待冷取出獨活全蠍萆薢肉桂去粗皮當歸細辛防風天南星薑汁煮軟阿膠藿香烏蛇酒浸一宿炙熟去皮骨沉香槐膠羌活白花蛇酒浸一宿炙熟去皮骨麻黃半夏薑汁浸三宿炒羚羊角陳皮各一兩天竺黃木香人參乾薑茯苓蔓荊子晚蠶砂敗龜板酒醋炙黃藁本桑螵蛸白芷何首烏米泔浸一宿煮焙虎骨酒醋塗炙黃縮砂仁白朮枳殼丁香厚朴各三錢蟬蛻川芎附子石斛肉豆蔻去皮微炒龍腦另研雄黃水飛硃砂水飛各一兩膩粉麝香另研各一錢烏雞一隻去嘴翅足腸狐肝三具上二味臘月入瓦瓶內固濟火煅赤候冷取出研用金箔三十片為衣製法如法制就煉蜜和丸如梧桐子大金箔為衣用法每一歲小兒服一丸不拘時溫薄荷自然汁化下詮義此方計共五十六味辛香溫燥升提之藥內占強半雖有滋陰養血清火潛風之品究之少許不勝多許則與痙病不甚相宜王氏論痙率皆類痙故此方亦只可治寒濕之類痙而不可以治春季流行之痙病但其立意則從厥陰之裡而宣發太陽之表不失宋元以來法門然其用藥之寵雜立方之板滯終無所取也二一奪魂散證治準繩原治主症驚癇藥品白殭蠶五錢蛇含石燒紅米醋淬七八次碾碎白附子泡各二錢生銀生金牛黃白茯苓天麻各二錢烏梢蛇頭七八寸許酒炙天南星一錢生薑汁浸一宿焙半夏末二錢生薑汁浸一宿焙赤腳蜈蚣一條酒浸炙焦犀角磅二錢腦子麝香各少許製法共研細末棗肉為丸如麻子大硃砂為衣用法每服十丸至十五丸或二十丸薄荷湯送下詮義此似唐方最為可法生金生銀鎮墜厥陰藥也主治癲癇熱狂故用治國醫痙病以些之金銀配入腦子麝香牛黃南星半夏殭蠶蜈蚣諸藥之內即能宣發太陽之表不用羌活防風白芷藁本一切辛溫升散也二二定搐散證治準繩原治主症急驚四證八候並作藥品天麻白附子泡天南星泡各五錢蠍梢白花蛇頭酒炙各二錢五分硃砂雄黃乳香各一錢赤腳蜈蚣一條酒炙龍腦麝香各一字製法研為細末用法每服五分金銀薄荷煎湯送下詮義此亦似唐方四症八候不可考惟此方諸藥均用一錢或五分而代赭石獨用一兩分量配合頗具深意蓋以單用赭石一味之重鎮則厥陰上衝於腦之血熱從下消散然亦無礙於宣發太陽也試觀直指方單用赭石研末煎真金湯送下小兒即腳腫發生赤斑則吊眼嘬口之急驚立愈此足徵厥陰血熱從下消散之明證但代赭石藥市多偽釘赭石則不能偽宜用釘赭石入藥二三保命丹本事方原治主症小兒急慢驚風肢冷眼直口噤流涎藥品虎睛一對安瓦上以瓦蓋之慢火逼干硃砂五錢全蠍麝香各五分天麻一錢蜈蚣三條去頭尾赤腳腦子三分製法研為細末煉蜜和丸如豆大瓦罐密貯用法每服三丸薄荷蜜湯化下詮義虎睛之鎮心安神與硃砂同功孟詵謂主小兒熱痰驚悸日華謂主驚啼客忤疳疾千金之立虎睛湯丸以治狂邪則皆鎮心安神之功也合之腦麝諸藥亦主宣發太陽故急慢二驚之眼直口噤肢冷流涎為太陽閉塞之象此方能治之用治痙病其效能可推也二四竹葉湯金匱原治主症產後中風發熱面正赤喘而頭痛藥品竹葉一把葛根三兩防風桔梗桂枝人參甘草各一兩附子一枚泡生薑五兩大棗十五枚製法上十味以水一斗煮取二升半用法分溫三服覆被汗出加減法頸項強用大附子一枚破之如豆大入前藥揚去沫嘔者加半夏半升洗詮義此產後中風類痙宣發太陽之劑也陳修國註釋金匱謂風為陽邪不解即變為熱熱甚則灼筋而成痙先以此方溫散而折其勢然則此方之桂枝附子非助熱而灼筋者乎又仲景於頸項強改用大附子一枚則更助熱而灼筋矣蓋陳氏不知風寒同為冷空氣流動為風不流動為寒之原理故風寒外閉太陽則有頭痛面赤頸項強類似其痙之現象宣發太陽即所以治療此病也而欲以治西醫之腦脊髓膜炎為國醫之痙病尚未合耳二五倉公當歸散原治主症賊風口噤角弓反張成痙藥品麻黃附子細辛當歸防風香獨各等分製法水煎服用法口不開者撬口灌之一服當蘇二服小汗三服大汗詮義角弓反張已成痙矣而用藥則於麻辛防獨附子之中加一味當歸以養榮方法最妙但必審其內無火熱之沖激而外只有風寒之外閉者宜之二六華佗愈風散原治主症背脊身反如弓急救如神並治婦人產後中風口噤手足瘛瘲藥品荊芥三錢製法略炒為末用法用豆淋酒調服婦人用童便調服制豆淋酒法用黑大豆二升熬令聲絕酒二升納鐺中急攪以絹濾取清頓服取汗詮義此方輕靈簡便豆淋酒與童便可以混合並服不獨治產後中風之類症而腦膜炎之輕症亦有效驗故此方主症之下謂背脊身反加弓急救如神也二七肘後蔥豉湯藥品蔥白一握香豉三合製法水煎入童子小便一合用法日三服詮義此方與上方同一機杼但此方力量更勝用治腦膜炎之輕者常獲效果張璐玉曰本方藥味雖輕功效最著凡虛人風熱伏邪發溫及產後感冒無不隨手獲效華岫云曰在內之溫邪欲發在外之新邪又加蔥豉湯最為捷徑表分可以肅清二八天保采薇湯藥品羌活獨活蒼朮前胡葛根厚朴黃芩川芎柴胡半夏枳殼藿梗芍藥各一錢升麻陳皮桔梗甘草各五分生薑一片大棗一枚用法水煎服詮義予居鄉村數十年嘗見兒科醫用此方以治急驚初起屢效意以風寒外閉此方辛溫升散則宣發太陽之表漐漐汗出故獲效也究之此方溫燥太過雜亂無章用治春季痙病及夏秋暑熱壞病變痙無有不僨事者學者慎之二九栝蔞桂枝湯金匱特治主症太陽病其症備身體強兀兀然脈反沉遲此為痙此湯主之藥品栝蔞根桂枝芍藥各三兩甘草生薑各二兩大棗十二枚用法水煮服微汗出不出食頃啜熱粥發之詮義此方與下葛根湯是治太陽風寒外閉而非治厥陰火熱內沖也唐容川謂仲景明明提出太陽病三字又曰其症備以見純是傷寒之痙而為痙病門中主中之賓故其方為治傷寒方而非治痙病之正方此論極是然仲景曰身體強兀兀然兀者鳥欲飛而伸頸之象即強直也是非但頭項強痛而並一身四體俱強矣若純是太陽傷寒脈當浮緊或浮緩今其脈乃反沉遲是有作痙之勢矣故仲景曰此為痙以見別於傷寒之太陽病也故以栝蔞桂枝湯解之不解則將近而為正式之痙病當尋別法以治之也三葛根湯金匱特治主症太陽病無汗而小便反少氣上衝胸口噤不得語欲作剛痙此湯主藥品葛根四兩麻黃三兩去節桂枝甘草炙芍藥各一兩生薑二兩大棗十二枚製法上以水煮麻黃葛根去沫納諸藥煮去滓用法溫服覆取微似汗不解啜粥詮義此症寒冷外閉則太陽之水液不行故小便反少太陽之寒冷外閉則毛竅不開阻塞肺管故氣上衝胸仲景提明太陽病是既有頭項強痛之症而又見口噤不得語故斷之曰欲作剛痙欲作者猶未作也故以葛根湯宣發太陽而諸症自解矣今之腦脊髓膜炎每見火毒上衝咽喉灼熱紅腫頭即仰而不能俯則當開泄厥陰清降火熱若徒宣發太陽則嗌乾腫痛往往增劇故治今之腦脊髓膜炎者宣發太陽只得在表一面治法也三一平痙解疫湯秦伯未特治主症此方適應於腦膜炎之初起有惡寒身熱等之表症者藥品葛根桑葉白芍各二錢麻黃八分桂枝一錢滁菊瓜蔞連翹各三分杏仁四錢防風一錢五分用法汗多去麻黃內熱重加蘆根一兩水煎服詮義此方即前仲景栝蔞桂枝湯與葛根湯減去生薑大棗甘草而加入菊花桑葉連翹溫涼合併變作辛平可謂善於化裁者以治痙病初起惡寒身熱之表症可取用之三二顧氏四期方顧時雨惡寒期此症初起必先惡寒甚則發抖頭部兩太陽或脹或痛或脹而且痛或連及後腦皆痛渾身骨節酸楚呵欠口淡或苦或燥表皮微熱以六經論此時正是太陽之表症病在最淺層當速與下方取汗汗出則解病亦隨之而愈藥品炙麻黃三分杏仁三錢炙草六分葛根秦艽一錢五分說明此方用張仲景之麻黃湯加減而成若病者覺後腦痛方中加膽草二分川連三分口苦口乾口燥加入淡芩一錢茅根三錢舌苔厚膩終日不知飢餓加楂炭三錢枳實炭一錢小溲短赤加赤苓三錢方通一錢藥後溫覆取汗若予粥湯則更佳但以周身微汗為度萬不可覆被過厚使病者大汗淋漓大汗淋漓病反不除且有熱勢加甚之流弊願病家注意及之夫此症多數從春溫轉屬而成非病理所特發的而春溫之惡寒期為時甚暫病家往往不及醫治不治則發熱其症狀及治法如下詮義痙病之發生於春季外則宣發太陽之表內則開泄厥陰之裡予之三十年前研究所得者爾時不知西醫之有腦脊髓膜炎也今春長沙市發生腦脊髓膜炎察其症情一一與國醫之痙病吻合顧氏之第一第二療法則用仲景之麻黃葛根青龍等方固為宣發太陽之表而一覺後腦疼痛即加入膽草芩連等藥為開泄厥陰之裡遙隔萬里得一氣求聲應之友不知景仰之何似也但國醫痙病為氣候病理之所特發而謂為多數溫病轉屬亦猶夫人之見故謂痙病初起只知在太陽最淺一層而不知為厥陰之大熱內沖然一覺後腦疼痛不重加麻桂葛根與附子而必用膽草芩連者蓋知此當然而不知此所以然故不能申說病源之所在也予之初診是病亦固若是嗣後屢診而屢研究之乃知病源之所在則宣發太陽開泄厥陰為治痙家之要素焉發熱期惡寒之後繼以發熱噁心嘔吐移時熱壯有汗或無汗躁熱口渴引飲無度水入即嘔氣粗而喘小溲短赤兩目漸漸無神脈洪而躁舌絳苔干頭痛加盛結喉旁人迎脈管跳動不惡寒而反惡熱此時之治法當分兩種一為有汗之治法一為無汗之治法有汗之治法用葛根芩連為主擬方如下葛根一錢五分茅根四錢膽草四分桑葉杏仁各三錢淡芩一錢川連三分蘆根一兩炙草六分說明壯熱口燥甚者必見津干可加花粉一錢後腦痛甚者膽草可加重至七分藥後如其見效病必熱勢退減噁心稀少口燥漸潤脈靜而和舌絳漸淡否則從速延醫尚再因循生誤病即入於危險無汗之治法常以大青龍湯為主擬方如下生麻黃四分生石膏膽草杏仁桑葉茅根各三錢去心川連四分炙草六分葛根一錢五分蘆根一兩去節薄荷一錢後入說明藥後當令周身出汗得汗則熱當退煩躁當安氣喘當平如此現象即是病退若不爾從速延請良醫診察因病愈之機會不可失去一失即難於挽救且此病為期甚短自起病以迄臨危中間經過時刻僅二十四鍾多則亦不過延至三十六鍾或四十八鍾而已詮義顧氏之論腦脊髓膜炎而有惡塞之期而有發熱之期而有危險之期而有不治之期正予之所謂亞急性與續發性者固有此種種症候也惟為期最短六語乃合予之所謂最急性痙病性極迅速一時暴發即斃不斃則延長亦不過一二日顧氏所謂經過時刻二十四鍾或三十六鍾至四十八鍾者是也若當一時猝發之時以針刺病者之手指爪甲或曲池委中諸穴無血則死國醫所謂內閉外脫無從救療有血則生以飛龍奪命丹或混合紫雪灌服之須臾汗出或嘔瀉即為可愈之病若汗後發生煩躁喘促是為汗之不得其法亦非不死之症從厥陰開泄之則喘促即平矣若初起而惡寒發熱頭痛嘔惡此皆痙之前驅症候治之得法未必成痙夫痙病必須頸項強背反張方為國醫督脈之病方合西醫之腦脊髓膜炎顧氏所謂惡寒之期固不是痙病而發熱之期亦未必是痙病必至此脈洪躁結喉兩旁人迎跳動則熱毒上衝而西醫之腦脊髓膜炎乃得有此種現象降以大劑苦寒如龍膽芩連之類從厥陰開泄之無不立效若其表未解則仍兼以宣發太陽之藥但當用辛香芳涼以橫散不當用辛溫升散以豎開斯時也葛根防風一派豎升之藥皆為所忌不似第一期時代猶可勝葛根防風之辛溫升散也若不顧熱毒上衝而再用辛溫升散之劑則腦脊髓膜炎從此成矣此立方所以必貴選藥也危險期發熱期治之不得法或未經醫治則熱不得退不退剛傳入神經系就病理言凡熱皆上行上行則侵入腦部延髓為神經總彙之區熱邪上行則神經受其熏炙而緊張平常工作頓失常態且一切均不由自立此時即見頸項強直甚則頭向後反此即腦脊髓膜炎所致其神志昏糊即知識神經受病之見端手足痙攣運動神經亦病其目睛上視或歧視或牙關勁強而不得開張者則滑車神經並頰神經皆病矣發熱期未見神經症時以退熱為先務熱退即可無事此時熱雖壯當以弛緩神經為最要發熱一層反居於次要地位故此時用藥當以弛緩神經為首要之圖苦寒降熱亦不可少如此乃為合法方用犀角地黃湯為主犀角尖三分磨沖膽草六分川連三分鮮生地六分滁菊三錢歸身四錢蠍尾二分去毒炙研沖赤芍一錢五分迴天再造丸一粒藥化服安腦丸一粒藥化服說明此時期之神經症每多陣發性倘一劑不知可照方連服二三劑每劑分三次服每服隔半時或一小時只服頭煎不服二煎病重而痙攣頻作者第一劑中當加羚羊三分磨沖第二第三劑去之因羚羊只可偶用少用不可常用多用如此施治輕者二劑當效重者三劑甚效若不見效當以虎骨天麻獨活防風人參鬚西洋參蚤休等酌量使用以救危急惟分量之多寡與此時之辨症用藥頗費斟酌非病家之有醫藥常識者當不能任意亂投詮義國醫之痙病必須如顧氏之第三期危險乃得合西醫之腦脊髓膜炎如第一期第二期尚未發生痙病之主要症狀只得為腦脊髓膜炎之前驅症候如無此第三期之危險則西醫所謂感冒疑似症蓋疑似腦膜炎而實際感冒也況西醫以吸取脊髓之混濁培養細菌為憑證即有項強背反極似腦膜炎而不以為腦膜炎雖西醫細菌之說不足憑證但必如顧氏之第三期危險乃為正式之痙病若無此正式症狀則不得謂之腦膜炎也其用藥亦必如顧氏之犀角地黃湯加蠍尾羚羊角乃為正式痙病之主劑獨活防風辛溫之升散終嫌未妥病勢至此血熱再無上衝之餘地內經高者抑之抑之不暇況揚之乎若蚤休清熱降逆消炎退腫又為治痙之要藥勝於西醫血清者多矣此立方之所以必須有法而選藥得當也不治期在危險期中尚能設法挽回其結果可得十愈六七及至不治簡直束手無策因此時之見症悉屬敗象如唇焦舌黑齒乾如枯骨頭向後反身體成弧形式手足踡縮時作痙攣口不能言卻作馬鳴或滿口糜爛臭不可近頭部身部隱隱見紫紅斑紋神志全不清或氣喘不能自續或大汗淋漓脈搏悉亂心肺腦三臟皆壞此為必死之候雖華佗再世亦當敬謝不敏矣故名之曰不治期詮義此顧氏第四期不治之痙病非盡不能治也齒乾唇焦舌黑或滿口糜爛臭不可近頭部身部隱隱見紫紅斑紋此為溫熱暑疫嘗有之症狀然不可治者若頭向後反身體成弧形式手足踡縮是作痙攣口不能言此為痙病正式之症狀亦非盡不可治者惟作馬鳴或作他畜鳴痙之終期多不可治而痙之初期未必不可治也大汗淋漓脈搏悉亂痙之終期多不可治而痙之初期未必不可治也至神全不清氣喘不能自續則死者多而愈者少矣若謂心肺腦三臟皆壞為必死之候此西醫模糊影響之談在他解剖生理上毫無確證之事實蓋人身生理關鍵全系之於呼吸呼吸停頓肺絕而諸臟器官皆死西醫以肺與心腦並列為三死門非特生理無所繫統而心腦之關鍵果何在耶予早已辨之於余氏醫述駁議中矣三三菊花達巔湯嚴蒼山特治主症病初起頭痛如劈項微強背不痙急四肢柔和者此湯主之藥品甘菊花冬桑葉蒼耳子穭豆衣蔓荊子明天麻苦丁茶各一錢石決明六錢薄荷葉八分酒白芍二錢嫩鉤藤二錢後入明麻鉤藤蒼耳苦丁皆為治痙妙藥此方重用石決明一味則於辛散太陽之中即能兼顧厥陰此方之所以能治痙病初起也現在社會一般青年凡有感冒即覺頭痛如劈此方總屬得宜三四羚羊舒痙湯嚴蒼山特治主症疫痙初起先呼頭痛如劈旋昏僕不省人事手厥冷足踡曲項強背反張脈弦細或沉細數者此湯主之藥品羚羊角尖三分菊花露磨沖或用片煎服粉葛根荊芥穗廣鬱金各一錢五分淡豆豉生石膏各三錢川連酒炒薄荷葉各八分甘菊花生白芍各二錢川桂枝四分蔥白三寸玉樞丹八分化服製法水三碗煎一碗勿泄氣用法羚羊角磨汁放碗中衝服玉樞丹先用水送下有痰聲者加鮮菖蒲一錢竹茹二錢舌糙者陰傷也去桂枝加花粉玄參鮮生地各三錢口氣臭者疫氣盛也去桂枝加板藍根六錢人中黃六錢詮義此方與前方同是一樣用意但前方妙在石決明鎮降此方妙在玉樞丹開泄用治亞急性之痙病初步未為不可然其特治主症之下先呼頭痛如劈旋即昏僕不省人事以致厥冷踡曲項強背反諸症蜂起例在最急性痙病之內但最急性痙病初起往往體厥脈伏而此條脈沉細弦數猶有熱毒外出之端倪非全伏也然症已至神昏不省人事治當以飛龍奪命丹或紫雪開竅醒神為急務此方淺膚殊難獲效三五羚羊熄風湯嚴蒼山特治主症疫痙獨頭痛如劈悽慘呼號入夜更甚內熱口渴脈象弦數舌苔薄黃春月感受疫氣挾風火上旋清空久必昏厥也宜服此藥藥品羚羊角三分銼粉菊花露先化服甘菊花粉丹皮天花粉肥知母青蒿各一錢五分大生地三錢薄荷鮮菖蒲各八分炒黃芩蒼耳子各一錢炒赤白芍各一錢玉樞丹八分化服用法羚羊角粉用菊花露先化服余藥如法煎服詮義辛涼香散妙在玉樞丹開泄厥陰此方能治亞急性痙病非獨可治頭痛也內熱口渴用知母花粉以清陽明而脈象弦數入夜病盛不如用龍膽黃連以瀉厥陰也況嚴氏謂春日感受疫氣狹風火而上旋清空發生頭痛昏厥猶當從厥陰以清降風火但既感受疫氣而又必挾風火然則疫氣不能發生頭痛昏厥而發生何病耶予以為嚴氏此條諸症皆系厥陰伏熱所致頭痛夜甚病久昏厥為厥陰症脈象弦數為厥陰脈嚴氏謂風火上旋則可也謂之疫氣而挾風火則不無語弊耳三六薛氏慢驚方薛立齋藥品人參白朮泡姜炙草歸身酸棗仁天麻茯苓廣皮生薑大棗用法厥冷加附子泄瀉加煨肉果水煎服詮義薛氏自注謂慢驚一症古無是名既慢矣又何驚哉是症或因大病過服涼藥或因痘後元氣未復或因傷寒吐瀉以致脾虧胃弱古人謂之慢脾風其症則四肢厥冷脈細或伏面色青㿠睡而露睛或額汗不語或瀉不止者皆是蓋此症無風可祛無痰可逐無驚可療治法溫補急挽元陽今之欲用溫補以療痙病者必須如薛氏如是議病如是認症而後不致僨事耳三七加味理中湯莊在田藥品野黨參川萸肉各二錢生白朮甘杞子生地黃各三錢炙甘草一錢破故紙二錢淡乾薑淡附片各八分全當歸一錢五分上肉桂八分用法無泄瀉者去故紙萸肉汗多加白芍五味水煎日服一劑詮義此溫斂脾腎之劑力量雄厚非上方所及三八烏蠍六君子湯原治諸症風痰嘔逆肢冷面青作搐藥品川烏頭附泡炙人參白朮半夏茯苓各三錢全蠍一錢五分廣皮甘草各一錢生薑三片大棗四枚用法水煎服詮義此即六君子湯加烏頭全蠍用治痙病而內無實熱者宜之三九薖叟和陽舒痙湯特治主症痙病經過日久熱退神清頸項猶強背尚反張身體不仁眼時上翻藥品生黃耆五錢當歸三錢生薑一錢大棗三枚北芥子一錢炒石乳香三錢炒白蒺藜五錢羚羊角四分雞矢白白丁香兩頭尖晚蠶砂各一兩製法羚羊角銼粉沖服四矢酒浸絞汁沖服余藥均用水煎用法徐徐服之日盡一劑詮義予憶二十年前陳姓童男入春發痙至夏不愈頸項猶強背尚反張兩目時翻一身不仁予處此方而愈嗣有同姓男童患痙如是服之亦痊迄今思之痙病初起涼藥久服腦腔中之水液血質凝結未散西醫所謂結核性腦膜炎者近是神農本草經謂黃耆治久敗瘡則有排膿化腐之功而腦腔中之結核何患其不能消化故以黃耆為主合之當歸生薑大棗則補助營衛調節溫度合之芥子乳香則消化水液血質之凝結合之羚羊蒺藜則通泄脈絡之滯塞至於四矢尤有專長雞矢白千金用之治小兒口噤肘後用之治角弓反張晚蠶砂能治半身不遂白丁香能消努肉兩頭尖能消乳癰合而為劑則疏通排泄下行濁道而腦腔中之結核何患其不消化耶四薖叟強腎補腦湯特治主症痙久涼泄不愈神識清醒顏面㿠白兩腳直硬肌肉枯瘦脈搏沉微或體狀暴虛頭汗淋漓肢冷欲厥此方悉治藥品熟地黃八錢山茱萸丹皮肉蓯蓉巴戟天雲茯苓各三錢附片淮牛膝各五錢肉桂八分北五味海狗腎紫河車各一錢鹿茸五分製法肉桂鹿茸河車狗腎四味研末余藥煎好調服用法日服一劑詮義此方從幼幼集成中紫河八味丸胎化而出幼幼集成用治年久月深之癇疾而予則用治涼久不愈之痙疾亦獲效果西醫只知強心有興奮神經之作用而不知強腎有興奮神經之作用蓋心與腦相貫通則在於神而清心即以醒腦義詳至寶丹方下而腎與腦相貫通則在於精強腎即所以補腦肉桂附子鹿茸巴戟紫河狗腎諸藥諸家本草皆謂其主治驚癇驚風然皆為強腎之藥強腎所以補腦腦髓虧耗神經衰弱驚癇驚風經久不愈故諸藥能主治之也予自歷驗以來諸凡溫熱暑疫經久不愈涼瀉之後脂膏盡脫神氣消索脈沉微欲絕或浮大虛散面色㿠白肢冷汗淋顏面掣動手足瘛瘲類似痙症以此而獲生者不知凡幾故春季痙病久涼不愈有此以上諸症亦用治焉乙開泄厥陰之劑一紫雪局方原治主症療腳氣口中生瘡狂易叫走瘴疫毒癘卒死溫瘧五屍五注心腹諸症㽲痛及解諸熱毒藥邪熱卒黃等症並解蠱毒鬼魅野道熱毒又治小兒驚癇百病藥品黃金一百兩寒水石磁石石膏滑石各三斤製法以上並搗碎用水一斛煮至四斗去滓入下藥藥品羚羊角屑犀角屑青木香沉香各五斤丁香一兩元參升麻各一斤甘草八兩炙製法以上入前藥中再煮取一斗五升去滓入下藥藥品朴硝十斤硝石四斤製法二味入前藥汁中微火上煎柳木篦攪不住手候有七升投在水盆中欲凝入下藥藥品麝香當門子一兩二錢五分硃砂三兩製法上藥入前藥中攪令調勻磁器收貯煎成霜雪紫色用法水調服詮義徐靈胎曰邪火毒火穿經入絡無藥可治此藥消解其效如神又曰二硝太多當用十分之一則藥力方厚丁香用二兩予所合者皆然方中黃金百兩以飛金一萬頁代之尤妙此亦國醫痙病之特效靈方無論最急性亞急性與續發性三種痙病皆可用之但比飛龍奪命丹之效能較為清涼而飛龍奪命丹只可用之於最急性痙病而亞急性與續發性痙病則無須此開竅透汗之重劑也然飛龍奪命丹透汗之餘旋利尿道方中之有燈芯炭人中白也而此方下泄之餘旋能透汗方中之有青木丁沉諸香也況焰硝一藥合麝香則能汗得朴硝則泄糞故此方獨重二硝而徐靈胎謂當減輕二硝分量則制方之奧妙尤未窺透也惜此方塵封已久自宋至清乃有葉桂徐靈胎王士雄輩始用之吾湘自鄉先輩陳原欽初自滬上購來施診嗣後武漢漸漸有之近來吾湘用之者頗夥而紫雪多不成霜用之太少則透毒泄熱之作用終不大顯昨歲衡山有劉氏婦自北平攜子回湘寓長沙市文廟坪一號其子年十三齡夏月患麻疹予主化毒清熱藥近三十餘劑而壯熱不退劉氏婦自北平購回紫雪一瓶約重三兩連日服完其子一夕熱退十指盡起潰瘍瀉下黑紅碧矢十數次遍身汗淋疹消附錄之以紀紫雪泄熱透毒之作用如此二玉樞丹局方一名紫金錠原治主症治一切藥毒菰子鼠莾惡菌疫死牛馬河豚等毒及時行瘟疫山嵐瘴瘧纏喉風痹黃疸赤眼瘡癤熱毒上攻或自縊溺水打破傷損癰疽發背魚臍瘡腫百蟲蛇犬所傷男子婦人癲邪狂走鬼胎鬼氣並宜服之藥品山茨菇去皮洗淨焙一兩川文蛤一名五棓子錘破洗刮肉桴二兩千金子去殼用紙包裹換紙研數十次去盡油無油成霜一兩麝香細研淨三錢紅芽大戟洗焙一兩製法上各研細末和勻以糯米粥每料分作四十粒於端午七夕重陽合如欲急制辰日亦得於木臼中杵數百下不得令婦人孝服人不具手足人及雞犬之類見之時逸人專服玉樞丹治痙病法每服五分日服三次至五次每隔三小時服一次須在初起時多服乃效不可遲延自誤用鉤藤五錢薄荷三錢煎湯送下小兒用量減半痰多用鮮竹瀝一錢生薑汁三分用水沖服詮義徐靈胎曰此秘藥中之第一方也用藥之奇不可思議或加硃砂雄黃各五錢尤妙時逸人謂朱氏方後注云玉樞丹治時行瘟疫及內外科之急性炎症於中醫經驗上極著神效今以西醫之病理解之則雄黃含有硫黃水銀有殺菌解毒作用麝香為興奮劑山茨菇舊說能治金瘡療諸毒新說則為和緩滋養劑大戟及千金子則峻下劑凡居峻下劑往在兼嘔吐作用亦可見為誘導消炎劑此方證以所說用治流行性腦脊髓膜炎似亦合理然拙見則以其效用決不僅此配合或內服後或能起一種化學作用乃有是效兩藥或數藥混合並用往往功用並增或另增其他效用此近代所謂合併治療也又某種藥物往往須內服後另起變化始見功效如山道年之治蛔蟲須由腸胃分解後其一部分由循環器移入肝臟變為一種物質又流膽囊與膽汁混合再行分泌入腸始見功效是也此方與下方太乙紫金錠開泄之餘亦復有宣竅之功國醫痙病均可於湯劑中磨化服之三太乙紫金錠局方原治主症治霍亂痧脹嵐瘴中惡水土不服喉風中毒蛇犬蟲傷五絕暴厥癲狂癰疽鬼胎厭魅及暑濕溫疫之邪瀰漫薰蒸神明昏亂危急諸症藥品山茨菇川文蛤各二兩紅芽大戟白檀香安息香蘇合油各一兩五錢千金霜一兩明雄黃飛淨琥珀各五錢梅片當門子各三錢製法上十一味各研極細再合研勻濃米汁糊丸綠豆大外以飛金為衣用法每用錢許涼開水送下詮義王士雄謂薛一瓢云此方比蘇合香丸而無熱較至寶丹而不涼兼玉樞丹之解毒備二方之開閉洵為濟生之仙品立八百功之上藥也四至寶丹局方原治主症治中惡氣絕中風不語中諸物毒熱疫煩躁氣喘吐逆難產悶亂死胎不下以上並用童便一合生薑自然汁三五滴和溫化下三丸至五丸神效又治心肺積熱嘔吐邪氣攻心大腸風秘神魂恍惚頭周昏眩口乾不眠傷寒狂語並治之藥品生烏犀屑生玳瑁屑琥珀研硃砂研飛雄黃研飛各一兩龍腦麝香研各一錢牛黃五錢安息香一兩五錢酒研飛淨一兩熬膏用水安息更好銀箔金箔各五十張生研細為末製法上將生犀玳瑁為細末入余藥研勻將安息香膏重湯煮凝成後入諸藥中和攪成劑丸如桐子大用法用人參湯化下三丸至五丸又治小兒諸癇急驚心熱卒中客忤不得眠煩躁風涎搐搦每二歲兒服二丸人參湯下之本事方中多人參南星天竺黃詮義徐靈胎曰安神安魄必備之方真神丹也王晉三曰此治心臟神昏從表透里之方也黃犀玳瑁以有靈之物內通心竅朱雄二箔以重鎮之品安鎮心神佐以腦麝安息搜剔幽隱諸竅東垣云冰雄牛麝入骨髓透肌膚抱撲子言金箔雄黃合餌為地仙若與丹砂同用為聖金餌之可以飛昇故熱入心包絡舌絳神昏者以此丹入寒涼湯藥中用之能祛陰起陽立展神明有非他藥之可及若病因頭痛而即神昏不語者此肝虛魂升於頂當用牡蠣救逆湯以降之又非至寶丹所宜輕試此國醫痙病神昏之特效靈方也然心腦原相貫通而神昏一症關係在心而亦在腦吾國往哲早已發明內經靈蘭秘典心者君主之官神明出焉脈要精微論頭者精明之府故心有所思而兩目之精瞳上注於腦是見心腦貫通之明證又古文思字上囟下心自心至腦一絲相續不絕故治心之藥皆能治腦也王晉三謂此方之犀黃玳瑁有靈之物內通心竅即可上通腦府珠雄二箔重鎮之品奠定心神即可奠定腦神腦麝安息諸香能搜剔心包絡幽隱諸竅即可搜剔腦神經幽隱諸隙故唐宋以來凡治督脈之癲狂驚癇為西醫神經病者類皆不離此種藥物故治今日痙病之神昏亦無非此種藥物耳西醫只知神經在腦不求心對於腦脊髓膜炎概無治法況治心乎五牛黃清心丸局方藥品陝西牛黃二分五釐鏡面硃砂一錢五分黃芩山梔各三錢黃連五分鬱金二錢製法上為末蒸餅糊丸如黍米大用法每服七八丸詮義王晉三曰此方古有數方其義各別若溫邪內陷包絡神昏者惟萬氏此方為妙蓋溫熱入於心包絡邪在裡矣草木之性僅能達表不能透里必藉牛黃幽香物性乃能內透包絡與神明相合然尤在配合咸宜萬氏用芩連山梔以清心火鬱金以通心氣辰砂以鎮心神合之牛黃佐使之妙調人犀角羚羊角金汁甘草人中黃連翹薄荷等湯劑中頗建奇功王士雄曰一方用牛黃雄黃黃連黃芩梔子犀角鬱金硃砂各一兩真珠五分冰片麝香二錢五分研煉蜜丸每重一錢金箔為衣臘匱封護功效較萬氏為勝此方與上至寶丹皆是治心之藥可以治腦故痙病之神昏不清者洵為良劑六青黛丸莊氏方原治主症小兒天弔客忤五疳八痢十二種驚癇藥品青黛天竺黃干蛤蟆一個黃泥包裹燒赤去泥干蝸牛殼黃連人參地龍鉤藤鉤龍膽草各二錢五分蘆薈熊膽各五錢牛黃麝香雄黃硃砂各一錢夜明砂胡黃連各三錢製法研為細末蒸餅糊丸如麻子大用法小兒一歲每服三丸空腹時米飲送下詮義此方與下天漿子散以治小兒先有疳疾而後發生痙病者開泄厥陰之功各極其妙一偏重龍膽黃連蝸牛地龍之涼一偏重南星白附半夏雄黃之溫醫者須審察小兒之體質分別強弱而用藥但小兒稚陽易發痙病尤不知小兒先有疳疾而更易發生痙病蓋小兒血管中最易沉著毒素往往沖腦而侵害於目以致目盲翳障社會上稱為疳疾入目者是也今於小兒天釣方中而用干蛤蟆夜明砂天漿子消疳之聖藥此古人制方所以絲絲入扣也干蛤膜破堅硬消癰腫丹溪謂其能發濕中伏火故治小兒諸疳夜明砂即天鼠子矢天鼠食蚊而屎乃蚊之眼蚊囓人血故其矢能入血管而消化毒素所以能治目盲翳障也天漿子為人屎所化能腹中堅硬無異於蛤膜能散目中翳障無異於鼠矢余所施診無有不效但痙病一時可愈而疳疾必須經久乃愈此種方治一時之痙病挾有疳疾而不可嘗服以治疳疾者如干蛤蟆天漿子五穀蟲諸藥配之於良善藥中以治疳疾亦無不效焉七大黑龍丸六科準繩原治主症小兒急慢驚風藥品膽星礞石硝煅各一兩天竺黃青黛各五錢蘆薈二錢五分辰砂蜈蚣燒灰各二錢五分殭蠶五分製法研為細末甘草汁和丸如雞頭大用法每服一丸或二丸姜蜜薄荷湯送下詮義此方連下兩鎮驚丸皆於鎮墜之中寓以開瀉也然其分別之處此方用蜈蚣則弛緩神經之力多第八鎮驚丸用乳香則引血下行之力多第九鎮驚丸用龍齒則鎮心定驚之力多醫者須審察用之不可混並也礞石性寒而降焰硝性熱而升二藥合制則一升一降透上透下痰飲積聚一併俱化矣八鎮驚丸證治準繩原治主症小兒一切驚癇藥品琥珀辰砂真珠母青皮甘草各二錢五分青黛蘆薈柴胡青礞石硝煅各五錢天竺黃膽南星各一兩天麻乳香各一兩雄黃一錢五分製法共研細末甘草膏丸如雞頭大用法每服一丸慢驚參朮湯送下急驚薄荷姜蜜湯送下九鎮驚丸證治準繩原治主症小兒一切驚癇藥品茯神去木鐵粉遠志去心薑製炒紫石英人參琥珀滑石蛇黃煅醋淬南星泡各二錢五分龍齒熊膽各五錢輕粉三分製法共研細末煉蜜為丸如梧桐子大硃砂為衣用法每服三五丸不拘時金銀蒸湯磨化服一天漿子散證治準繩原治主症天釣驚風藥品天漿子炙蠍梢犀角屑丹砂另研雄黃另研附子去皮臍天南星泡去皮白附子半夏水銀另研乳香另研白殭蠶膩粉另研牛黃另研各一錢麝香一字另研銀箔五片另研製法研為細末和勻用法每服一字薄荷湯調下量兒大小加減一一奪命丹謝氏方原治主症小兒急驚不省人事眼定不動牙關不開唇白並黑者藥品天南星硃砂半夏各四兩真珠新白者二錢巴豆去油淨一錢金箔銀箔各十片輕粉麝香各五分製法先以南星半夏研末用生薑汁和作餅子曬乾余藥各研細末和勻飛羅面打糊丸黍米大用法每一歲小兒服一丸燈芯湯送下詮義此方用巴豆輕粉之開泄下方天麻丸再加牙硝則開泄之力更大矣現在東醫能知用巴豆輕粉以治腦膜炎未嘗不由於此而吾國醫界反不敢用何也蓋緣不知最急性痙病之暴起者非用此開泄大劑不能回生於頃刻麝香之宣竅透毒巴豆之排膿下積性極迅速毫無存留用治最急性痙病不霎時雲散天空藥到病除古人立方之奧妙處非閱歷深者曷能知之若夫亞急性與續發性痙病則未可概論也一二天麻丸仁齋直指方原治主症鎮驚下痰小兒食癇有痰及吊腸鎖肚嘬口等症藥品天麻白附子泡馬牙硝川靈脂全蠍焙各一錢天南星泡二錢輕粉五分巴豆霜一字去油製法研為細末煮稀麵糊丸如麻子大用法每服一丸至十丸不拘時薄荷或生薑煎湯下一三千金龍膽湯千金要方原治主症嬰兒出腹血脈盛實寒熱溫壯四肢驚掣發熱大吐哯者若已能進哺食實不消壯熱及變蒸不解中客人鬼氣並諸驚癇方悉主之藥品龍膽草鉤藤皮柴胡黃芩桔梗芍藥茯苓甘草各六銖蜣螂二枚大黃一兩製法上十味㕮咀以水一斗煮用法取五合為劑服之得下即止詮義此痙病開泄厥陰之主劑也考千金論癇與痙皆由於藏氣之不平則癇之與痙同一病原但以病發身軟時醒者為癇身強直反張如弓不時醒者為痙則其症狀乃有分別耳然謂諸反張大人脊下容側手小兒容三指者不可復治是統論癇與痙之危險似無分別又其灸癇之法謂若身強反張灸大椎至窮骨是為督脈地位而痙病之項強背反亦不能外此督脈地位似又無分別予故謂千金痙病混合於癇病之內而治癇之方即是治痙之方也千金此方以龍膽草命名取龍膽草直入厥陰之臟而以大黃排泄於胃腸此予所以謂為開泄之主劑也鉤藤氣輕清而性甘寒擅於鎮驚張山雷所謂最合稚陰未充稚陽易旺之體質誠為不錯然推測千金用藥之奧旨則鎮痙之力不在鉤藤而在蜣螂蜣螂性喜撲火而腦膜炎之灼熱潮紅則為火之劇烈者蜣螂之氣相感召最易混合必在千金制方用意之中故凡腦神經之智慧不清者如大人之癲疾狂妄小兒之驚癇瘛瘲皆系干犯神經之病此藥無不治之然蜣螂性質雖喜撲火受驚則伏頭縮腳而墜則其性上升而又下降矣況取糞為丸衣之以土倒曳於坎中其能使腦腔中之漿膿血膿循腺道而排泄於胃腸又可知矣此方所以既用大黃而又用蜣螂也予於腦膜炎外嘗用蜣螂以治腹滿脹痛及頭暈脹痛者往往獲效今市醫不究蜣螂之作用又不推測千金用藥之奧旨用此方而棄此藥惜哉又予以此方為開泄厥陰之主劑而最急性亞急性續發性之痙病無不主之但不無加減之法若照千金之重用大黃則柴胡桔梗不嫌其升提若不用大黃則升提終嫌未妥宜審慎之如表未宣發則加蔥白淡豉荊芥防風殭蠶蟬蛻裡熱熾盛則加黃連黃柏梔子木通合之天麻蒺藜桑葉菊花則熄風通絡合之板藍根馬勃金銀花金汁則解毒逐穢如頸項強進而為身體強則加白花蛇蜈蚣全蠍如巔頂高腫背脊凸突則加蝸牛地龍牛膝乳香活法在人曷罄所述予診痙病十有一屆用此方以活者甚多即類痙亦愈不少近見惲氏鐵樵因痙病頭痛之病形而推測神昏之病能悟用此方先得我心佩服佩服余義詳惲氏七味龍膽湯下一四七味龍膽湯惲鐵樵特治主症凡腦膜炎初起覺腦悶頭脹痛眼眶或後腦發酸唇吻顫動手腳冷而微抽搐者此藥立愈藥品龍膽草五分滁菊三錢川連四分鮮生地歸身各四錢犀角三分回生丸半粒製法前五味煎成犀角三分磨沖回生丸半粒和煎化服用法初起服此藥一劑其病立愈徜神昏讝語瘛瘲雙目上視者加羚羊角三分六點鐘內服兩劑可以起死回生已愈多人最為穩當𤼏藥之分量切勿更動詮義惲氏謂近日流行性腦膜炎西人說是一種病菌中國不講菌學自昨年至今予之所醫治者在廿人以上其不治者不過四分之一耳推考西醫之腦膜炎是神經系病則與中國之痙病相同對於千金方所說纖悉畢合故知西醫之腦膜炎確是國醫之痙病也更進而考正內經肝之變動為握王太僕注握是痙攣因而知神經系病國醫內經屬之肝病腦膜炎之初步總是頭痛古人以肝經頭痛屬之膽病故千金謂之膽腑病蓋肝與膽相為表裡則是少陽乙木化火上炎之故但其主治法常苦以降之龍膽黃連正是苦降肝膽之火也於是參用千金治法以犀角龍膽當歸生地為主藥其餘隨症加減竟得成績四分之三已經神昏讝語者服之則神志清明已經目上視者服之則恢復恆狀執果溯因益知推測膽火上逆之不誤但時醫只知腦膜炎之為傷風發熱頭痛頸項酸而不知膽氣上逆因而頭痛且不知因膽氣上逆之頭痛可致神昏竟用淡豉豆卷石斛等通套之藥若問其何故神昏則引葉桂溫邪犯肺逆傳心包之說舍此別無理由之可說也此論頗有會悟予從惲氏中醫改進平議節錄出之以語體翻成文體推測腦膜炎為痙病能知以千金龍膽湯為主劑則惲氏之學識經驗勝人處但國醫之痙病屬之督脈不但內經可證即西醫解剖病理其病灶在腦與脊亦可確證惲氏屬之少陽膽病終有所不符也一五加味龍膽湯時逸人藥品龍膽草天麻云連牡丹皮白蒺藜酒芩各一錢五分生石決明八分雲苓嫩鉤藤杭菊生白芍全栝蔞各三錢茜草二錢生甘草八分製法水煎服用法舌赤干絳加生地五分熱極讝語加犀角片羚羊片各八分痰甚加竹瀝一兩枳實一錢舌蒼黃厚不大便加大黃元明粉各一錢五分壯熱無汗加淡豆豉三錢薄荷葉二錢惡寒未罷肢痛加荊防各一錢秦艽三錢項強手足掣動角弓反張加蠍尾五分熱甚舌光絳爪甲色紅不活此熱盛津涸去膽草黃連倍白芍加生地元參各三錢一六龍膽瀉肝湯局方藥品龍膽草生地甘草各三分柴胡澤瀉黃芩梔子各一錢當歸三錢酒洗木通車前子各五分製法上十味水煎服一七加減龍膽瀉肝湯嚴蒼山特治主症頭痛甚身熱口渴目紅如鳩大使秘結小便赤澀脈弦數苔黃口苦肝火內燔風動火升藥品龍膽草生山梔黃芩赤芍各二錢胡黃連一錢小生地車前子包各三錢潼木通軟柴胡生甘草各八分製法當歸龍薈丸先空心吞後服煎藥每日二次用法服藥後大便不通者去當歸龍薈丸加生川軍三錢芒硝一錢五分頭痛不減者加羚羊角三分銼粉化服並可加玉樞丹以解疫一八當歸龍薈丸局方原治主症治肝經實火大便秘結小便滯澀或胸膈作痛陰囊腫脹等症藥品當歸龍膽草黃連黃芩黃柏梔子各一兩大黃蘆薈青黛各五錢木香一錢五分麝香五分製法麝香另研調入余藥共為末炒神麯水泛為丸製法每次三分或五分開水吞服一九黃芩湯傷寒論原治主症太陽少陽合病下利藥品黃芩三錢芍藥甘草炙各二兩大棗十二枚劈製法清水一斗煮取三升去滓用法嘔者加半夏生薑溫服一升日再服夜一服詮義王士雄曰少陽膽木挾火披猖嘔是上衝利由下迫半夏生薑專開飲結如其熱熾宜易連茹予以此為亞急性痙病之主劑而最急性與續發性亦可通用之若亞急性痙病之發熱頭痛嘔吐噁心西醫認為腦膜炎之前驅症候究為少陽發生之病今仲景以下利而謂為太少二陽合病則必於下利之外既有發熱惡寒腰背骨節痛之太陽症又有胸滿心煩或脅痛嘔吐口苦咽乾目眩之少陽症故假之以治亞急性痙病初起之發熱頭痛嘔吐噁心允為愜當審其有飲照加薑夏審其熱熾照加連茹或再加龍膽草川楝子川牛膝牡丹皮桑葉木通以下降之如猶惡寒不出汗則加淡豉蔥白薄荷以表散之但痙未必下利下利則不痙矣不當甘以緩中大棗甘草去之可也如果下利則未必發痙其矢酸臭或黑黃瀑矢邪熱自有開泄之路而又兼脈洪浮數斷斷不致發痙也如不下利而脈沉細澀遲頭痛甚劇發痙堪虞此予之歷驗如此故特表而出之二十大承氣湯金匱特治主症痙為病胸滿口噤臥不著席腳攣急必齘齒可與大承氣湯藥品大黃四兩酒洗厚朴半斤去皮枳實五枚炙芒硝三合製法上先煮枳樸去滓納大黃煮去滓納芒硝煮更上微火一兩沸用法分溫再服得下余勿服詮義金匱治痙三方栝蔞桂枝湯葛根湯宣發太陽劑也大承氣湯開泄厥陰也然栝蔞桂枝湯葛根湯兩方義已詳上而大承氣湯本是傷寒論治陽明胃府之方而金匱以之治痙病則曰可與者是開泄陽明胃府而厥陰之邪熱隨之而下不致沖激於腦也唐容川補正金匱以栝蔞桂枝湯葛根湯大承氣湯三方皆為痙病門中主中之賓非治痙之正方此論誠是然以陳修園論痙注中有由於血少津枯不能養筋脈句遂以生津血利筋脈為治痙之正法則非也蓋生津血利筋脈則是痙罷調理之法若當痙發之時一面宣發太陽消散水液一面開泄厥陰溶解血質正當汗下消化血液之不暇何況生津和血哉倘以金匱發汗太多致痙風病下之致痙謂仲景明示以生津血和筋脈之法則是誤治致成類痙之療法非僅汗下兩端也今日西醫之誤施注射致成類痙猶可以生津血和筋脈治之若夫國醫溫熱諸病誤施溫補致成類痙則生津血和筋脈得不添薪助油耶邇來市醫不辨痙之原因隨聲附和總以生津血和筋脈為能事戒用汗下無怪西醫之腦脊髓膜炎而國醫無解決之日也二一風引湯千金要方原治主症除熱癱癇藥品大黃乾薑龍骨各四兩桂枝三兩甘草牡蠣各二兩寒水石滑石赤石脂白石脂紫石英石膏各六兩製法上十二味杵粗篩以葦囊盛之用法取三指撮井花水三升煮三沸溫服一升詮義陳修園曰金匱痙病灸瘡難治仲景未出其方傷寒論火逆諸方亦恐其過溫余用風引湯減去桂枝乾薑一半研末煎服往往獲效此方開泄之中兼以鎮斂二二瀉青丸錢乙原治主症治肝膽實熱多驚多怒不能安臥目斜上視黑睛緊小白睛青赤腫痛大便不通腸風便血陰汗躁臭小兒急驚抽搐痰熱目直竄視藥品當歸龍膽草川芎梔子仁川大黃羌活防風製法共研細末煉蜜為丸如芡實大水泛亦可用法每服半丸至一丸竹葉煎湯用砂糖溫水化下或煎竹葉泡薄荷湯下詮義此方開泄之中兼以宣發二三清瘟敗毒飲余師愚藥品生石膏一兩黃芩赤芍連翹牡丹皮生地知母淡竹葉山梔玄參各三錢甘草一錢犀角川連桔梗各一錢五分時逸人加減法痰熱盛加浙貝五錢羚羊角一分磨沖芒硝一錢泡沖喉痹加山豆根五分射干五錢川鬱金一錢五分項強加山甲片三錢桃仁三錢三七末一錢詮義嚴氏蒼山謂此方治各種瘟疫則效惟治痙病則殺人蓋嚴氏以痙系血虛之體表感寒邪內郁陽熱非全屬疫氣必至痙病日久表寒已從熱化證見大渴引飲此方乃用之如神若陽熱為表寒所郁不發表清裡驟進苦寒大劑內熱甚者水愈潑而火愈熾直冒巔頂頭痛則昏厥立至內熱輕者水一至而火頓熄陽氣式微內外如冰四肢厥逆目睹時醫誤投增劇者不知凡幾此為嚴氏閱歷有得之語然謂誤投此方水潑火熾直冒巔頂頭痛昏厥則是寒涼壓伏內熱之過此理自吳又可發明之後知之者僅見嚴氏一人陸九芝張錫純輩注重白虎湯以治溫熱諸病未審曾亦遭此挫折否抑或遭之而不自覺也予常見治伏氣溫熱諸病初起壯熱醫者不知透熱之法而徒知以白虎清熱服下登時額鼻厥冷漸及兩足如其脈不沉伏移時復熱較勝於前若脈沉伏不起則體厥而脈隨之以厥者每致不救若服此種方而遍變痙病如嚴氏所謂水潑火熾直冒巔頂頭痛昏厥者予亦遇之詳第十篇驗案中不贅又嚴氏蒼山曰疫痙開始以來自民國十七年冬及十八年正月間陽氣不藏霜雪稀少燠暖異常身穿棉夾可以度歲桃李反花伏氣之蠅蟻皆蠢蠢欲動至二三間轉見奇寒逼人非圍爐披裘不足似禦寒時令反常戾氣遊臻照生理上而言人身之陽氣至春則發泄於外肌肉漸鬆忽而寒暖不常起臥失慎肌腠失其啟閉之職遂感之而成病謂之寒疫也可然則十九年以後霜雪甚繁而疫痙不絕者抑又何故推其所因厥有三害一曰過暖一曰煤毒一曰人氣今人喜用鴨絨枕墊及鴨絨被帳毛絨圍巾非不輕軟適體也蓋以高年火衰則相宜少壯陽盛則熱毒由是而伏矣其害一近時煤油燈煤球爐及一切火爐煤灶用者只圖便利殊不知毒由是而受矣其害二通商大埠地隘人稠往往一椽同住數家一家聚臥一室租則省矣殊不知呼吸之間酸素不夠輸換炭氣由是而積矣紀曉嵐之詩曰萬家煙火暖云蒸消盡天山太古冰即此之謂也其害三故疫痙之來路大概分為二路十八年之開始流行為因天時所造成十九年以後之來路乃因人事所造成其由內伏熱毒再感春寒之所致則一也按嚴氏此論一由於天時一由於人事則於痙病之原因透發無遺予居鄉村五十年診痙病十有一屆非開始於民國也開始於民國者乃腦膜炎之學說自歐美輸入報紙宣傳自民國始非前此吾國無痙病也予旅長沙市三四年以來所診之病大半由於溫熱往往血壓增高誠有如嚴氏所稱三害者非獨痙病為然也然嚴氏謂痙病內伏熱毒再感春寒此二語真為扼要之論佩服佩服但綜觀嚴氏全集如自序中有曰血虛陽旺之人感之寒束於表熱鬱於裡筋脈血虛則乾燥得寒則拳急此未必是熱毒內伏矣又疫痙之症狀篇中有曰太陽之表既為寒所閉陽明之熱氣無所發泄悉湊集於表醫理所謂寒鬱物理所謂反動份子作用亦未必是熱毒內伏矣然則嚴氏之論痙譬之藩籬自築自抉則於痙病之原因終無確定之主義夫以血虛陽旺之體質感寒而發痙與夫陽明之熱為太陽寒閉而發痙不過握拳縮爪或搐搦瘛瘲而已亦必漸積而成為國醫痙病之類症斷無如西醫之腦脊髓膜炎為國醫之痙病項強背反頭搖口噤齘齒足攣而猝起暴發者在在有之嚴氏於痙病之原因既無確定之主義而其治療故分偏寒偏熱兩門亦未必一以貫之是嚴氏之論痙猶有一間未達也二四疫痙解毒湯秦伯未特治主症此方適應於腦膜炎增進熱重神昏角弓反張之裡症者藥品羚羊角五分白芍人中黃各二錢菖蒲一錢五分銀花連翹滁菊各三錢黃連六分栝蔞四分牡蠣二兩製法水煎服用法熱重加犀角三分大便秘加大黃三錢津液干加生地四錢蘆根一兩詮義痙病熱毒沖腦由於厥陰上逆此方重用牡蠣二兩合之白芍黃連以開泄之此秦氏未發之旨也二五二子輕清飲邵逸飛特治主症痙病初起病在太陽陽明之表惡寒發熱頭痛連腦後脊痛或咳或小便頻數或嘔惡胸悶舌苔白滑或白膩脈浮弦或帶數此乃風邪化火由衛入營之候宗內經風淫於內以立方藥品薄荷葉大力子各一錢五分鉤藤尖滁菊花香蒿頭黑山梔各三錢霜桑葉一錢白蒺藜二錢明天麻五分川雅連三分玉樞丹三分用法玉樞丹磨沖余藥水煎服詮義邵氏曰是方與風溫治法相同蓋痙病初起與風溫大同小異千金謂溫病熱入腎中則痙從可知矣是以痙病初起不外清涼解表透肝泄邪川連一味熱不盛者可除如發熱甚者用以阻風溫入肝且以平肝氣上衝而為嘔惡耳按邵氏論治痙病之法完全遵從葉桂溫病治法故初起溫邪犯肺則用二子輕清之辛涼香散逆傳心包則用金石保津湯清心牛黃丸安宮牛黃丸順傳胃府則用抽薪保陰湯之大黃芒硝此邵氏所謂痙病與風溫之大同處然二子輕清飲之用玉樞丹金石保津湯之用石決明是邵氏之論痙病與風溫小異處然邵氏既曰痙病初起不外清涼解表透肝泄邪已與溫病治法不同而得治痙之真訣矣乃又曰痙病初起在太陽陽明之表下方則曰陽明燥氣極烈再下一方則曰陽明府氣燥烈不得傳送大便夫痙病雖有太陽陽明之症然與透肝泄邪之法相隔甚遠何也蓋邵氏不能從透肝泄邪之法悟到火熱內伏由厥陰上衝之理故論痙病不出葉桂溫病之範圍而其治療終無大異處也二六金石保津湯邵逸飛特治主症痙病既成項脊強痛身體反張臥不著席頭汗齊頸神昏譫語時時欲起舌苔黃尖絳津少質燥脈弦數此乃溫邪化熱陽明燥氣極烈急宜存陰保津藥品鮮生地生石膏生石決明各二兩牡丹皮淡豆豉各三兩肥知母川雅連各二兩鮮竹茹鮮石斛鮮茅根各五錢羚羊角一錢牛黃清心丸一粒或安宮牛黃丸等亦可用法牛黃清心丸或安宮牛黃丸磨沖余藥水煎服二七抽薪保陰湯邵逸飛特治主症溫熱化燥津液受傷角弓反張神昏語糊少腹堅硬陽明府氣燥烈不得傳送大便結實燥熱亦烈宗亢則害承乃制意立急下存陰法藥品生石膏三兩鮮生地二兩火麻仁元參心人中黃生紋軍各三錢鮮石斛鮮蘆根各一兩栝蔞仁五錢元明粉二錢犀角五分用法犀角磨沖元明粉泡沖余藥水煎服二八梔豉桔梗湯顧允若特治主症痙病初起惡寒發熱頭項強痛然口不甚渴便溲如常或溲色略帶微黃此時進以苦辛輕劑最為中病此湯主之藥品生山梔香豆豉苦桔梗蘇薄荷嫩桑葉制殭蠶兒刺或用晚蠶砂杭甘菊青連翹小川連鮮竹茹用法分列如下咽痛者加大青葉五錢紫金錠兩三錠磨沖鼻衄者加生側柏四錢鮮茅根五十枝咳嗆痰多者加真川貝三錢白杏仁五錢胸痞嘔惡者加廣鬱金一錢五分天竺黃三錢如舌苔黃膩者紫金錠仍可沖服或香連丸一二錢白湯送下如肝膽實火沖激舌絳色紅者改用當歸龍薈丸一錢五分唯有表症者不可驟用表裡俱熱者加青蒿綠豆甚則再加生石膏白知母詮義顧允若曰苦辛輕劑徐之才謂輕可去實較為藥之氣輕而上浮者蓋在表之邪當輕而揚之也本症溫毒雖與傷寒異而病毒從口鼻而入其從表入里則與傷寒同故初起如里症未熾表症方張當進苦辛輕劑冀其邪之從外而內者仍從內而達之於外此治初起而有表症之要圖也按顧氏之論痙病即予之所謂續發性痙病也而顧氏謂痙病由於溫毒溫毒入自口鼻夫鼻通肺口通胃溫毒犯肺證見咳嗆喘逆溫邪犯胃證見嘔惡胸痞然顧氏不以為痙病初起之主症而以為附症則溫毒入自口鼻之謂何若發熱惡寒頭項強痛外感之入於太陽者有之伏氣之出於太陽者亦有之如以咽痛鼻衄舌色紅絳為初起之憑證則其病自營而之衛非自衛而之營發熱惡寒頭項強痛即為伏氣外出之見證咳嗽喘逆嘔惡胸痞亦為伏氣外出之見證斯時也毫無痙狀之可據不得遽謂之痙病而顧氏於苦辛輕劑之中或加紫金錠或加香連丸或加當歸龍薈丸佐以苦辛重劑正予之所謂開泄厥陰者雖無痙之症狀而有痙之治療未為不是乃何以第二三四諸條只知清化陽明治外感內入之溫病而不知開瀉厥陰治伏氣外出之溫病以致第五六兩條竟成續發性之痙病而呈莫救之病狀冤哉二九加味葦莖湯顧允若特治主症表邪化熱已入陽明經氣見症惡寒極微發熱熾盛頭痛項背不柔和口渴喜飲嘔吐頻作小溲變色急進甘涼輕劑此方主之藥品活生蘆根桂府滑石生山梔香豆豉粉葛根青連翹天花粉鮮竹茹用法若陽明熱盛者合新加白虎湯為一劑酌加生石膏知母寒水石生苡仁以清解陽明之熱若兼四肢麻木者張石頑謂此即時疫之報使當即參加解毒如川連黃芩銀花人中黃犀角羚羊角等均可隨症加減雖有定法然須變通也三銀花解毒湯顧允若特治主症壯熱如烙尚覺微寒神識漸蒙皮膚或現斑點頭痛項強嘔吐煩悶此時溫毒已入陽明血絡較之陽明經氣又進一層非清熱解毒不可此方主之藥品金銀花山豆根鼠黏子生山梔青連翹馬勃射干板藍根生甘草小川連淡黃芩嫩薄荷鮮蘆根詮義顧允若曰此方於清熱解毒之中加以宣絡舒氣為溫毒出路蓋有出路斷不致上壅此治法要圖也三一加味犀角白虎湯顧允若特治主症大熱大渴狂言見鬼登高棄衣撮空理線頭痛如劈項背牽強或斑疹焮紅發頤喉痹等症此溫毒熾盛己成燎原當以清熱解毒重劑與之此湯主之藥品烏犀角羚羊角上川連生石膏生知母生白芍鮮綠豆大青葉陳年金汁金銀花薔薇露生苡仁鮮蘆根若頭痛如劈大便硬秘舌苔如沉香色而堅硬如刷者可參以承氣法加生枳實元明粉甚則加生川軍以峻奪之使毒火下泄則斷不致上壅此去火抽薪之法也然本症至此已入危途方書有脈弦者生脈澀者死然要以陽症得陽脈者生若過於堅硬如索亦非佳兆按烏犀角羚羊角及神犀紫雪等若至發狂熱極者均須重用竟有用至二三錢者此歷驗之方也三二犀羚甘露飲顧允若特治主症溫毒熱傷血液經絡不獲營養則神經性必起有極大變化為頭痛如劈為項背強硬為肢體拘攣中醫謂之痙病於小兒俗謂之驚風歐醫斷為腦膜炎者皆系血液為溫毒灼傷神經為之緊張此方主之藥品烏犀角羚羊角生山梔生白芍生石決明鮮生地鮮竹茹鏡面硃砂淨明雄黃金銀花人中黃用法蚌殼水代水煎藥鮮甘露根五兩打汁沖白頸蚯蚓長約六寸許者二條井水沖洗打汁沖如蚯蚓不易得者乾地龍代之或取鮮細葉菖蒲重用打汁亦佳詮義按顧氏所論至此第五條乃似國醫之痙病其餘皆溫病之見症耳故第一條惡寒發熱頭項強痛為太陽溫病之見症非痙也第二條之微寒壯熱口渴喜飲嘔惡頻作小溲變色頭痛項背不柔為太陽陽明溫病之見症亦非痙也第三條之頭項強神識漸蒙皮膚髮現斑點深入陽明血絡為陽明溫病之見症又非痙也第四條頭痛如劈項背牽強大熱大渴狂言見鬼登高棄衣撮空理線證見陽明腑實無非為溫病之見症非痙也此皆西醫之所謂疑似腦膜炎者外感之溫病自外入內有此症候伏氣之溫病自內出外有此症候皆不合西醫之腦脊髓膜炎皆不得謂之痙病然以第一條之初步處方顧及厥陰第四條之中途論脈而有弦硬如索之象觀之則知顧氏皆論伏氣溫病傳出太陽陽明兩經若系外感溫病則第二三四條諸方已發大陽之表已清陽明經氣已瀉陽明腑實足以清解外感之溫病而有餘矣乃病至末期而頭痛如劈而項背強硬而肢體拘攣竟成續發性之痙病何哉蓋伏氣溫病愈清涼而愈不得出愈滋養而伏之愈堅顧氏之方皆清涼滋養之品以故厥陰內伏之火熱不得下泄終至上衝於腦發生痙病則知國醫痙病關係於厥陰內伏之火熱不得以治溫病法治之可概見矣三三鎮沖玉女煎顧允若特治主症陽毒熾盛陰血素虧方書所謂肝陰薄弱者如壯熱頭痛頭背強直肢體拘攣而舌色絳剝若舌質枯萎如秋葉者為陰虛已竭十死八九脈細而數者治法於鎮肝清絡之中當兼顧陰分此方主之藥品生石膏鮮生地石決明紫石英生白芍肥知母嫩白薇杭麥冬生鱉甲生壯蠣靈磁石川牛膝詮義顧允若曰此方滋養陰血導火下行以清肝熱此邪實正虛之一法也又曰總之腦膜炎為溫毒之攻衝於腦者溫毒即為產生此項病菌之原素故能治溫病即能治腦膜炎固無煩乎抽取脊髓減輕局部之壓迫雖不致抽盡脊髓而致他變然亦非妥善法也按溫病至於末期成痙則為誤治之過乃予之所謂續發性痙病者顧氏謂能治溫病即能治腦膜炎此論大有不然顧氏固能善治溫病矣而竟至末期變成痙病則知前此治溫之法終非治痙之法況顧氏不能悟到國醫痙病屬之督脈不能符合西醫之腦脊髓膜炎此顧氏之缺點處故此第六方不名之鎮督而名之鎮沖則見國醫痙病之在沖而不在督也若陽熱熾盛陰血素虧尤當以透熱為急務熱透矣徐徐救陰可也若熱未透而先滋之則更灼其陰矣況潛之乎此方之不可以治正虛邪實也顧氏閱歷未深故言之有不當也三四羚犀解毒湯嚴蒼山特治主症疫痙壯熱神昏起臥不安舌焦糙無津者此湯主之藥品犀角尖三分銼粉金汁化服羚羊角尖三分銼粉金汁化服葛根一錢五分鮮生地三錢淡豆豉打鮮石斛肥知母京元參各三錢生石膏四錢生白芍二錢益元散三錢荷衣包玉樞丹八分化服製法水四碗生地石斛先煎至三碗再加余藥煎至一碗將犀角羚羊角玉樞丹化服用法牙噤不能開者銀筷撥開服之大便久秘者加生川軍二錢元明粉一錢有嘔吐者加鮮竹茹二錢口氣臭者加人中黃二錢板藍根六錢家道貧寒者去犀角羚羊角易神犀丹一粒或紫雪丹四分均用金汁一兩化服發斑疹者加大青葉三錢炒赤芍二錢詮義此方嚴氏雖名疫痙然無國醫痙病之症狀可據則舌苔焦糙神昏壯熱起臥不安與陽明溫病何異但此方於滋液清熱藥中加益元散泄之於小便玉樞丹泄之於大便中病而又能去病方法甚為可取三五薖叟清心醒腦湯特治主症痙病解後項不強背不反或妄言見鬼或重聽重視或眼翻不下或如癡如狂神識不恢復恆狀此湯主之藥品生遠志鬱金丹參天竺黃各一錢犀角片云連各一錢鮮生地玳瑁片各五錢琥珀硃砂各五分燈芯一握淡竹瀝一瓶鉤藤鉤八錢製法琥珀硃砂研末同竹瀝沖鉤藤後入余藥水煎服詮義予憶清末治一張姓男兒年近二十歲春季患痙解後語時眼翻不下呼頭大痛服此方十數劑獲效爾時不知西醫之有腦脊髓膜炎也今名之為清心醒腦者類集一派清心寧神之藥心神一清而腦神安熱無恙故語時而眼不翻頭不痛也心腦貫通之理詳上至寶丹方下三六大定風珠吳鞠通特治主症疫痙久纏真陰受傷或因過汗或因妄攻神倦瘛瘲脈氣虛弱舌絳苔少時時欲脫者此方主之藥品生白芍生龜板乾地黃各六錢清阿膠麥冬各三錢連心火麻仁二錢五味子五分生牡蠣鱉甲各四錢炙甘草一錢雞子黃一個製法阿膠溶化雞子黃攪沖余藥水煎服詮義溫熱諸病汗下之後神倦瘛瘲舌絳苔少脈微欲脫者此方本為良劑然非加人參鹿茸之大藥不能獲效於頃刻也痙病而有瘛瘲痙猶未解如非真陰受傷時時欲脫之症總屬腦與脊腔中之水液血質尚未清化遽投滋陰潛陽恐其人終有神識不清之弊予見者屢矣可不慎諸三七養血泄肝湯嚴蒼山特治主症疫痙後他無所苦唯頭暈或痛者肝陽未平熄也治宜益肝體損肝用此湯主之藥品炒菊花生白芍炒丹皮各二錢薄荷炭八分穭豆衣制首烏女貞子嫩鉤藤北沙參各三錢煅石決五錢明天麻一錢五分荷葉邊一錢製法嫩鉤藤後入余藥水煎服用法食欲不增者加淮山藥三錢口乾者加金石斛三錢小生地三錢詮義痙後頭暈或痛原因甚多肝陽未平只為一症如腦腔留有瘀血而其人如癡如狂時有昏厥之患診斷上極宜注意三八加味建中湯嚴蒼山特治主症脈虛緩舌苔白滑見風若不勝風者此湯主之藥品炙黃耆酒白芍潞黨參當歸各三錢川桂枝炙甘草八分生薑四片大棗二枚飴糖五錢製法飴糖溶化余藥水煎服三九加味炙甘草湯嚴蒼山特治主症痙後脈虛細口乾者此湯主之藥品炙甘草炒麥冬各一錢五分潞黨參酒白芍火麻仁阿膠珠各三錢桂枝心六分生地四錢生薑三片大棗四枚製法阿膠溶化余藥水煎服第十篇驗案一熊春安一案病者熊春安年十四歲江西人住下黎家坡九十四號熊湖印刷局症候既往症無現在症先日鼻衄越日夜深五鼓突呼頭痛發痙明晨西醫診視斷為腦膜炎注射不應下午始請予診仰臥於床面赤不語按脈左手緩弱右手沉細忽而弦勁直上下行復移診左手亦然兩頸人迎澎漲跳動胸挺息喘肩聳頭搖目上視頃刻平平復作頭熱烙手汗出如蒸籠口鼻氣噴如火烘神識似明似暗診斷病名最急性痙病脈象左緩弱右沉細忽弦勁直上下行舌苔淡黃苔有根判案此國醫最急性之痙病先日鼻衄為血熱上衝之報使越日發痙人迎脈管跳動胸挺息促肩聳頭搖目上視此真國醫痙病之病態但病邪犯腦猶未及脊故無背反張之一症金匱論痙其脈之直上下行必見之於發痙之時今以沉細之脈忽而弦勁直上下行足證金匱痙脈之有徵現在病者頭熱烙手汗出如蒸籠口鼻氣噴如火烘厥陰火熱沖激於腦已達極點急當開泄厥陰使火熱下泄不致侵害腦腔而成炎也處方龍膽草三錢關柏三錢云連一錢生梔三錢川牛膝八錢蜣螂二錢明麻三錢紅花二錢白芍八錢紫草三錢貫眾八錢先以紫雪一錢嫩鉤藤一兩煎湯徐徐灌下續服此湯預效此即千金龍膽湯加減重用貫眾入督重用牛膝白芍引血下行先服紫雪以宣泄之明晨便泄黑黃臭矢其痙必解次診脈象浮大滑數舌苔黃白厚滑中心罩以黑色判案昨下午六時至夜間九時灌前藥頭煎二劑紫雪一錢服完其父熊宣浦見其昏迷不語即來詢問謂前方可續服否予跟診之探其頭熱與鼻孔火氣漸減頭汗亦少足下微微有汗則厥陰上衝之火熱似有下降之機診其脈浮大滑數其痙欲解矣囑其父再服前藥頭煎二劑紫雪一錢其父守視達旦再召予述如前痙者周夜只發一次今晨瀉下黑黃臭矢神醒諸症皆退詢其所苦唯頭暈腳軟而已處方川牛膝四錢白茅根二兩龍膽草三錢關柏三錢白芍四錢紫草三錢蜣螂二錢貫眾四錢生梔三錢淡豆豉三錢蘇薄荷一錢五分預效此方仍主苦寒瀉熱重用茅根二兩合之淡豉薄荷清熱透絡病者痙雖解而留滯脈絡之餘熱不能遽清也三診脈象左緩長右緩弱舌苔薄黃苔右邊舌底干光判案服前藥四劑病者連日鼾睡小溲清長便由黑黃臭矢轉黃瀑則留滯之餘熱皆從下泄唯後腦風府隱隱痛背脊不舒冷汗時出此是督陽遏郁不能外出衛護周身耳治當助衛舒陽為要處方生黃耆四錢當歸三錢白芍三錢葛根五錢鮮石斛三錢麥冬三錢貫眾三錢忍冬藤一兩白菊花三錢生薑三片大棗三粒效果服前藥五劑風府痛除冷汗止續予黃耆建中湯加烏梅一粒愈後宣浦贈予腦膜炎聖手方箋千紙志謝二李男孩一案病者李男孩年十二歲寶慶人住學宮門十九號症候既往症無現在症肄業孔道學校突呼頭痛昏僕於地比輿至寓刺其十指瓜甲血色初黑後鮮血急召予診身臥於床探其頭熱如烙足冷如冰轉側向左右手拘攣右足直伸頭向後反目珠上竄神昏不語時或呻吟診斷病名最急性痙病脈象沉細澀遲舌苔灰白厚膩判案此國醫最急性之痙病故一呼頭痛人即昏僕也刺其指甲血色鮮紅決無危險但病者脈象沉細澀遲當其轉側向左之時右手拘攣右腳直伸重診其脈似有直上下行之概是毛竅閉塞血管為之緊急也況病者頭上如烙足下如冰火爐焰焰臥室燠暖不見汗出急當宣發太陽使其周身汗出則毛竅開而血管流通庶幾體溫調節不致上奔則腦與脊不受侵害炎何由而成耶處方葛根五錢麻黃一錢桂枝一錢五分白芍四錢川牛膝四錢全蠍一錢洗淨川蜈蚣一錢炙焦粉草一錢生薑三片蔥白五枚先以飛龍奪命丹五錢研末用豆豉蔥白煎湯徐徐灌下續服此湯效果昨下午至夜以服飛龍奪命丹灌下嘔吐汗出漸見轉側向右不見右手拘攣右足直伸矣夜深人似鼾睡不復呻吟服完前湯頭熱退足冷溫今晨諸症悉平脈象浮緩舌苔薄白續與人參桂枝湯全愈三龍男孩一案病者龍男孩年五歲新化人住下六鋪街二百零一號症候既往症無現在症先夕隨父遊玩外出受驚不得安寐天曉發熱頭痛手足搐搦比經西醫注射不應國醫主葛根湯加羌活防風秦艽又不應至一星期始請予診下午潮熱兩顴紅豔腦後枕骨與臀腿撐持其身仰臥於床如槓粱扛起之狀兩膝豎立不能直伸兩目上竄瞳神活潑時叫痛苦爸爸媽媽呼不絕口診斷病名亞急性痙病脈象浮洪弦數直上下行舌苔絳底黑苔起刺不焦判案此國醫亞急性之痙病病者角弓反張脊背如槓粱之狀則督脈之緊急極矣脈象弦數直上下行又於浮洪見之似難免於危險幸連日瀉下黑黃臭矢熱毒外噴雖腦與背髓混濁亦不致於內塞故顏面赤不青慘目上竄瞳神不呆舌苔黑刺不枯燥且神識尚未昏迷情志尚未煩躁此皆有一線生機未絕猶可圖治處方龍膽草三錢云連二錢關柏三錢生小梔三錢貫眾八錢川牛膝八錢白芍八錢蜣螂三錢全蠍三錢川蜈蚣一錢炙焦研末沖服劑白花蛇肉一錢炙焦研末沖服先以紫雪一錢用忍冬藤煎湯徐徐吞服續服此湯預效此治痙之大劑於極苦寒藥中加入全蠍蜈蚣白花蛇直入督脈則角弓反張之症一除而諸症自可續平次診脈象浮長數舌苔絳底黑苔厚膩判案服前藥五帖周身微微汗出夜間稍得安寢不呼爸爸媽媽矣背頗柔軟不作槓粱之狀脈象長數不復上下直行病勢漸滅大為可慶處方龍膽草三錢川連一錢關柏三錢白芍四錢川牛膝四錢貫眾八錢蜣螂一錢全蠍一錢川蜈蚣五分炙焦研末沖服白花蛇五分炙焦研末沖服生山梔三錢預效前方既已得效再服原方分量輕減續當獲效三診脈象浮長而滑舌苔絳底黑苔薄黃判案服藥四劑昨夜口渴汗出不休便泄黑黃瀑矢小便由赤轉黃下午及夜不潮熱目不竄背不反張兩腳能屈唯頭暈周身骨節疼痛唇裂出血不能起立則是便瀉已久血液虧耗邪去正亦衰矣處方西洋參三錢鮮石斛五錢鮮淮地一兩絞汁沖服滓入藥鮮茅根一兩元參三錢蟬蛻三錢桑葉三錢忍冬藤一兩紅花一錢五分此方於滋養血液之中加以宣通脈絡使餘熱外散不致留滯耳四診脈象浮數舌苔紅底薄黃苔判案服前藥三劑已能安寢矣忽一夜不得臥寐燥熱自汗渴飲熱茶自頸項肩背胸腋遍發紅疹西醫所謂匍匐疹者是也乃知前此之骨節疼為發疹之先兆予之前方欲使熱盡從外散者亦即此意也處方元參三錢犀角片三錢白茅根一兩土銀花一兩連翹三錢知母一錢五分蟬蛻三錢蘇薄荷一錢五分生山梔三錢淡豆豉三錢紫背浮萍三錢去泥沙預效國醫痙脈唯恐其不浮數耳前既浮數已退旋而浮數法當於清血解毒藥中使之宣泄外出既出又當使之消散此方是也五診脈象浮緩舌苔紅底溲黃薄苔判案服前藥六劑紅疹消滅無跡骨節疼痛平諸症悉除唯略有咳嗽耳此病化險為夷猶能治愈者一在熱毒內潰自行排泄於大便故症雖險惡而無神識昏迷之狀一在脈象浮數陽症陽脈而熱毒易於透發不致沉伏內藏現在諸症悉平只須甘淡以養液而已處方西洋參二錢鮮石斛五錢白茅根五錢生扁豆五錢炒苡米三錢栝蔞霜三錢桑葉三錢粉草一錢枇杷葉三錢效果續予溫養諸劑飲食漸增全愈四唐男孩一案病者唐男孩安化人住高井巷九號症候既往症昨春隨父之安鄉驚風一次現在症今春發熱三日身重喜眠睡服羌防柴葛溫散諸藥燈火炮灸更添煩躁不寐今早天曉猝然頭向後反顴赤目上視如天釣狀俄而神昏頭搖齘齒足攣一小時汗出即罷罷復作鼻煽氣促四肢厥冷口鼻之氣亦冷小溲如烙便瀉黑矢診斷病名亞急性痙病脈象左似有似無右沉伏不見舌苔深黃薄苔判案此國醫亞急性之痙病金匱以痙病至於腳攣急口齘齒與承氣湯下泄陽明胃腑今病者便瀉黑黃醬矢深入營分之邪業已潰出胃腸無須硝黃排泄矣前醫誤用羌防柴葛燈火炮灸遂致厥陰邪陷不復外出六脈沉伏四肢厥冷口鼻之氣亦冷深合六經為病厥深熱深屬諸厥陰之旨近世以知覺神經疾患屬之心包絡運動神經屬之肝臟此兒痙作神昏痙罷神清心包絡其無恙乎則專以厥陰肝臟為治矣處方龍膽草三錢云連一錢關柏三錢生山梔三錢鬱金三錢川牛膝五錢貫眾五錢蜣螂三錢明麻三錢紫草三錢白芍五錢先以紫雪一錢用嫩鉤藤煎湯徐徐送下續服此湯預效此方於千金龍膽湯中加入牛膝白芍紫草貫眾紫雪諸藥宣泄營分伏熱則脈必出厥必回口鼻必溫可預決也次診脈象脈浮滑數舌苔由黃轉黑舌底白膩滿布判案一日一夜服前藥頭煎兩劑翌晨其叔踵門告曰昨夜小侄得睡矣天曉手足不厥口鼻之氣亦溫鼻孔不張喘促亦平電召吾兄安鄉今日歸省可以得見其子矣比召往視脈浮滑數舌苔由黃轉黑仍主前方三日夜服盡六劑頭煎痙病乃平又召診其母稱其兒似覺胸膈滿悶咳嗽頻作唇口燥烈渴不多飲厥陰伏熱下泄而濕痰上壅肺胃此所以右脈往來替之確似滑象而舌底白膩滿布罩以黑苔也處方栝蔞實一枚浙貝五錢生遠志三錢鬱金三錢生山梔三錢川連一錢黃芩三錢杏仁三錢桑葉三錢預效豁痰化濕疏通上焦肺胃冀其胸開咳止三診脈象左浮緩右浮滑舌苔深黃有根判案服前藥四劑便瀉黃瀑眼起漿鼻流涕齒牙潤澤手指光亮但咳嗽胸悶如故加之昏沉嗜臥鎮日不醒語音低小其母呼之必以耳就其口而聽之則是濕痰阻其氣機以致沉悶不語耳處方栝蔞實一枚浙貝三錢建菖一錢川連一錢橘皮一錢生遠志三錢紫菀三殘生山梔三錢桑葉三錢杏仁三錢預效此方辛以開濕苦以泄熱兼之豁痰運樞舒暢氣機而咳嗽胸悶沉眠不醒之症自蠲四診脈象左細數右浮緩舌苔底干光尖絳無苔中心黑苔起刺判案服前藥二劑胸開咳止聲音朗大不致發生喑啞矣但唇燥口渴沉眠齘齒合參舌絳苔黑則是濕痰一開氣機稍舒而蘊伏厥陰之餘熱再出處方大光參一錢鮮石斛三錢白茅根八錢粉丹皮二錢桑葉二錢白芍二錢黃芩二錢浙貝三錢鬱金一錢栝蔞實三錢紫菀二錢預效豁痰涎運樞機是王孟英生平得力之處茲仿之加以養液清營而蘊伏厥陰之餘熱當可透出也五診脈象左滑數右虛數舌苔干光無苔判案服前藥四劑再便黑矢數次從此神識清醒不復沉眠矣但咳嗽未除唇燥口渴更增咽喉紅腫循流溯源厥陰之邪侵入少陰故嗜臥為少陰欲寐之症咽喉紅腫即少陰咽病之症是以痙罷而諸症疊發也處方西洋參一錢天冬三錢元參三錢鮮生地五錢旱蓮草三錢浙貝三錢牛蒡子三錢白茅根五錢栝蔞實三錢桑葉三錢知母一錢效果服前藥五劑諸症漸退飲食漸進更以甘淡兼鹹寒全愈五申男孩一案病者申男孩年三歲寶慶人住學宮門九號症候既往症乳齒蟲蝕指尖肥大肚腹脹大現在症初發熱嘔吐有酸臭氣國醫主平胃散加藿香法夏等藥嘔止熱不退更醫主桑菊飲熱亦不退延一星期突然發痙前此肚腹脹大而陷沒如舟矣兩目上視頭向後反巔頂高腫顏面赤色唇皮焦裂神昏不語入夜壯熱無汗口渴欲飲喂水頻吞診斷病名續發性痙病脈象初次兩部關紋青紫舌苔紅底黑黃薄苔判案此國醫續發性之痙病時已三月春寒欲解伏邪溫病從少陽而出發熱嘔吐前醫主服平胃散嘔吐雖止而蒼藿樸夏溫燥傷胃堵截少陽出路以致伏藏厥陰之熱毒衝犯督脈突然發痙倘加泄瀉斷為脾虛慢驚遽服莊氏加味理中輩其不死得乎此兒巔頂高腫肚腹陷沒正符西醫所謂腦膜炎者國醫古法高者抑之治當消腦中之炎退頂上之腫使水液血質外散下泄然小孩體質未充豈任大力攻伐幸胃腑猶吸收乳食喂水頻吞生機其在是乎處方龍膽草一錢五分云連八分關柏一錢五分川牛膝三錢貫眾三錢紫草三錢蜣螂一錢生山梔一錢干蝸牛三分研末沖服乾地龍三分研末沖服淡豉一錢青蔥三根先以紫雪五分用西洋參蒸水徐徐灌服續服此湯預效紫雪芬涼透表鹹寒泄里此方從苦寒開泄厥陰之裡加蔥豉宣散太陽之表更重用牛膝膽草蝸牛地龍消化腦腔中之水液血質排泄下出冀其巔頂平塌諸症隨之而瘳次診脈象初次兩關仍青紫舌苔紅底中心黃苔判案服前藥三劑其母述微似有汗熱罷昨日以來唇能張縮似有哭狀神識似有清明之象兩目時竄頭時後反痙將解矣渴飲溲赤初便硬後溏色黃黑巔頂略平足徵熱毒下趨上攻力微仍主前方略加斟配處方川牛膝一錢五分紫草二錢白茅根三錢龍膽草一錢關柏二錢貫眾一錢五分蜣螂一錢干蝸牛三分研末沖服乾地龍三分研末沖服生山梔一錢蘇薄荷五分預效此方即前方減小其劑必須巔頂平塌方予更方三診脈象初次兩關紫而不青舌苔紅底中心有黃苔判案前方續服三劑便瀉黑黃穢水目不上竄頭不後反忽一夜肚腹脹大而巔頂平塌金匱論痙暴腹脹大為欲愈此兒可以證之況乳食頻增預後佳兆但其母素艱於乳哺啜餅乾雜糧齒牙蟲蝕指尖肥大病起嘔吐有酸臭之氣不免疳積宿恙此際痙勢已罷兼治其疳可也處方西洋參一錢鮮石斛三錢白芍一錢五分枯芩一錢粉丹一錢桑葉一錢胡黃連一錢蜣螂一錢干蛤蟆小者一個五穀蟲二分研末沖服雞內金一錢預效此方養胃生液運脾消滯清肝膽之積熱解脈絡之毒質冀大便時下腐穢疳積漸消四診脈象初關淡紅舌苔紅底中心薄有黃苔判案服前藥六劑兩日服完一劑大便時下腐穢腹脹漸漸見消但小兒挾疳發痙善後最難只當養胃運脾兼消疳積久久守服別無良策處方西洋參一錢鮮石斛三錢苡米三錢炒扁豆三錢炒雞內金一錢胡黃連八錢夏枯珠三錢干蛤蟆小者一個蜣螂一錢白芍一錢五分五穀蟲三分研末沖服效果前藥出入加減進數十服乳食增進肌體漸完疳疾宿恙可告全瘳六王森發一案病者王森生年二十四歲江西人住金家碼頭二十一號症候既往症淋現在症病痙一星期發熱頭痛嘔惡西醫檢驗認為腦脊髓膜炎注射血清不效續經國醫主葛根湯加當歸細辛亦不效乃請予診側臥於床頭向後反兩眼上竄瞳神縮小兩腳彎曲膝靠於腹面色炲如煙煤周身並四肢厥冷默默不語但自知唾粉紅稠痰診斷病名亞急性痙病脈象似有似無沉微欲絕舌苔厚膩黃濁判案此國醫亞急性之痙病脈象沉微欲絕證見四肢厥逆危險已達極點尋思神志安靜不躁氣息和平不喘口雖默默不語猶知唾吐痰沫徵諸內臟生機猶有一線未絕前此國醫仿仲景傷寒脈微欲絕用當歸四逆法主葛根湯加當歸細辛似欲從厥陰之裡宣發太陽之表未為不是但麻辛只能散寒不能泄熱歸芍只能調營不能逐瘀此種大症此藥何濟非選用宣發太陽之大劑配入開泄厥陰之重藥何能使周身之毛竅得開而新陳代謝之交換如故又何能使周身之血管得通而體溫之調節如故故此病開始著手處必在透汗汗透則脈乃出厥可回前此葛根湯之不能透汗者蓋選藥之不當不能深入重圍使之潰邪外出耳處方龍膽草三錢云連一錢關柏三錢生山梔三錢川牛膝八錢蜣螂三錢白芍八錢全蠍三錢全蟬蛻五錢紅花三錢麻茸一錢青蔥五枚淡豆豉三錢苦蘇酒童便各一杯沖服先以飛龍奪命丹五分研末用蔥豉煎湯徐徐沖服續服此湯預效此方注重透汗而不注重下泄仿仲景療治卒死大症用麻黃煮取取名還魂之意故宣發太陽之藥倍於開泄厥陰之藥也今病家一日一夜守服二劑溫室暖被以便汗出為要次診脈象沉細弦長舌苔厚膩黃濁判案服前藥二劑明日下午再診脈象沉細弦長長則氣治弦則有可生之機況病家述稱微似有汗則毛竅有欲開之兆昨夜欲溲自知解褲則神經較前有知覺矣此病太陽寒冷外閉之症重而厥陰火熱內伏之症輕仍當遵守原方汗透周身諸症自減但不更衣一星期亦當兼顧處方龍膽草三錢云連一錢關柏三錢生山梔三錢川牛膝八錢白芍八錢紅花三錢全蠍三錢全蟬蛻五錢麻黃一錢蜣螂三錢青蔥五根淡豆豉三錢苦酒童便各一杯沖服玉樞丹二枚磨化沖服先以飛龍奪命丹五錢研末用蔥豉煎湯調服續服此湯預效此方以玉樞丹協連柏龍膽山梔牛膝白芍開泄厥陰之裡以飛龍奪命丹協蔥豉麻黃全蠍蟬蛻宣發太陽之表合而為劑究之開泄之力輕宣發之力重俾其汗透周身庶幾諸症漸退三診脈象浮細長數舌苔黃濁薄膩判案間日一診初服二劑病家見其口似魚喝知其欲飲頻頻灌之晝夜罄二三瓶周身濕潤汗出不絕服至四劑便泄兩次臭黃瀑矢小溲短赤從此渴飲時作四肢漸溫兩目不竄身能轉側神昏得醒時呼痛苦唯發生咳嗽唾吐綠痰此太陽之寒冷不閉而厥陰之火熱外透故咳唾綠痰現出少陽膽汁之色耳處方白芍八錢云連一錢龍膽草三錢蘆薈三錢膽星三錢竹瀝製半夏六錢建黛三錢桑葉三錢玉樞丹一枚磨化預效此方完全苦降雖有南星半夏之辛而制之以牛膽竹瀝則亦苦矣使膽火不致上衝斯咳嗽可除綠痰則化耳四診脈象浮細長滑舌苔淡黃薄膩判案服前藥十劑咳松綠痰亦少頗思粥食唯頭暈痛口苦背脊不舒耳處方西洋參二錢竹瀝製半夏三錢明麻三錢白芍三錢枯芩三錢桑葉三錢廣皮一錢五分鹽水炒川連一錢紫菀二錢杏仁三錢茯苓三錢枳實三錢鹽水炒效果服前藥十數劑諸恙漸痊續予六君子湯加川連白蒺藜善後七郭壽元一案病者郭壽元年四十歲衡陽人住忍園一號症候既往症無現在症初發熱頭痛嘔吐國醫誤主理中湯加桂枝因其吐物味酸更主烏梅丸由是上嘔碧綠痰涎下瀉紅水血塊過一星期發痙臥床不起始請予診顏面紅豔兩眼如鳩頭向後反反罷動搖搖則兩眼上翻背脊反張手指厥冷兩足屈曲張口不語晝夜七八作診斷病名續發性痙病脈象沉微欲絕舌苔絳底黑糙判案此國醫續發性之痙病然初起發熱頭痛嘔吐酸物則是伏氣溫病欲從少陽而出不有理中湯之溫補烏梅丸之酸斂曷能從厥陰侵犯督脈發生痙病也然溫斂諸藥不發生壯熱煩渴反現出脈伏肢冷之假象幸上吐碧綠痰涎下瀉紅水血塊雖為險惡之症亦為生活之機設使熱毒內沖全不外潰則腦與脊腔之水液血質一併腐化安有生理之可言治當清熱解毒通絡化瘀為急若徒養血滋液慮其涸竭則於病情終未當也處方鮮淮地四兩酒浸絞汁沖服其滓入煎云連一錢鹽水炒關柏三錢鹽水炒紫草三錢茜根三錢川牛膝八錢旱三七三錢槐花一兩貫眾一兩旋覆花三錢布包蜣螂三錢紫雪一錢沖服綠豆一升煮水煎藥預效此方清熱解毒通絡化瘀務須脈出厥回乃為此病初步之效驗囑其一日一夜煮二三頭煎徐服次診脈象沉細遲舌苔絳底黑黃起刺判案服前藥五劑脈出厥回便瀉紅水血塊變作黑黃醬矢口已不張便時欲起於床以哭意示之則神經似有知覺矣西醫謂腸熱為窒扶斯菌所致而腦膜炎為雙球菌所致此病兩症齊發其為窒扶斯菌乎抑為雙球菌乎觀此則雙球菌之不足為腦膜炎原因也明矣前方既效囑病者再服五劑漸見頭不動搖目不竄視背不反張而日晡至夜五鼓潮熱自汗口渴生機勃勃乎動矣語音低小能呼巔頂灼痛大椎壓痛腰背痠痛則督脈自尾閭貫脊至頂無一不痛之處通絡化瘀排膿解毒是為正治處方川牛膝八錢旱三七三錢貫眾八錢龍膽草三錢云連一錢桃仁三錢蜣螂三錢鮮淮地四兩酒浸絞汁沖服其滓入煎槐花一兩乾地龍五分沖服紫雪五分沖服預效此方通絡化瘀排膿解毒服之痛除猶非預效唯沉細而遲之陰脈必變作浮大而數之陽脈方為脫險入夷日晡潮熱明晨五鼓乃罷溫度既能高壓陽脈決其必至斯為此病生死之關鍵三診脈象沉弦數舌苔絳底黃糙薄苔判案服前藥五劑神識清醒呻吟不絕然不呼巔頂腰椎諸痛矣但晝夜不得安眠自日晡至明晨五鼓潮熱煩躁口渴前此便泄瘀腐太多營陰虧耗無疑治當滋養血液兼散餘熱倘脈由沉弦變作浮數則周身微微汗出日晡及五鼓潮熱自解處方西洋參三錢元參三錢鮮淮地五錢旱蓮草五錢天冬三錢知母三錢土銀花一兩青蒿梗五錢淡豆豉三錢升麻一錢蘇薄荷一錢五分預效病者數脈成尤在沉弦之內則衛陽陷入營陰非陰虛陽越之象故此方於滋養營陰之中配入青蒿豆豉薄荷升麻以升散衛陽也四診脈象浮弦長舌苔紅底溲黃薄苔判案服前藥五劑服至第二劑漸見安寢能熟睡矣然脈不浮數而浮弦日晡至五鼓潮熱不罷則衛陽終為營陰遏郁務須溫養衛陽而體溫乃能調節非滋陰散陽所能為力也處方西洋參二錢當歸三錢撫芎二錢白芍三錢酒炒生黃耆三錢紅柴三錢炙草一錢五分生地五錢生薑三片大棗三枚知母三錢青蒿三錢效果服之四五劑周身汗出日晡及五鼓潮熱乃罷頗嗜粥食改用炙甘草湯加黃耆十數劑諸症悉愈八彭昆臣一案病者彭昆臣年七歲湘鄉人住永湘新街七十三號症候既往症無現在症初頭痛嘔吐發熱自汗口渴國醫主二陳湯加藿香砂仁嘔止頭痛如劈比夜初鼓突然發痙神昏不語兩眼上翻頭動搖汗出如雨兩顴發赤巔頂烙熱背脊反張指甲青紫時作乾嘔診斷病名續發性痙病脈象沉細遲舌苔黃糙判案此國醫續發性之痙病首夏將屆春寒欲解正值痙病欲罷之時而竟發痙者當其頭痛嘔吐之時不服香砂二陳以堵截伏邪出路曷致上沖督脈發生痙病然顛頂烙熱頭汗如雨熱毒上衝已達極點非大劑苦寒開泄厥陰使其熱毒下趨則脈伏氣喘口噤牙關危險立至此苦寒開泄之不容緩也處方龍膽草三錢云連一錢關柏三錢川牛膝八錢紫草三錢蜣螂三錢生山梔三錢白芍八錢明麻三錢貫眾八錢全蠍三錢先以紫雪丹一錢用嫩鉤藤煎湯灌服續服此湯預效此方取龍膽湯之苦寒配紫雪之芳涼開泄厥陰之熱毒下趨腸腑而上衝之勢即殺但此病欲從陽明而出以故發熱頭痛自汗口渴發現陽明之症狀服此藥後則脈變浮洪而數病機仍趨陽明其痙即解次診脈象沉弦而勁舌苔黑黃厚糙判案兩日一夜只服前藥一劑痙勢增劇深夜以號金十元趕某醫院西醫注射其父詢問何病唯曰危險危險不報而去天曉兒科專醫至謂系急驚風寫附子理中湯加防風葛根旁人有稍知醫者阻之不與服乃服予藥晝夜服前藥三頭煎則周身微微汗出瀉下黑紅醬矢再服前藥三頭煎日晡壯熱口渴索飲前此之欲從陽明而出被其阻塞今仍還之於陽明治當迎機而導之其痙乃得解也處方川牛膝八錢白芍八錢龍膽草三錢云連三錢關柏三錢紫草三錢蜣螂三錢全蠍三錢知母三錢蟬蛻三錢羚羊角六分銼粉沖服犀角一錢五分銼粉沖服紫雪一錢沖服生山梔三錢淡豆豉三錢預效此方即前方稍為加減仍是注重厥陰不重陽明如陽明清之過早而厥陰之伏邪愈難透露必須候其壯熱口渴自汗脈數四者俱至則伏邪得出痙乃解也三診脈象左細弦右浮洪舌苔絳底黑黃厚膩判案服前方三劑頭不動搖項不強背不反目不上視唯日晡潮熱渴欲飲熱夜深尤盛寐則盜汗病機欲從陽明而出然合之左脈細弦不浮數猶有欲出不出之勢其父電報促其叔至主大承氣湯加生地當歸反增嘔吐其叔仍邀予主方予以硝黃猛力下趨腸腑而厥陰之伏熱不得透露反而上竄此際痙狀雖解而脈不浮數仍是內伏不肯外出也處方白芍四錢枯芩三錢云連一錢竹茹三錢川楝三錢敲碎去殼川牛膝四錢桑葉三錢法夏一錢五分鹽水炒吳萸八分鹽水炒釘赭石四錢布包煎頂效此方於苦寒藥中用法夏吳萸之降逆釘赭石之重墜冀其嘔止仍使病機下趨庶免危險四診脈象浮弦數舌苔絳底黃濁厚苔判案服前藥二劑嘔止去法夏吳萸釘赭石加龍膽草澤蘭梗紫雪又三劑瀉下碧綠色矢渴欲飲冷不復飲熱矣周身漐漐微汗日晡及夜間潮熱乃罷七歲孩兒過於溫飽瀉下碧綠色矢則肝藏所化之膽汁下泄而熱毒乃得始淨也處方龍膽草三錢云連一錢關柏三錢白芍四錢土銀花八錢澤蘭根三錢竹茹三錢桑葉三錢青黛三錢布包煎茜根三錢預效仍主苦寒兼以解毒冀其熱毒盡淨而諸症自然全愈五診脈象浮洪緩舌苔黃濁薄苔判案服前藥三劑諸症盡退唯口酸不嗜食心煩夜多不寐頭暈人倦此液虧正衰餘邪尚未淨也處方西洋參一錢五分鮮石斛五錢白茅根五錢北蘆根八錢白芍三錢子芩二錢竹茹三錢桑葉三錢土銀花八錢效果此方養胃生津清熱化濁服五六劑口不酸嗜食安寐續予甘淡平補乃愈九劉朕卿一案病者劉朕卿年十二歲湘鄉人住湖鄉之七區症候既往症前年跌傷折臂現在症突起發熱頭痛如劈神昏讝語前醫主犀角地黃湯兼服牛黃清心丸立見讝止神清從此每於日晡或夜半頭獨動搖能仰不能俯頸側人迎脈管暴脹急跳灼痛不可忍背脊自大椎至風府強硬亦灼痛不可忍瞳神放大頭獨盛熱渴飲沸湯夜可七八壺隨飲隨溲不黃不赤天曉五鼓熱退渴止痛罷明日下午日晡或夜半屆時亦發便瀉如米泔或黃濁穢物診斷病名最急性痙病脈象沉細弦數舌苔紅底淡黃濁苔判案此國醫最急性之痙病當初突起發熱頭痛旋即神昏讝語即是發生痙病而醫者主犀角地黃湯送下牛黃清心丸蓋犀角清心火即以醒腦牛黃開心竅亦以通腦心腦原屬一貫故服之神昏讝語立止而項強背直頭獨動搖正式之痙狀猶在每於日晡或夜半發熱即欲渴飲熱茶隨飲隨溲不稍存留與六經厥陰主症氣上衝胸心中疼熱消渴三者齊發同一病理但此病之疼痛灼熱前則衝於頸側之人迎後則衝於大椎之風府較之傷寒疼熱則在兩乳之下臍腹之上則有不同唯消渴則同耳然傷寒烏梅丸寒溫並用此則六脈不伏四肢不厥只仿其酸苦瀉熱以為劑耳處方烏梅三枚云連一錢關柏三錢木瓜三錢白芍四錢川楝三錢敲碎去皮龍膽草三錢川牛膝八錢明麻三錢白蒺藜三錢紫草三錢蜣螂三錢預效此方取仲景烏梅丸半從熱化之意推廣用之以木瓜白芍佐烏梅龍膽川楝佐連柏合而為劑酸苦瀉熱即以酸苦止渴更加之以牛膝紫草明麻蒺藜蜣螂引血質下行則痙症自解矣次診脈象沉細數舌苔淡黃薄苔判案予於今春回鄉修理先父墓近病者居時將此方出入加減求合病情服至二十餘劑灼熱疼痛消渴三者漸漸減退十之六七竟有日全罷而不發者越日復發再四思維既非西醫之糖尿病亦非國醫之消渴病然舌不起黑黃滑膩之苔便不排黑紅黃醬之矢自初至今未曾獲汗則知前此犀角地黃之清涼今此烏梅木瓜之酸斂終恐血液毒質凝結蘊蓄不肯脫化而出不然灼熱疼痛消渴一敗而不復振矣治當疏通血中之凝結宣泄血中之毒質則小溲黃濁大便黑腐周身微汗諸症自可立愈也處方歸尾三錢赤芍三錢桃仁三錢紅花三錢龍膽草三錢云連一錢番瀉葉一錢蜣螂三錢川牛膝八錢白蒺藜三錢蒼耳子三錢紫背浮萍三錢青蔥三根淡豉三錢豬膽汁童便苦酒各一杯沖服預效此方以歸尾赤芍桃仁紅花疏通血液為主佐之龍膽草云連蜣螂番瀉葉開泄大腸佐之牛膝豬膽汁童便引導血液之毒質從肝臟分清以入膀胱佐之蒼耳子白蒺藜青蔥淡豉紫背浮萍引導血液之毒質從毛孔以泄汗既有三條出路則血液毒質不與肝藏木火交固而日晡或夜半之灼熱疼痛消渴不再反復則諸症隨之而悉解矣三診脈象浮細而數舌苔淡黃薄膩判案服七八劑俟瀉黑腐之矢溲出黃濁之尿周身微微汗出而灼熱疼痛消渴一齊俱罷不復發已三晝夜矣然發生咳嗽吐痰面浮足腫漸及腹背則是血液之毒質既宣泄外出而皮膚肌肉之組織乃放大而膨脹此理知者絕少非腫病也不治亦漸消失治則當從皮膚肌肉之脈絡以宣發太陽之表不必深入內臟若誤以為腫而用五皮五苓理中真武輩鮮有不敗者予之歷驗非一次也處方白蒺藜三錢蒼耳子三錢紫草三錢紅花三錢子芩三錢黑梔三錢赤芍三錢粉丹三錢浙貝五錢杏仁三錢蘇薄荷一錢三分桑葉三錢效果服前藥三四劑漸見腫消咳減予修墓已畢急欲赴省囑王醫九峰以善其後十陳劉氏一案病者陳劉氏年四十七湘鄉人居湘鄉之七區症候既往症無現在症初發熱頭痛口渴自汗嘔吐前醫主柴葛解肌湯更醫主羚犀白虎湯熱退渴止而項背強直巔頂灼痛頭時動搖搖時自覺神昏不能語洎頭搖罷則自少腹循陰器至產門灼熱如錐刺痛欲溲不溲高枕仰臥兩腳不能伸診斷病名續發性痙病脈象沉細弦數判案此國醫續發性之痙病初起發熱頭痛口渴自汗則是伏氣溫病從陽明而出柴葛解肌非其治也羚犀白虎只能清陽明之熱而不能透厥陰之熱以故厥陰內伏之熱毒被其遏抑反而上衝督脈巔頂灼熱項背強直頭搖神昏諸症並至雖有些微之羚犀終無監製石膏知母之大力故不能預防其不發痙也況厥陰內伏之熱毒上衝下迫迨頭搖罷則自少腹循陰器至產門灼熱刺痛此痙病之變症非常症也治當於開泄厥陰之中少佐宣發太陽之藥則內伏之熱毒既泄之於大小二便亦透之於表陡事清化終無濟也處方白頭翁三錢云連一錢關柏三錢白芍四錢枳實三錢明麻三錢川牛膝八錢青蒿五錢蜣螂三錢嫩鉤藤五錢後入煎青蔥三根淡豉三錢玉樞丹二枚磨化沖服活白頸蚯蚓二條絞汁沖服預效此方取仲景白頭翁與四逆散以開泄厥陰稍佐青篙蔥頭以宣發太陽其餘諸藥對於此病面面俱到痙雖能解但恐其元氣不能撐持也次診脈象沉弦急數舌苔黑黃薄糙判案服前藥五劑予診視三次便得黑腐溲色亦黑從此頭不動搖背不強直產門痛休此皆黑腐下泄之效也但日晡溫度極高而巔頂灼痛較前更劇顏面紅豔渴不欲飲病者體質孱弱年將半百血液腐化過多遽爾陰虧亦恐陽動痙勢已解脈弦急數大是堪虞處方西洋參三錢生淮地五錢鱉甲五錢龜板一兩五錢知母三錢川牛膝三錢關柏三錢黑梔三錢土銀花一兩血琥珀五分研末沖服燈芯一握預效此方於滋陰潛陽之中清血解毒化腐行瘀冀其陰液得養浮陽自潛脈之弦急得減而巔頂灼熱自除三診脈象浮弦數不急舌苔紅底苔黃不糙判案服前藥六劑便泄黑腐減少溲亦不黑唯陰液尚未充滿而浮陽易動夜熱時作面色紅豔瞑目即汗天曉渴飲熱退四肢不溫口鼻之氣俱冷內經衛氣日行於陽夜行於陰故瞑目一入陰分被血液所含之毒質阻塞退而即出故周身汗出汗後則衛陽亦虛不能溫養周身故四肢不溫口鼻之氣亦冷非滋養血液提攜衛陽兼以化瘀解毒曷能邪正兼顧虛實並治也處方西洋參三錢生北耆三錢白芍三錢生地五錢淮牛膝五錢鱉甲五錢當歸三錢紅花三錢土銀花一兩知母三錢鹽水炒粉草一錢生薑三片大棗四枚預效此方生地當歸白芍淮膝滋養血液也洋參黃耆生薑大棗提攜衛陽也紅花化瘀銀花解毒囑服四五劑營陰得養衛陽得宣則日晡與夜間潮熱其有不罷者乎四診脈象浮緩細弱舌苔紅底淡黃薄苔判案服前藥五劑夜間潮熱不作諸症悉平處方生北耆三錢西黨三錢生地三錢當歸三錢白芍三錢於術三錢甘杞三錢炙草一錢肉桂五分研末沖服建圓五枚去殼北味八分效果此方辛甘化陽酸甘化陰囑服二十劑健康乃復痙病與腦膜炎全書跋劉君裁吾既歿之明日而所著痙病與腦膜炎全書由其門人李超凡汪士瀛校印甫峻汪子受書而讀之曰古所稱人琴俱亡者斯之謂矣夫仲尼歿而微言絕七十子之徒相與纘述夫子之言傳之後世以遺來者其書乃得彪炳如日月經天江河行地雖千萬世無有窮期至今讀其書謂其人存可也君生而穎悟治學有獨是向無門戶之見尤精醫籍上窺黃岐之書中研長沙之論下及千金外臺金元四家清之葉王罔不食蹠盈千集狐成腋遠近學者咸宗之其在鄉也間以其學起人之疴求治者踵相接建國之初君甫三十著述等身已有醫學檀幾百餘卷其要者曰傷寒匯方金匱鑑別千金外臺發揮金元四家節要景岳選瑜喻氏節要葉案選粹王案類編溫熱精言喉科扼要十種朅來長沙尚待補苴未克付梓乙亥春湘之西醫以腦膜炎之疾群相驚駭蒙口罩鼻死者踵接有經西醫認為絕望者君治之得慶更生備載治案聲施蜚然君傷夫舉世溺於西說也不知其本原也秉其四十年心得著為茲編詳載詮方循是以治皆可出水火而登袵席也君日劬診務夕則燃燈構思手操不聿漏再下未已心血虛羸遂遘重病展轉經年自斟藥餌旋已旋作未蠲疾苦丙子十有二月望日竟以不起彌留之際猶殷殷以是書為念神識清冷曾無少異剞劂告成先期永訣竟未一睹君之志願尚欲著中國肺癆病學中國六氣病學二書屬稿未竟不及成功齎志九京彌有餘痛憶君與余交最摯而言論爽侃掬肺肝以相示有非常人所能及者余極重其品學目為今之古人君於余亦以戇直相許余潦倒風塵百不當意君則時時過從以相慰藉間或風雨之晨手持一蓋足躡橡履揚揚到門把晤歡然傾倒古今譚言愈豪聲撼窗扉不可一世方冀克享大年著作益富何意奄同過隙墜若秋蒂閉目凝思曾幾何時君之精魂若在左右如聞聲咳今何可再得也君今有子已克負荷又有弟子能繼所業以成君子無忘其能用告明靈亦可無憾惜餘年力就衰學殖荒落視君能以著述壽其身藏之名山鬼神呵護必有所知所謂亡而若存者夜永挑燈清風入幃端誦茲篇涕泗橫集有不勝反袂拭面者已中華民國二十五年歲在丙子季冬月西泠汪康白跋於江聲閣
